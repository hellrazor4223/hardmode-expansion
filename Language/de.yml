  MUTON_BERSERKER_ARMOR: "Kampfanalyse: Mutone Berserker"
  STR_MUTON_BERSERKER: "Mutone Berserker"
  STR_MUTON_BERSERKER_TERRORIST: "Mutone Berserker-Terrorist"
  STR_MUTON_BERSERKER_UFOPEDIA: "Diese massige Kreatur scheint eine Unterart der Mutonen zu sein. Sie ist im Wesentlichen gleich, jedoch fluten überaktive Drüsen – vermutlich adrenalinähnlich – ihren Körper ständig mit einem Hormon, das sie in permanenter Wut hält. Dies dämpft ihre Wahrnehmung, verleiht ihr aber enorme Schmerzresistenz. Ihre Intelligenz ist deutlich reduziert und sie greift ausschließlich im Nahkampf an."
  STR_MUTON_BERSERKER_CORPSE: "Toter Mutone Berserker"
  STR_MUTON_BERSERKER_AUTOPSY: "Mutone Berserker-Autopsie"
  STR_MUTON_BERSERKER_AUTOPSY_UFOPEDIA: "Die ersten Untersuchungen zeigen ein erschreckendes Bild: Es handelt sich im Kern um einen Mutonen, mit nur minimalen genetischen Veränderungen, die hauptsächlich eine dauerhafte Hormonüberflutung erzeugen. Die Schmerzempfindung ist stark reduziert und die äußere Haut leicht gehärtet, was zu erheblicher Schadensresistenz führt."

  STR_CYBERMITE: "Cybermite"
  CYBERMITE_ARMOR: "Kampfanalyse: Cybermite"
  STR_CYBERMITE_TERRORIST: "Cybermite-Terrorist"
  STR_CYBERMITE_CORPSE: "Cybermite Wrack"
  STR_CYBERMITE_UFOPEDIA: "Dieser Miniaturroboter ist eine automatisierte Terrorwaffe und stellt den Höhepunkt außerirdischer Robotik dar. Sobald sein optischer Sensor ein Ziel erfasst, greift er an. Sein miniaturisierter Eleriumkern ist so ausgelegt, dass er bei Beschädigung explodiert – das Töten dieser Einheit ist daher selbst gefährlich."
  STR_CYBERMITE_AUTOPSY: "Cybermite-Autopsie"
  STR_CYBERMITE_AUTOPSY_UFOPEDIA: "Die komplexe Konstruktion enthält eine Waffe aus einer Legierungsspitze, verbunden mit einem Miniaturtank, vermutlich gefüllt mit einem Gift. Der Energiekern ist stark beschädigt, scheint aber absichtlich so konstruiert zu sein, dass er bei Beschädigung explodiert."

  SECTOPOD_ARMOR: "Kampfanalyse: Sektopod"

  STR_HOLODRONE: "Holodrone"
  HOLODRONE_ARMOR: "Kampfanalyse: Holodrone"
  STR_HOLODRONE_TERRORIST: "Holodrone-Terrorist"
  STR_HOLODRONE_UFOPEDIA: "Holodrones sind lebende, schwebende Artilleriewaffen. Sie sind von einer Plasmakuppel geschützt, die Plasmaangriffe und Feuer stört. Es könnte sein, dass sie speziell zur Bekämpfung von Plasmawaffen entwickelt wurden. Ihr Mechanismus läuft jedoch zu heiß und ist zu radioaktiv für menschliche Rüstungen."
  STR_HOLODRONE_CORPSE: "Holodrone Wrack"
  STR_HOLODRONE_AUTOPSY: "Holodrone-Autopsie"
  STR_HOLODRONE_AUTOPSY_UFOPEDIA: "Ein sehr komplexer Automat, angetrieben von einem großen Eleriumkern. Zwei Strahlenkanäle erzeugen die Plasmakuppel. Der Kern kann überladen werden und so einen starken Laserstrahl erzeugen."

  STR_ARMORED_CYBERDISC: "Gepanzerte Cyberdisc"
  ARMORED_CYBERDISC_ARMOR: "Kampfanalyse: Gepanzerte Cyberdisc"
  STR_ARMORED_CYBERDISC_TERRORIST: "Gepanzerte Cyberdisc-Terrorist"
  STR_ARMORED_CYBERDISC_UFOPEDIA: "Dies scheint eine verbesserte Version der zuvor angetroffenen Cyberdiscs zu sein, denen wir bereits in einigen ernsthaften Gefechten begegnet sind. Ihre Waffen wurde aufgerüstet und ist nun in der Lage, automatische Feuerstöße abzugeben."
  STR_ARMORED_CYBERDISC_CORPSE: "Gepanzerte Cyberdisc Wrack"
  STR_ARMORED_CYBERDISC_AUTOPSY: "Gepanzerte Cyberdisc-Autopsie"
  STR_ARMORED_CYBERDISC_AUTOPSY_UFOPEDIA: "Die Panzerung dieses Cyberdiscs wurde erheblich verbessert, wodurch er äußerst widerstandsfähig gegen hochexplosive Munition und sehr widerstandsfähig gegen konventionelle Waffen ist. Laserwaffen werden empfohlen, um ihn zu zerstören."

  STR_ARMORED_SECTOPOD: "Gepanzerter Sektopode"
  ARMORED_SECTOPOD_ARMOR: "Kampfanalyse: Gepanzerter Sektopode"
  STR_ARMORED_SECTOPOD_TERRORIST: "Gepanzerter Sektopode Terrorist"
  STR_ARMORED_SECTOPOD_UFOPEDIA: "Eine verbesserte Version des Sektopoden mit stärkerer Bewaffnung und erhöhter Widerstandsfähigkeit. Die Schwäche gegenüber Laserwaffen wurde entfernt."
  STR_ARMORED_SECTOPOD_CORPSE: "Gepanzerter Sektopode Wrack"
  STR_ARMORED_SECTOPOD_AUTOPSY: "Gepanzerter Sektopode-Autopsie"
  STR_ARMORED_SECTOPOD_AUTOPSY_UFOPEDIA: "Die Panzerung dieses Sectopods wurde verbessert, um ihn widerstandsfähiger gegen Laserwaffen, Betäubungswaffen und Hochsprengstoff zu machen. Er stellt nun eine ernsthafte Bedrohung auf dem Schlachtfeld dar. Mit einer modifizierten schweren Plasmawaffe als Hauptkanone kann er Salven mit bis zu 5 Schüssen abfeuern. Unsere beste Chance, diese massiven Todesmaschinen zu zerstören, scheint Nahkampf oder ein Flankenangriff zu sein, da die Frontpanzerung nahezu undurchdringlich ist."

  STR_CHRYSSALID_SPITTER: "Chryssalid Spucker"
  CHRYSSALID_SPITTER_ARMOR: "Kampfanalyse: Chryssalid Spucker"
  STR_CHRYSSALID_SPITTER_TERRORIST: "Chryssalid Spucker-Terrorist"
  STR_CHRYSSALID_SPITTER_UFOPEDIA: "Diese Kreatur ähnelt einem weiterentwickelten Chryssaliden. Sie behält die Klauen der Chryssaliden, besitzt jedoch zusätzlich die Fähigkeit, ihre Eier über eine beträchtliche Distanz zu spucken. Es scheint, dass die Eier durch eine extrem starke Säure angetrieben werden, die in der Lage ist, sich durch außerirdische Legierungen zu fressen."
  STR_CHRYSSALID_SPITTER_CORPSE: "Toter Chryssalid Spucker"
  STR_CHRYSSALID_SPITTER_AUTOPSY: "Chryssalid Spucker-Autopsie"
  STR_CHRYSSALID_SPITTER_AUTOPSY_UFOPEDIA: "Diese seltsame Kreatur scheint eine noch tödlichere Variante der Chryssaliden-Spezies zu sein. Ein membranöser Sack innerhalb der Kloake produziert eine ätzende Verbindung und erzeugt den Druck, um die Eier mit hoher Geschwindigkeit auszustoßen, sodass sie in der Lage sind, Panzerung zu durchdringen. Mithilfe dieser Säure kann diese Kreatur Opfer aus beträchtlicher Distanz infizieren. Es scheint, dass diese Kreatur darauf ausgelegt wurde, große Teile der Bevölkerung in noch kürzerer Zeit zu infizieren."

  STR_SPITTER_ZOMBIE: "Spucker-Zombie"
  STR_SPITTER_ZOMBIE_CORPSE: "Toter Spucker-Zombie"

  STR_CYDONIA_STAGE_1: "Cydonia Mischung Eins"
  STR_CYDONIA_STAGE_2: "Cydonia Mischung Zwei"
#END ALIEN RACES

#BEGIN ALIEN RESEARCH
  STR_THE_ALIEN_THREAT: "Die Außerirdischenbedrohung"
  STR_THE_ALIEN_THREAT_UFOPEDIA: "Wie im ersten X-Com-Briefing erläutert, ist es von höchster Bedeutung, alle laufenden außerirdischen Aktivitäten zu untersuchen und deren Absichten herauszufinden. Wir wissen nicht, was sie von uns wollen, aber Berichte aus dem zivilen, wissenschaftlichen und militärischen Bereich deuten nicht auf friedliche Absichten hin.{NEWLINE}Beobachtete Viehverstümmelungen in Agrarregionen sowie Kornkreise deuten auf eine wachsende außerirdische Aktivität hin. Wir hoffen, dass dies nicht zu Panikattacken führt, sollte die Außerirdischen Aktivität weiter zunehmen.{NEWLINE}Es gibt außerdem Berichte von überall auf der Erde über die Entführung von Menschen und mögliche Experimente an ihnen. Dies ist höchst besorgniserregend und könnte Massenhysterie und Panik auslösen, wenn es nicht verhindert wird."

  STR_ALIEN_INVASION: "Außerirdische Invasion"
  STR_ALIEN_INVASION_UFOPEDIA: "Nach Auswertung aller Daten aus dem außerirdischen Datenkern und der Vernehmung unserer Gefangenen können wir nun sicher sagen, dass das Ziel der Ankunft der Außerirdischen auf der Erde eine großangelegte Invasion ist.{NEWLINE}Um mehr über ihre Taktiken, Strategien und Technologien zu erfahren, müssen wir mehr Außerirdischen lebend gefangen nehmen und verhören. Bevorzugt sollten Exemplare sein, die mit ihrer Technologie, Bewaffnung und Operationen vertraut sind. Wir gehen davon aus, dass die größeren UFOs wahrscheinlich mindestens einen Außerirdischen Anführer enthalten."

  STR_ALIEN_ORIGINS_UFOPEDIA: "Es ist klar, dass wir auf der Erde einen verlorenen Kampf führen. Die außerirdischen Horden sind zahlenmäßig überwältigend. Das Beste, was wir tun können, ist, ihren Vormarsch zu verlangsamen. Die einzige Hoffnung für die Menschheit ist, die Außerirdischen an ihrer Quelle zu bekämpfen. Unsere Forschung deutet auf eine nahegelegene Basis innerhalb unseres Sonnensystems hin. Die Außerirdischen bezeichnen diesen Ort als Zentrum einer alten Zivilisation, die der Menschheitsgeschichte vorausgeht. Wir müssen diesen Ort so schnell wie möglich finden. Dazu müssen wir einen außerirdischen Kommandanten gefangen nehmen und verhören. Nur in Außerirdischen Basen lassen sich Kommandanten aufspüren."

  STR_THE_MARTIAN_SOLUTION_UFOPEDIA: "Unsere Forschung weist nun auf den Mars als Basis der außerirdischen Operationen hin. Die Basis ist gut versteckt und enthält alle Produktions- und Klonanlagen, die für die Infiltration der Erde notwendig sind. Außerdem scheint sie über einen Kontrollcomputer zu verfügen, der die gesamte Operation steuert. Die bienenstockähnliche außerirdische Gesellschaft hat offenbar eine Art 'Königin'. Dies ist ihre grundlegende Schwäche – wenn wir das 'Gehirn' eliminieren, stirbt der Körper. Wir müssen unsere Forschung verstärken, bevor es zu spät ist. Um Fortschritte zu erzielen, müssen wir die höchstrangigen Außerirdischen – die Ethereal-Kommandanten – fangen, die nur in Basen der Ethereal-Rasse zu finden sind."

  STR_PLASMA_WEAPONS: "Außerirdische Plasmawaffen"
  STR_PLASMA_WEAPONS_UFOPEDIA: "Die anfänglichen Thesen zur Funktionsweise dieser Waffen wurden bestätigt. Die Informationen aus dem Außerirdischen Datenkerntenkern ermöglichen es uns, diese Waffen zu untersuchen und ihre Grundfunktionen zu verstehen. Weitere Forschung ist notwendig, ebenso wie jemand, der die Anpassung der Waffensysteme an das Erd-Gravitationsfeld erklären kann. Die Plasmawaffen der Außerirdischen sind im Kampf extrem tödlich."

  STR_LAUNCHER_WEAPONS: "Außerirdische Werferwaffen"
  STR_LAUNCHER_WEAPONS_UFOPEDIA: "Die Außerirdischen scheinen eine Art Werferwaffen einzusetzen, die unseren Raketenwerfern sehr ähnlich sind. Wir müssen mehr Informationen über diese effektiven Waffensysteme aus Verhören und dem Außerirdischen Datenkerntenkern gewinnen."

  STR_ALIEN_BIOLOGY: "Außerirdische Biologie"
  STR_ALIEN_BIOLOGY_UFOPEDIA: "Die DNA der Außerirdischen zeigt bemerkenswerte Ähnlichkeiten mit unserer eigenen. Dennoch deutet die genetische Struktur auf ein sehr hohes Alter hin, deutlich älter als unsere eigene. Bestimmte Fragmente scheinen künstlich hinzugefügt, vermutlich aus irdischen Organismen entnommen worden zu sein. Vermutlich handelt es sich um eine genetische Anpassung an die Umwelt. Das Immunsystem wirkt schwach, daher ist es entscheidend, genau zu klären, wie sie sich ernähren und wie ihr Fortpflanzungszyklus funktioniert, um sie für Verhöre richtig unterbringen zu können. Größere Außerirdischen Anlagen könnten Antworten liefern."

  STR_ALIEN_LANGUAGE: "Außerirdische Sprache"
  STR_ALIEN_LANGUAGE_UFOPEDIA: "Die Entschlüsselung der außerirdischen Sprache stellte eine enorme Herausforderung für unsere besten Wissenschaftler und Hacker dar. Es scheint eine Mischung aus mindestens sieben ursprünglichen Sprachen zu sein, die über lange Zeit zusammengeführt wurden. Mit diesem Grundwissen sollten wir beginnen, die computerähnlichen Geräte in den UFOs zu untersuchen. Ein außerirdischer Gefangener, der diese Geräte erklärt, wird für ein besseres Verständnis benötigt."

  STR_ALIEN_POWER_SYSTEMS: "Außerirdische Energiesysteme"
  STR_ALIEN_POWER_SYSTEMS_UFOPEDIA: "Es ist bisher ein Rätsel, wie die Außerirdischen Energie aus dem neu entdeckten Element Elerium-115 erzeugen. Wir vermuten, dass die zylindrisch geformten Geräte in den UFOs ihre Energiequellen sind, die Elerium-115 als Treibstoff verbrauchen. Ein lebender Außerirdischer, der die Funktionsweise dieser Geräte erklärt, wird benötigt, um Fortschritte zu erzielen."

  STR_PSIONICS: "Psionik"
  STR_PSIONICS_UFOPEDIA: "Einige Außerirdischen scheinen über psychische Kräfte zu verfügen. Die Fähigkeit, andere Wesen in ständige Angst zu versetzen oder ihre Gedanken vollständig zu kontrollieren, ist eine schreckliche Perspektive. Wir haben diese Kräfte gegen uns beobachten können, aber vielleicht finden wir Wege, sie zu unserem Vorteil zu nutzen. Um das menschliche psionische Potenzial zu erforschen, benötigen wir eine entsprechende Einrichtung; Verhöre könnten uns die technischen und medizinischen Spezifikationen liefern."
#END ALIEN RESEARCH

#BEGIN UFO COMPONENTS
  STR_ALIEN_ALLOYS_UFOPEDIA: "Außerirdische Schiffe werden aus speziellen Legierungen mit einzigartigen Eigenschaften gebaut. Sie sind extrem leicht und haltbar und können durch elektromagnetische Verfahren geformt werden. Dieses Material kann nicht reproduziert werden, findet aber in vielen Herstellungsprozessen Verwendung."

  STR_UFO_CONSTRUCTION_UFOPEDIA: "Außerirdische Schiffe bestehen aus drei Hauptkomponenten – einer Energiequelle, einem Navigationssystem und einem Rumpf aus außerirdischen Legierungen. Der Rumpf ist speziell konstruiert, um Gravitationswellen zu lenken und zu kontrollieren. Zusätzlich wird eine kleine Menge Elerium benötigt, um die Energiequelle zu betreiben. Sobald die Konstruktionsprinzipien verstanden und die Funktionen jeder Komponente bekannt sind, ist es möglich, diese Schiffstypen nachzubauen. Dafür müssen wir Gefangene mit technischen und navigationsspezifischen Fähigkeiten verhören; für lange Raumflüge benötigen wir möglicherweise die Unterstützung außerirdischer Ärtze."
#END UFO COMPONENTS

#BEGIN NEW UFOS
  STR_FIGHTER_SHIP: "Jäger"
  STR_FIGHTER_SHIP_UFOPEDIA: "Jäger sind ausschließlich dazu gebaut, irdische Flugzeuge, einschließlich unserer Abfangjäger, zu zerstören. Sie sind für ihre Größe extrem gut bewaffnet und ihre Besatzung entspricht der eines mittleren Spähschiffs."

  STR_SENTRY_SHIP: "Patrouillenschiff"
  STR_SENTRY_SHIP_UFOPEDIA: "Dieses kleine UFO ist für Beobachtungs- und Patrouillenaufgaben zuständig. Es ist für den Krieg bewaffnet und stellt eine gewisse Herausforderung für unsere Abfangjäger dar. Die Besatzungsstärke entspricht der von großen Spähschiffen und Exkavatoren."

  STR_EXCAVATOR: "Exkavator"
  STR_EXCAVATOR_UFOPEDIA: "Exkavatoren sind kleine Schiffe, die hauptsächlich für Grabungs- und Bauarbeiten verwendet werden. Sie stellen keine große Bedrohung für unsere Schiffe dar. Ihre Besatzung ist gleich der von Patrouillenschiffen und großen Spähschiffen."

  STR_LAB_SHIP: "Laborschiff"
  STR_LAB_SHIP_UFOPEDIA: "Laborschiffe sind große Schiffe, die für umfangreiche Forschungs-, Entführungs- und Ernteoperationen zuständig sind. Sie sind deutlich größer als Ernteschiffe und ausgestattet, um komplexe Experimente an Bord durchzuführen. Ihre Besatzung ist zahlreich und gut ausgerüstet."
#END NEW UFOS

#BEGIN COMMENDATIONS
  STR_MEDAL_ALIENS_KILLED: "Verdienst-Stern"
  STR_MEDAL_ALIENS_KILLED_DESCRIPTION: "Wird an einen Soldaten vergeben, der viele Außerirdische getötet hat."
  STR_MEDAL_ALIENS_KILLED_UFOPEDIA: "\"Wir können dem Feind die unannehmbaren Kosten seines Kampfes demonstrieren, indem wir:{NEWLINE}  in sein Territorium eindringen;{NEWLINE}  Operationen durchführen, um sein Leiden zu erhöhen;{NEWLINE}  oder indem wir den Feind zermürben.{NEWLINE}  --Clausewitz'{NEWLINE}{NEWLINE}Diese Auszeichnung wird an einen Soldaten vergeben, der seine Tödlichkeit bewiesen hat und viele Außerirdische getötet hat.{NEWLINE}{NEWLINE}Die Berechtigung für diese Auszeichnung beginnt bei 10 Kills. Danach gibt es für jeweils weitere 10 Kills eine zusätzliche Auszeichnung."

  STR_MEDAL_ALIENS_KILLED_BY_INCENDIARY: "Inferno-Stern"
  STR_MEDAL_ALIENS_KILLED_BY_INCENDIARY_DESCRIPTION: "Wird an einen Soldaten vergeben, der mit Brandwaffen Außerirdische getötet hat."
  STR_MEDAL_ALIENS_KILLED_BY_INCENDIARY_UFOPEDIA: "'Von den vier klassischen Elementen ist Feuer bei weitem das ursprünglichste. Das anspruchsvollste. Das gefährlichste. Das transformierendste. Das viszeralste. Das unterhaltsamste. Im Ernst: Welche Feinde würden erschrocken stehen bleiben, wenn du vor ihnen erscheinst und dich als großer Wasserzauberer vorstellst?'{NEWLINE}  -- The Rant{NEWLINE}{NEWLINE}Diese Auszeichnung wird an jene verliehen, die die Kunst gemeistert haben, den Feind mit Feuer zu vernichten. Sie wird für jeweils fünf verbrannte Außerirdische vergeben, bis zu viermal."

  STR_MEDAL_ALIENS_KILLED_BY_RACE: "Außerirdischen-Spezies-Xenozidorden"
  STR_MEDAL_ALIENS_KILLED_BY_RACE_DESCRIPTION: "Für einen Soldaten, der die {0}-Bedrohung erfolgreich bekämpft hat."
  STR_MEDAL_ALIENS_KILLED_BY_RACE_UFOPEDIA: "'Wenn Sie sich in einem fairen Kampf wiederfinden, haben Sie die Mission schlecht geplant.'{NEWLINE}  -- David Hackworth{NEWLINE}{NEWLINE}Diese Auszeichnung geht an Soldaten, die zu einer tödlichen Maschine im Kampf gegen eine bestimmte außerirdische Spezies geworden sind. Diese Spezies hat durch diesen XCOM-Helden derart gelitten, dass sie ihn als „Xenozid“ bezeichnen.{NEWLINE}{NEWLINE}Auszeichnungsstufen bei 10, 20 und 30 Kills dieser Spezies."

  STR_MEDAL_ALIENS_KNOCKED_OUT: "Orden der Zügelung"
  STR_MEDAL_ALIENS_KNOCKED_OUT_DESCRIPTION: "Für einen Soldaten, der zahlreiche Außerirdische mit nicht-tödlichen Methoden ausgeschaltet hat."
  STR_MEDAL_ALIENS_KNOCKED_OUT_UFOPEDIA: "'Es wird eine beträchtliche Belohnung für den geben, der den Millennium Falken findet. Du darfst alle notwendigen Mittel einsetzen, aber ich will sie lebend. Keine Desintegrationen.' – Darth Vader{NEWLINE}{NEWLINE}Diese Auszeichnung ehrt Soldaten, die die Kunst gemeistert haben, Außerirdische lebend gefangen zu nehmen. Lebende Exemplare sind äußerst wichtig für das Verständnis der Bedrohung, der wir gegenüberstehen.{NEWLINE}{NEWLINE}Die Auszeichnung wird bei 4, 8, 12 und 16 Gefangenen verliehen."

  STR_MEDAL_ALIEN_BASE_ASSAULT: "Terranisches Kreuz"
  STR_MEDAL_ALIEN_BASE_ASSAULT_DESCRIPTION: "Für einen Soldaten, der an einem erfolgreichen Angriff auf eine Außerirdischenbasis teilgenommen hat."
  STR_MEDAL_ALIEN_BASE_ASSAULT_UFOPEDIA: "'Schicke deine Armee in tödliche Gefahr, und sie wird überleben; stürze sie in verzweifelte Lagen, und sie wird heil daraus hervorgehen.' – Sun Tzu{NEWLINE}{NEWLINE}Jeder Angriff auf eine feindliche Basis ist ein Schritt Richtung Sieg. Die Zerstörung der Machtzentren des Feindes bringt uns der endgültigen Überlegenheit näher.{NEWLINE}{NEWLINE}Diese Auszeichnung wird für die Teilnahme an einem Angriff auf eine Außerirdischenbasis verliehen. Sie kann bis zu drei Mal vergeben werden."

  STR_MEDAL_ALIEN_SOLDIERS_KILLED_ALL_RACES: "Orden des Hammers"
  STR_MEDAL_ALIEN_SOLDIERS_KILLED_ALL_RACES_DESCRIPTION: "Für einen Soldaten, der Soldaten aller außerirdischen Rassen getötet hat."
  STR_MEDAL_ALIEN_SOLDIERS_KILLED_ALL_RACES_UFOPEDIA: "'Hab keine Angst vor ihnen, mein Kind. Wir werden sie alle töten.'{NEWLINE}  -- The Kingdom{NEWLINE}{NEWLINE}Diese Auszeichnung würdigt Soldaten, die alle Formen außerirdischer Gegner eliminiert haben. Keine Rasse ist vor ihnen sicher.{NEWLINE}{NEWLINE}Verliehen für das Töten eines Soldaten jeder Hauptspezies. Weitere Auszeichnungen bei 5, 10 und 15 zusätzlichen Exemplaren jeder Rasse."

  STR_MEDAL_ALLBATTLETYPES: "Medaille Armis Potens"
  STR_MEDAL_ALLBATTLETYPES_DESCRIPTION: "Für einen Soldaten, der mit allen Waffentypen tödliche Fähigkeiten bewiesen hat."
  STR_MEDAL_ALLBATTLETYPES_UFOPEDIA: "'Armis Potens' bedeutet „mächtig in Waffen“. Infanteristen werden darauf trainiert, mit vielen verschiedenen Waffentypen zu kämpfen, um den Feind zu besiegen.{NEWLINE}{NEWLINE}Diese Auszeichnung würdigt diese Vielseitigkeit und Tödlichkeit.{NEWLINE}{NEWLINE}Sie wird für Abschüsse mit allen Waffentypen vergeben: Schusswaffen, Nahkampf, Granaten und Haftminen. Es gibt vier Stufen bei 3, 6, 9 und 12 Kills."

  STR_MEDAL_ALLMISSIONS: "Hölle-und-Zurück-Medaille"
  STR_MEDAL_ALLMISSIONS_DESCRIPTION: "Für einen Soldaten, der an jeder Missionsart teilgenommen hat."
  STR_MEDAL_ALLMISSIONS_UFOPEDIA: "'Du kannst ihnen sagen,{NEWLINE} ich war in der Hölle und zurück,{NEWLINE} wenn die Hitze steigt, schlage ich zurück,{NEWLINE} in dieser kalten Welt – wo sind eure Feuerzeuge?{NEWLINE} Lasst uns alles niederbrennen, f-f-feuer zurück'{NEWLINE} – Kid Ink{NEWLINE}{NEWLINE}Dieser Soldat hat alles gesehen: abgestürzte UFOs, gelandete UFOs, Terrormissionen, Basismissionen und sogar Angriffe auf feindliche Basen.{NEWLINE}{NEWLINE}Diese Auszeichnung wird für die Teilnahme an allen Missionsarten vergeben."

  STR_MEDAL_ALLRANKS: "Taking Names"
  STR_MEDAL_ALLRANKS_DESCRIPTION: "Für einen Soldaten, der Außerirdische aller Ränge getötet hat."
  STR_MEDAL_ALLRANKS_UFOPEDIA: "'… diese kampferprobten kleinen vietnamesischen Marines fingen an, ordentlich auszuteilen und Namen zu notieren.'{NEWLINE} – Ralph Christopher „River Rats“{NEWLINE}{NEWLINE}„Namen notieren“ stammt aus der Idee, einen Gegner so stark zu schlagen, dass seine Einträge aus dem Truppverzeichnis verschwinden.{NEWLINE}{NEWLINE}Diese Auszeichnung wird vergeben, wenn ein Soldat jeden Rang einer außerirdischen Streitkraft eliminiert hat – vom Soldaten bis zum Kommandanten."

  STR_MEDAL_ALLUFOS: "TECHINT Abzeichen"
  STR_MEDAL_ALLUFOS_DESCRIPTION: "Für einen Soldaten, der an Missionen für jeden UFO-Typ teilgenommen hat."
  STR_MEDAL_ALLUFOS_UFOPEDIA: "TECHINT oder Technical Intelligence bezieht sich auf Wissensaneignung\nüber feindliche Fähigkeiten durch die Ausnutzung eroberter Ausrüstung.{NEWLINE}{NEWLINE}X-COM gewinnt mit jedem geborgenen UFO an Wissen und Material.{NEWLINE}{NEWLINE}Soldaten erhalten die Auszeichnung für die Teilnahme in Missionen mit jedem UFO-Typ. Einmalige Auszeichnung."

  STR_MEDAL_ANTITERROR: "Herakles-Medaille"
  STR_MEDAL_ANTITERROR_DESCRIPTION: "Für einen Soldaten, der alle Arten von Terrorgegnern ausgeschaltet hat."
  STR_MEDAL_ANTITERROR_UFOPEDIA: "'Ein wahrer Held wird nicht an der Größe seiner Stärke gemessen, sondern an der Stärke seines Herzens.'{NEWLINE} - Zeus (Herakles){NEWLINE}{NEWLINE}So wie Herakles in seiner Zeit dafür bekannt war, viele albtraumhafte Monster zu töten, so hat auch der Empfänger dieser Auszeichnung seinen fairen Anteil an furchtbaren Feinden eliminiert.{NEWLINE}{NEWLINE}Diese Medaille wird an Soldaten verliehen, die jede Art von Terror-Einheit im Spiel töten. Es gibt vier Stufen dieser Auszeichnung."

  STR_MEDAL_BASE_DEFENDER: "Verteidiger-Medaille"
  STR_MEDAL_BASE_DEFENDER_DESCRIPTION: "Für einen Soldaten, der an einer erfolgreichen Basisverteidigungsmission teilnahm."
  STR_MEDAL_BASE_DEFENDER_UFOPEDIA: "'Du kannst dein Schlachtfeld nicht wählen, Gott tut das für dich; aber du kannst eine Fahne hissen, wo noch nie eine flog.'{NEWLINE}  -- Nathalia Crane{NEWLINE}{NEWLINE}Diese Medaille wird an Krieger verliehen, die an einer erfolgreichen Basisverteidigung teilgenommen haben. Trotz des Angriffs der außerirdischen Horden hielt dieser tapfere Soldat die Linie und sicherte die Kontrolle von XCOM über diese entscheidende Einrichtung.{NEWLINE}{NEWLINE}Auszeichnungen werden für bis zu drei erfolgreiche Basisverteidigungen vergeben."

  STR_MEDAL_BESTOFRANK: "Gefallener Stern"
  STR_MEDAL_BESTOFRANK_DESCRIPTION: "Posthum für einen Soldaten, der ein aufsteigender Stern in seinem Rang war."
  STR_MEDAL_BESTOFRANK_UFOPEDIA: "'Wenn er stirbt,{NEWLINE} nehmt ihn und zerlegt ihn in kleine Sterne...' {NEWLINE} - Shakespeare, Romeo & Julia{NEWLINE}{NEWLINE}XCOM-Helden, sei es Rookie, Sergeant, Captain oder Commander, verdienen Anerkennung für ihre Leistungen, wenn sie fallen.{NEWLINE}{NEWLINE}Dieser Orden wird posthum an den Soldaten verliehen, der zum Zeitpunkt seines Todes den höchsten Rang innerhalb seiner Kategorie hatte. Mehr als ein Soldat kann auf jeder Stufe diese posthume Auszeichnung erhalten."

  STR_MEDAL_BESTSOLDIER: "Heldenorden"
  STR_MEDAL_BESTSOLDIER_DESCRIPTION: "Posthum für einen Soldaten, der allen anderen ein Beispiel war."
  STR_MEDAL_BESTSOLDIER_UFOPEDIA: "'Es ist nichts, zu sterben. Schrecklich ist es, nicht zu leben.'{NEWLINE} - Victor Hugo, Les Misérables{NEWLINE}{NEWLINE}Wenn Helden sterben, leben ihre Taten weiter. Die Heldentaten der XCOM-Truppen werden nicht vergessen, wenn sie in glorreichem Kampf fallen.{NEWLINE}{NEWLINE}Dieser Orden wird posthum an den höchstbewerteten gefallenen Soldaten verliehen. Auch hier kann mehr als ein Soldat auf jeder Stufe diese Anerkennung erhalten."

  STR_MEDAL_BRAVERYGAIN: "Legion der Tapferen"
  STR_MEDAL_BRAVERYGAIN_DESCRIPTION: "Für einen Soldaten, der ein Musterbeispiel an Mut war."
  STR_MEDAL_BRAVERYGAIN_UFOPEDIA: "'Ich lernte, dass Mut nicht die Abwesenheit von Furcht ist, sondern deren Überwindung. Der Tapfere ist nicht der, der keine Angst fühlt, sondern der, der sie besiegt.' - Nelson Mandela{NEWLINE}{NEWLINE}Dieser Soldat hat sich in intensiven Situationen bewiesen und sich der Angst gestellt!{NEWLINE}{NEWLINE}Diese Auszeichnung wird für je 10 Punkte Zuwachs im Mut eines Soldaten verliehen. Sie hat drei Stufen."

  STR_MEDAL_DAYS_WOUNDED: "Scharlach-Herz"
  STR_MEDAL_DAYS_WOUNDED_DESCRIPTION: "Für einen Soldaten, der eine lange Zeit verwundet war."
  STR_MEDAL_DAYS_WOUNDED_UFOPEDIA: "Die intensive Selbstaufopferung des verwundeten Kriegers wird durch diese Auszeichnung geehrt. Wahrlich ein 'Rotes Abzeichen des Mutes', ehrt sie den Soldaten, der schwer verwundet wurde.{NEWLINE}{NEWLINE}Diese Auszeichnung basiert auf der kumulativen Anzahl von Verwundungstagen und wird für jeweils 30 Erholungstage bis zu 300 Tagen verliehen."

  STR_MEDAL_DOUBLEKILL: "Leistungsbeschreibung"
  STR_MEDAL_DOUBLEKILL_DESCRIPTION: "Für einen Soldaten, der sich auf dem Schlachtfeld hervorgetan hat, indem er mehr als eine Bedrohung rasch hintereinander ausschaltete."
  STR_MEDAL_DOUBLEKILL_UFOPEDIA: "'Ein feindlicher Soldat ist nie genug, aber zwei sind schon zu viele.'{NEWLINE} -- Murphy's Laws of Combat{NEWLINE}{NEWLINE}Diese Belobigung würdigt Soldaten, die zwei Ziele in schneller Folge ausschalten. Je schneller wir den Feind entfernen, desto schneller kehren wir heim.{NEWLINE}{NEWLINE}Es gibt vier Stufen dieser Auszeichnung für diese schnellen Schützen."

  STR_MEDAL_FALLEN: "Gefallenen-Orden"
  STR_MEDAL_FALLEN_DESCRIPTION: "Für einen Soldaten, um ihren Tod und ihre Hingabe an die Verteidigung der Erde zu ehren."
  STR_MEDAL_FALLEN_UFOPEDIA: "'Ein Held ist jemand, der sein Leben für etwas Größeres als sich selbst gegeben hat.'{NEWLINE} -- Joseph Campbell{NEWLINE}{NEWLINE}Der höchste Preis wurde freiwillig gezahlt, damit die Menschheit überleben kann. Diese Auszeichnung wird posthum an alle XCOM-Soldaten verliehen, die im Kampf fallen. Es ist nur passend, sie in unserem Andenken und unseren Taten zu ehren."

  STR_MEDAL_FLANKSHOT: "Enfilade-Belobigung"
  STR_MEDAL_FLANKSHOT_DESCRIPTION: "Für einen Soldaten, der großartige Taktiken eingesetzt hat, um Feinde zu flankieren und zu töten."
  STR_MEDAL_FLANKSHOT_UFOPEDIA: "'Enfilade bedeutet, Truppen oder Geschütze so zu positionieren, dass sie auf eine Flanke feuern können.'{NEWLINE} - Militärisches Wörterbuch{NEWLINE}{NEWLINE}Eine bewährte militärische Taktik: der Flankenangriff nutzt die Schwäche des Gegners sowohl in der Seitenpanzerung als auch darin, dass seine Offensive woanders gerichtet ist.{NEWLINE}{NEWLINE}Diese Belobigung wird für jeweils drei Feindabschüsse von der Flanke verliehen, bis zu viermal."

  STR_MEDAL_GLOBETROTTER: "Weltenbummler"
  STR_MEDAL_GLOBETROTTER_DESCRIPTION: "Für einen Soldaten, der jedes Land der Erde vor der außerirdischen Bedrohung verteidigt hat."
  STR_MEDAL_GLOBETROTTER_UFOPEDIA: "'Folge nicht dem Pfad, wohin er führen mag. Gehe stattdessen dorthin, wo kein Pfad ist, und hinterlasse eine Spur.'{NEWLINE} -- Ralph Waldo Emerson{NEWLINE}{NEWLINE}Diese Auszeichnung wird für jede Mission in jedem Land der Erde verliehen."

  STR_MEDAL_GRENADIER: "Grenadier-Medaille"
  STR_MEDAL_GRENADIER_DESCRIPTION: "Für einen Soldaten, der 3 Außerirdische auf einen Schlag mit geworfenen Sprengstoffen getötet hat."
  STR_MEDAL_GRENADIER_UFOPEDIA: " 'Eine Fünf-Sekunden-Zündschnur brennt immer drei Sekunden lang.{NEWLINE} -- Murphy's Laws of Combat'{NEWLINE}{NEWLINE}Diese Auszeichnung ist für die Soldaten, die ihre X-Com Granaten am besten eingesetzt haben! Mehr als eine normale Auszeichnung für Fertigkeit, belohnt es die Fähigkeit mehrere Gegner auf einmal zu töten.{NEWLINE}{NEWLINE}Vier Stufen der Auszeichnung werden vergeben für das Ausschalten dreier Gegner mit normalen Handgranaten und Annäherungsminen."

  STR_MEDAL_HEADSHOT: "Davidsorden"
  STR_MEDAL_HEADSHOT_DESCRIPTION: "Für einen Soldaten mit ruhiger Hand und einer hohen Anzahl an Kopfschüssen."
  STR_MEDAL_HEADSHOT_UFOPEDIA: "'Der Stein traf Goliaths Stirn, und er fiel mit dem Gesicht zu Boden.' - 1 Sam 17:49{NEWLINE}{NEWLINE}David ist berühmt dafür, den Riesen mit seiner Schleuder und einem gezielten Schuss zu besiegen.{NEWLINE}{NEWLINE}Auch wenn dieser Erfolg teilweise vom Glück abhängt und keinen höheren Schaden verursacht als andere Treffer, ist er dennoch bemerkenswert.{NEWLINE}{NEWLINE}XCOM-Soldaten, die drei Kopfschüsse erzielen, erhalten diese Auszeichnung. Es gibt vier Stufen dieser Medaille."

  STR_MEDAL_HEALER: "Hippokratischer Stern"
  STR_MEDAL_HEALER_DESCRIPTION: "Für einen Soldaten, der medizinische Versorgung im Einsatz geleistet hat."
  STR_MEDAL_HEALER_UFOPEDIA: "'Wir hatten eine tiefe Wertschätzung für den stillen Sanitäter. Er war Krankenschwester, Doktor, Feldlazarett und Krankenhaus für uns. Über dem Schlachtenlärm hörte man oft den Ruf 'Sanitäter!', und Doc war immer da für das 3. Platoon.'{NEWLINE}- Robert W. Black{NEWLINE}{NEWLINE}Der Kampfmediziner ist ein lebenswichtiger Teil jeder Einheit. XCOM-Soldaten kümmern sich um ihre Kameraden und halten sie kampffähig.{NEWLINE}{NEWLINE}Diese Auszeichnung wird für jeweils drei geheilte Wunden vergeben, bis zu zwölf Wunden."

  STR_MEDAL_IMPORTANT_ALIENS_KNOCKED_OUT: "Blitzkreuz"
  STR_MEDAL_IMPORTANT_ALIENS_KNOCKED_OUT_DESCRIPTION: "Für einen Soldaten, der wichtige Ziele mit nicht-tödlicher Gewalt ausgeschaltet hat."
  STR_MEDAL_IMPORTANT_ALIENS_KNOCKED_OUT_UFOPEDIA: "Captain Steven Hiller: 'Weißt du, das sollte eigentlich mein freies Wochenende sein, aber nein... jetzt schlepp ich deinen schweren Hintern durch die brennende Wüste und deine Dreadlocks hängen aus meinem Fallschirm raus.'{NEWLINE} - Independence Day{NEWLINE}{NEWLINE}Diese hohe Auszeichnung würdigt die Gefangennahme eines hochrangigen Ziels. Feindliche Anführer und Kommandanten liefern wertvolle Informationen über die Ziele der Außerirdischen und Wege, sie zu besiegen.{NEWLINE}{NEWLINE}Diese Auszeichnung wird einmalig an jeden Soldaten vergeben, der ein solches Ziel gefangen nimmt."

  STR_MEDAL_IRON_MAN: "Iron Man"
  STR_MEDAL_IRON_MAN_DESCRIPTION: "Für einen Soldaten, der wahrlich ein eiserner Mann oder eine eiserne Frau ist."
  STR_MEDAL_IRON_MAN_UFOPEDIA: "'Wenn dir alles außer dem Feind fehlt, befindest du dich in einer Kampfzone.'{NEWLINE} -- Murphy's Laws of Combat{NEWLINE}{NEWLINE}Diese Auszeichnung wird an Soldaten vergeben, die den Feind im Alleingang bekämpfen. Nur die Härtesten versuchen es – und noch weniger überleben es. Diese Medaille hat nur eine Stufe."

  STR_MEDAL_LUCKYSHOT: "Belobigung für Glück"
  STR_MEDAL_LUCKYSHOT_DESCRIPTION: "Für einen Soldaten, der entgegen aller Wahrscheinlichkeit sein Ziel getroffen hat."
  STR_MEDAL_LUCKYSHOT_UFOPEDIA: "'Das beste Glück ist das, welches man sich selbst schafft.'{NEWLINE} -- Douglas MacArthur{NEWLINE}{NEWLINE}Wenn ein Soldat wiederholt die Wahrscheinlichkeit herausfordert und unglaubliche Treffer landet, wird er für diese Auszeichnung qualifiziert.{NEWLINE}{NEWLINE}Diese Auszeichnung wird für jeweils drei Glückstreffer vergeben und hat vier Stufen."

  STR_MEDAL_MAN_OF_STEEL: "Mensch aus Stahl"
  STR_MEDAL_MAN_OF_STEEL_DESCRIPTION: "Für einen Soldaten, der während einer einzigen Mission mehrfach getroffen wurde."
  STR_MEDAL_MAN_OF_STEEL_UFOPEDIA: "Arthur: 'Schau, du verdammter Narr, du hast ja gar keine Arme mehr!'{NEWLINE}Schwarzer Ritter: 'Doch habe ich.'{NEWLINE}Arthur: 'Schau!'{NEWLINE}Schwarzer Ritter: 'Nur eine Fleischwunde.'{NEWLINE} (Monty Python und der Heilige Gral){NEWLINE}{NEWLINE}Die eiserne Konstitution dieses Soldaten (und möglicherweise seine Rüstung) erlaubte es ihm, mehrere Treffer zu überstehen.{NEWLINE}{NEWLINE}Diese Auszeichnung wird für fünf Treffer vergeben und hat drei Stufen."

  STR_MEDAL_MARTYR: "Medaille der Selbstaufopferung"
  STR_MEDAL_MARTYR_DESCRIPTION: "Posthum für einen Soldaten, der nicht alleine unterging."
  STR_MEDAL_MARTYR_UFOPEDIA: "'Es gibt keinen freieren Menschen als den, der nichts zu verlieren hat.'{NEWLINE} -- Don Quijote{NEWLINE}{NEWLINE}Diese Auszeichnung wird für das höchste Opfer im Dienst vergeben – für jeden Feind, den der Soldat mit ins Grab nimmt, bis zu zehn."

  STR_MEDAL_MEDIKIT: "Feldchirurg"
  STR_MEDAL_MEDIKIT_DESCRIPTION: "Für einen Soldaten, der regelmäßig das Medikit auf dem Schlachtfeld eingesetzt hat."
  STR_MEDAL_MEDIKIT_UFOPEDIA: "'...Aber diese Wunde war früh erkannt, noch innerhalb des Sechs-Stunden-Fensters – ein grober Richtwert für den Feldchirurgen bei solchen Risiken. Wenn seine Behauptung korrekt war, hätte er ein Leben retten können.'{NEWLINE}- Frank G. Slaughter, *Battle Surgeon*{NEWLINE}{NEWLINE}Der Feldchirurg beherrscht den Umgang mit allen medizinischen Werkzeugen.{NEWLINE}{NEWLINE}Diese Auszeichnung wird für jeweils drei Anwendungen von Heilung, Stimulanzien oder Schmerzmitteln vergeben. Sie hat vier Stufen."

  STR_MEDAL_MELEE: "Nahkampfspange"
  STR_MEDAL_MELEE_DESCRIPTION: "Für einen Soldaten, der Außerirdische mit einer tödlichen Nahkampfwaffe getötet hat."
  STR_MEDAL_MELEE_UFOPEDIA: "'Fließe im gegenwärtigen Moment. Wir sind ständig im Wandel und nichts ist festgelegt. Sei flexibel wie Wasser, still wie ein Spiegel, reagiere wie ein Echo.'{NEWLINE} -- Bruce Lee{NEWLINE}{NEWLINE}Diese Medaille wird für jeden Nahkampftreffer vergeben, der einen Außerirdischen tötet. Sie wird alle vier Kills vergeben und hat vier Stufen."

  STR_MEDAL_MERCY_CROSS: "Gnadenkreuz"
  STR_MEDAL_MERCY_CROSS_DESCRIPTION: "Für einen Soldaten, der im Alleingang alle Außerirdischen einer Mission betäubt hat."
  STR_MEDAL_MERCY_CROSS_UFOPEDIA: "'Es ist besser, eine Armee intakt zu erobern, als sie zu zerstören.' – Sun Tzu{NEWLINE}{NEWLINE}Gefangene Außerirdische liefern wertvolle Informationen. Was könnte besser sein, als die gesamte Besatzung eines UFOs zu betäuben?{NEWLINE}-- Ganz allein!{NEWLINE}{NEWLINE}Diese Auszeichnung wird an Soldaten vergeben, die alle Gegner einer taktischen Mission alleine außer Gefecht setzen. Sie hat drei Stufen."

  STR_MEDAL_MIA: "Orden der Vergessenen"
  STR_MEDAL_MIA_DESCRIPTION: "Für einen Soldaten, der verlorenging, und seine Hingabe an die Verteidigung der Erde"
  STR_MEDAL_MIA_UFOPEDIA: " '...wir zollen den Männern und Frauen, die nicht vom Schlachtfeld zurückgekehrt sind, unseren Respekt... wir werden ihre Opfer niemals vergessen... wir werden ihr Andenken für immer ehren.' {NEWLINE}- Barack Dronenmord Obama{NEWLINE}{NEWLINE}Die entsetzliche Unabdinglichkeit, einen gefallenen Genossen zurückzulassen, kann nicht bestritten werden.  X-Com ehrt jene, die in solcher Weise mehr als ihren Teil geleistet haben.{NEWLINE}{NEWLINE}DIeser Orden ist für Soldaten, die vermisst werden. Wir ehren die, die nicht widerkehrten."

  STR_MEDAL_MINDCONTROL: "Imperio"
  STR_MEDAL_MINDCONTROL_DESCRIPTION: "Für einen Soldaten, der den Geist des Feindes vollständig beherrscht hat."
  STR_MEDAL_MINDCONTROL_UFOPEDIA: "'Der Geist wirkt wie ein Feind für diejenigen, die ihn nicht kontrollieren.'{NEWLINE}-- Bhagavad Gita{NEWLINE}{NEWLINE}Diese Auszeichnung wird an alle Soldaten verliehen, die einen Gegner mental kontrollieren können. Für jeweils drei erfolgreiche Versuche wird diese Auszeichnung vergeben. Sie hat vier Stufen."

  STR_MEDAL_NIGHT_TERRORMISSION_COUNT: "Längste-Nacht-Band"
  STR_MEDAL_NIGHT_TERRORMISSION_COUNT_DESCRIPTION: "Für einen Soldaten, der die Schrecken nächtlicher Terrormissionen erlebt hat."
  STR_MEDAL_NIGHT_TERRORMISSION_COUNT_UFOPEDIA: "'Der Tag hält Albträume nicht auf – Nacht wird nicht für Träume gebraucht – Es gibt keine bessere Zeit als hier, keinen besseren Ort als jetzt.'{NEWLINE}-- Chase LeBlanc{NEWLINE}{NEWLINE}Diese Auszeichnung wird an Soldaten verliehen, die die Schrecken nächtlicher Terrormissionen miterlebt haben. Gefährliche Außerirdische lauern im Schatten und der Tod kommt schnell für Unvorsichtige. Wer überlebt, beweist wahren Mut.{NEWLINE}{NEWLINE}Diese Auszeichnung wird für jede nächtliche Terrormission bis zu viermal vergeben."

  STR_MEDAL_NIKE_CROSS: "Nike-Kreuz"
  STR_MEDAL_NIKE_CROSS_DESCRIPTION: "Für einen Soldaten, der im Alleingang alle Außerirdischen einer Mission getötet oder getötet und betäubt hat."
  STR_MEDAL_NIKE_CROSS_UFOPEDIA: "'Du musst glauben, dass du im Recht bist, um ein guter Soldat zu sein, deshalb sind Söldner nicht geeignet. Es ist die Emotion, die einen guten Kämpfer ausmacht – und das Wissen, dass man für eine gute Sache kämpft.'{NEWLINE}-- Audie Murphy{NEWLINE}{NEWLINE}Diese Auszeichnung würdigt unvergleichliche Kampffähigkeiten. Dieser Krieger verkörpert Tödlichkeit und beweist sein Können auf die greifbarste Weise.{NEWLINE}{NEWLINE}Diese Auszeichnung wird ausschließlich an Soldaten vergeben, die im Alleingang alle Gegner einer Mission ausschalten. Sie kann bis zu dreimal verliehen werden."

  STR_MEDAL_ONE_MONTH_SERVICE: "XCOM-Dienstmedaille"
  STR_MEDAL_ONE_MONTH_SERVICE_DESCRIPTION: "Für alle Soldaten in ihrem ersten Monat als Anerkennung für den Kampf gegen die außerirdische Bedrohung und als Teil der Streitkräfte zur Rettung der Menschheit. Diese Medaille hat keine zusätzlichen Verzierungen."
  STR_MEDAL_ONE_MONTH_SERVICE_UFOPEDIA: "'Ein Mann, der nichts hat, wofür er bereit ist zu kämpfen; nichts, was ihm wichtiger ist als seine eigene Sicherheit, ist ein elendes Geschöpf, das keine Chance auf Freiheit hat, außer durch die Anstrengungen besserer Männer als er selbst.'{NEWLINE}-- John Stewart Mill{NEWLINE}{NEWLINE}Diese Auszeichnung wird allen Soldaten von XCOM verliehen, als Anerkennung für ihren Dienst gegen die außerirdische Bedrohung. Diese Medaille hat keine zusätzlichen Verzierungen."

  STR_MEDAL_ORIGINAL8_DESCRIPTION: "Für einen Soldaten, der als Erster den unbekannten Feind bekämpfte."
  STR_MEDAL_ORIGINAL8_NAME: "Erster im Dienst"
  STR_MEDAL_ORIGINAL8_UFOPEDIA: "Das XCOM-Projekt ist ein streng geheimes Projekt, initiiert vom Rat, um die massive globale Außerirdischeninvasion zu bekämpfen, nachdem die konventionellen Streitkräfte versagt hatten.{NEWLINE}{NEWLINE}Nur wenige Menschen erfüllten die Voraussetzungen für die Teilnahme am Projekt. Noch weniger werden überleben.{NEWLINE}{NEWLINE}Diese Auszeichnung wird den ursprünglichen Soldaten des XCOM-Kampfkommandos verliehen."

  STR_MEDAL_POSTMORTEM_KILL: "Sensenmann-Orden"
  STR_MEDAL_POSTMORTEM_KILL_DESCRIPTION: "Posthum für einen Soldaten, der trotz des Todes auf dem Schlachtfeld präsent blieb."
  STR_MEDAL_POSTMORTEM_KILL_UFOPEDIA: "'Es gibt Wege, die nicht beschritten werden dürfen, Armeen, die nicht angegriffen werden dürfen, Städte, die nicht belagert werden dürfen, Positionen, die nicht verteidigt werden dürfen, Befehle des Souveräns, die nicht befolgt werden dürfen.'{NEWLINE}-- Sun Tzu{NEWLINE}{NEWLINE}Diese Auszeichnung wird posthum für jeden Gegner vergeben, den der Soldat mit ins Grab nimmt, bis zu zehnmal."

  STR_MEDAL_PSIPANIC: "Crucio"
  STR_MEDAL_PSIPANIC_DESCRIPTION: "Für einen Soldaten, der den Geist des Feindes gebrochen hat."
  STR_MEDAL_PSIPANIC_UFOPEDIA: "'Der Geist ist sein eigener Ort und kann in sich selbst ein Paradies aus der Hölle machen, eine Hölle aus dem Paradies.'{NEWLINE}-- John Milton{NEWLINE}{NEWLINE}Diese Auszeichnung wird an alle Soldaten verliehen, die einen Gegner psionisch in Panik versetzen können. Für jeweils drei erfolgreiche Versuche wird diese Auszeichnung vergeben. Sie hat vier Stufen."

  STR_MEDAL_REACTIONFIRE: "Belobigung für Schnelligkeit"
  STR_MEDAL_REACTIONFIRE_DESCRIPTION: "Für einen Soldaten, der blitzschnelle Reflexe zeigte und Außerirdische tötete, bevor sie zurückschlagen konnten."
  STR_MEDAL_REACTIONFIRE_UFOPEDIA: "'Lass dir in einer Gefechtssituation nicht von Emotionen wie Furcht und Zorn den Verstand trüben. Akzeptiere die Situation einfach und reagiere, selbst bei unmöglichen Chancen. Behalte einen klaren Kopf und du bist deinen Angreifern einen Schritt voraus.'{NEWLINE}-- Aaron B. Powell, Doomsday Diaries{NEWLINE}{NEWLINE}Diese Medaille wird an Soldaten vergeben, deren blitzschnelle Reflexe sie zu instinktiven Killern machen. Gegner während ihrer eigenen Runde auszuschalten, reduziert die Gefahr für die gesamte Einheit.{NEWLINE}{NEWLINE}Diese Medaille wird für jeweils zwei Reaktionsfeuer-Abschüsse vergeben, bis zu viermal."

  STR_MEDAL_REARSHOT: "Paris-Empfehlung"
  STR_MEDAL_REARSHOT_DESCRIPTION: "Für einen Soldaten, der Schläue bewies und Gegner von hinten ausschaltete."
  STR_MEDAL_REARSHOT_UFOPEDIA: "'Paris, aus der griechischen Mythologie, ist berühmt dafür, den nahezu unbesiegbaren Helden Achilles mit einem Pfeilschuss an der Ferse zu neutralisieren.'{NEWLINE}{NEWLINE}XCOM-Soldaten, die wie Paris vorgehen, können ähnliche Schwachstellen bei ihren außerirdischen Gegnern ausnutzen.{NEWLINE}{NEWLINE}Diese Auszeichnung wird für jeweils drei Feindtötungen von hinten vergeben, bis zu viermal."

  STR_MEDAL_REVIVE: "Engelkreuz"
  STR_MEDAL_REVIVE_DESCRIPTION: "Für einen Soldaten, der einen Kameraden von der Schwelle des Todes zurückholte."
  STR_MEDAL_REVIVE_UFOPEDIA: "'Nein, du stirbst nicht, solange ich dabei bin.' sagte Doc. Kurz bevor der Helikopter kam, hörte sein Herz auf zu schlagen. Doc belebte ihn wieder, indem er auf die Brust schlug und Mund-zu-Mund beatmete. Schließlich landete der Helikopter und wir luden ihn an Bord.'{NEWLINE}-- Stephen Paul Campos{NEWLINE}{NEWLINE}Wenn ein Soldat ohnmächtig und blutend auf dem Schlachtfeld liegt, weiß dieser Träger, wie er ihn zurückholen kann.{NEWLINE}{NEWLINE}Diese Auszeichnung wird jedes Mal vergeben, wenn ein Verwundeter wiederbelebt wird, bis zu drei Mal."

  STR_MEDAL_SAPPER: "Saboteur-Medaille"
  STR_MEDAL_SAPPER_DESCRIPTION: "Für einen Soldaten, der einen metallischen Feind mit einem Sprengsatz aus Hochexplosivstoff ausgeschaltet hat."
  STR_MEDAL_SAPPER_UFOPEDIA: "'Da ist ein Panzer an der Baumgrenze. Er wird uns überrollen... außer jemand stoppt ihn mit einer Sprengladung.'{NEWLINE}... 'Es sind nicht mehr viele Männer übrig.'{NEWLINE}-- 'Ich gehe.'{NEWLINE}-- Juoksuhaudantie{NEWLINE}{NEWLINE}Diese Auszeichnung wird an Soldaten verliehen, die metallische Feinde wie Cyberdisks und Sektopoden mit einem HE-Paket zerstören. Diese extrem gefährlichen Heldentaten werden mit dieser Medaille anerkannt.{NEWLINE}{NEWLINE}Sie wird für jeden HE-Kill eines robotischen Gegners vergeben und kann bis zu zehnmal verliehen werden."

  STR_MEDAL_SECTOPOD_KILL: "Belobigung für Metall-Monster"
  STR_MEDAL_SECTOPOD_KILL_DESCRIPTION: "Für einen Soldaten, der das furchterregendste feindliche Konstrukt besiegt hat: den Sektopoden!"
  STR_MEDAL_SECTOPOD_KILL_UFOPEDIA: "'Ein Roboter darf der Menschheit keinen Schaden zufügen oder durch Untätigkeit zulassen, dass der Menschheit Schaden widerfährt.'{NEWLINE}-- Isaac Asimov: Das „Nullte Gesetz der Robotik“{NEWLINE}{NEWLINE}Das dröhnende, bodenerschütternde Auftreten des Sektopoden jagt selbst den tapfersten Soldaten einen Schauer über den Rücken. Die Schwierigkeit, dieses Metallmonster zu Fall zu bringen, wird mit dieser Auszeichnung gewürdigt.{NEWLINE}{NEWLINE}Diese Belobigung wird jedem Soldaten verliehen, der einen Sektopoden tötet, unabhängig von der Methode. Es gibt zehn Stufen für bis zu zehn Abschüsse."

  STR_MEDAL_SEVEN_IN_ONE: "Orden des Ruhms"
  STR_MEDAL_SEVEN_IN_ONE_DESCRIPTION: "Für einen Soldaten, der entscheidend zum Erfolg einer Mission beigetragen hat."
  STR_MEDAL_SEVEN_IN_ONE_UFOPEDIA: "'Wenn du mehr als deinen Anteil an Zielen nimmst, wirst du mehr als deinen Anteil an Zielen haben, die du nehmen musst.'{NEWLINE}-- Murphy’s Laws of Combat{NEWLINE}{NEWLINE}Diese Auszeichnung ehrt einen Soldaten, der sieben Gegner in einer einzigen Mission getötet hat. Diese Leistung ist außergewöhnlich und zeigt den wahren Kampfgeist dieses Elitekämpfers.{NEWLINE}{NEWLINE}Diese Medaille kann bis zu dreimal verliehen werden."

  STR_MEDAL_SLAVEKILLS: "Puppenspieler"
  STR_MEDAL_SLAVEKILLS_DESCRIPTION: "Für einen Soldaten, der Außerirdische gegeneinander eingesetzt hat."
  STR_MEDAL_SLAVEKILLS_UFOPEDIA: "'Beschuldigung bedeutete Verurteilung, und Verurteilung bedeutete Bestrafung – eines folgte dem anderen mit unaufhaltsamer Gewissheit.'{NEWLINE}-- Frederick Douglass{NEWLINE}{NEWLINE}Diese Auszeichnung wird an Soldaten verliehen, die es schaffen, Außerirdischen gegeneinander auszuspielen. Sie wird für jeweils drei erfolgreiche Fälle vergeben und hat vier Stufen."

  STR_MEDAL_SNIPER: "Scharfschützen-Belobigung"
  STR_MEDAL_SNIPER_DESCRIPTION: "Für einen Soldaten, der Langstreckenschüsse auf Ziele erzielt hat."
  STR_MEDAL_SNIPER_UFOPEDIA: "{NEWLINE}'Mein Fadenkreuz ruhig,{NEWLINE} mein Abzug kalt,{NEWLINE}ich spüre den Rückstoß{NEWLINE} und sehe ihn fallen.{NEWLINE}Die Mission erfüllt,{NEWLINE} ich packe meine Ausrüstung.{NEWLINE}Ich werde mein Gewehr{NEWLINE} im Hinterland reinigen.'{NEWLINE}-- Marine Sniper{NEWLINE}{NEWLINE}Diese Auszeichnung würdigt außergewöhnliche Fähigkeiten im tödlichen Kampf aus der Distanz.{NEWLINE}{NEWLINE}Sie wird für jeweils drei Fernschüsse vergeben und hat vier Stufen."

  STR_MEDAL_STAR_OF_ASCLEPIUS: "Asclepius-Stern"
  STR_MEDAL_STAR_OF_ASCLEPIUS_DESCRIPTION: "Für einen Soldaten, der unter starkem feindlichem Beschuss stand."
  STR_MEDAL_STAR_OF_ASCLEPIUS_UFOPEDIA: "'Krieg ist Leben multipliziert mit einer Zahl, die niemand kennt.'{NEWLINE}-- Sebastian Junger{NEWLINE}{NEWLINE}Durch das Aufsichziehen intensiven feindlichen Feuers hat dieser Soldat seinen Kameraden heldenhaft geholfen.{NEWLINE}{NEWLINE}Diese Medaille wird an Soldaten vergeben, die zehnmal zum Ziel feindlichen Feuers wurden. Sie hat drei Stufen."

  STR_MEDAL_STATGAIN: "Athena-Belobigung"
  STR_MEDAL_STATGAIN_DESCRIPTION: "Für einen Soldaten, der sich konsequent verbessert hat."
  STR_MEDAL_STATGAIN_UFOPEDIA: "'Athene verkörpert Weisheit, Kriegsführung, Zivilisation, Stärke, Strategie, Handwerk und Gerechtigkeit.'{NEWLINE}{NEWLINE}XCOM-Soldaten trainieren ständig, und jene, die sich verbessern, verkörpern das athenische Ideal.{NEWLINE}{NEWLINE}Diese Auszeichnung wird für jeweils zehn Punkte Gesamtverbesserung der Werte vergeben. Sie hat zehn Stufen bis maximal 100 Punkte."

  STR_MEDAL_TOTAL_FRIENDLY_FIRED: "Schwarzes Kreuz"
  STR_MEDAL_TOTAL_FRIENDLY_FIRED_DESCRIPTION: "Für einen Soldaten, der durch Eigenbeschuss getroffen wurde."
  STR_MEDAL_TOTAL_FRIENDLY_FIRED_UFOPEDIA: "'Geschosse diskriminieren nicht. Sie sind gleichberechtigte Projektile.'{NEWLINE}-- Peter Duysings{NEWLINE}{NEWLINE}Auch bekannt als: „Du hättest dich ducken sollen, Karl!“ – diese Medaille wird Soldaten verliehen, die von Eigenbeschuss getroffen wurden. Wie Murphy sagt: „Friendly Fire gibt es nicht.“{NEWLINE}{NEWLINE}Diese Auszeichnung kann bis zu viermal vergeben werden."

  STR_MEDAL_TOTAL_IMPORTANT_MISSIONS: "Orden der Erde"
  STR_MEDAL_TOTAL_IMPORTANT_MISSIONS_DESCRIPTION: "Für einen Soldaten, der entscheidend zur Verteidigung der Erde beigetragen hat."
  STR_MEDAL_TOTAL_IMPORTANT_MISSIONS_UFOPEDIA: "'Wer die Schönheit der Erde betrachtet, findet Kräfte, die ein Leben lang tragen.'{NEWLINE}-- Rachel Carson{NEWLINE}{NEWLINE}Durch die Teilnahme an wichtigen Missionen hat dieser Soldat entscheidend zur Verteidigung unseres Planeten beigetragen und die Aktivitäten der Außerirdischen geschwächt.{NEWLINE}{NEWLINE}Diese Medaille wird für wichtige Missionen vergeben (keine kleinen oder mittleren Aufklärungsmissionen). Sie wird bei 3, 5, 10, 15, 20, 25, 30, 35, 40 und 50 Missionen verliehen."

  STR_MEDAL_TOTAL_KNOCKED_OUT: "Heldentum-Medaille"
  STR_MEDAL_TOTAL_KNOCKED_OUT_DESCRIPTION: "Für einen Soldaten, der bis zum Letzten kämpfte."
  STR_MEDAL_TOTAL_KNOCKED_OUT_UFOPEDIA: "'Nur ein Mann, der weiß, wie es ist, besiegt zu werden, kann den Grund seiner Seele erreichen und das Extra Bisschen Stärke packen, die es braucht, um ein ausgeglichenes Match zu gewinnen.'{NEWLINE} -- Muhammad Ali{NEWLINE}{NEWLINE} Diese Medaille wird dem Soldaten verliehen, der bis zur letzten Neige seiner Stärke gekämpft hat! Diese Medaille wird an Soldaten verliehen, die auf dem Schlachtfeld ohnmächtig wurden, aber überlebten.{NEWLINE}{NEWLINE} Die Medaille wird für je zwei Ohnmachten verliehen, bis zu einem Maximum von 8 Stufen (für 4 Stufen der Zitierung)."

  STR_MEDAL_TOTAL_LONE_SURVIVOR: "Stern der Tapferkeit"
  STR_MEDAL_TOTAL_LONE_SURVIVOR_DESCRIPTION: "Für einen Soldaten, der als Einziger eine Mission überlebte."
  STR_MEDAL_TOTAL_LONE_SURVIVOR_UFOPEDIA: "'Ich werde niemals aufgeben. Meine Nation erwartet von mir, körperlich härter und geistig stärker zu sein als meine Feinde. Wenn ich zu Boden gehe, stehe ich wieder auf – jedes Mal. Ich werde jede verbleibende Kraft einsetzen, um meine Kameraden zu schützen und unsere Mission zu erfüllen. Ich bin niemals aus dem Kampf.'{NEWLINE}-- Marcus Luttrell{NEWLINE}{NEWLINE}Während die Truppe ausgelöscht wurde, behielt dieser Soldat einen klaren Kopf und konnte das Dropship retten.{NEWLINE}{NEWLINE}Der alleinige Überlebende einer Mission erhält diese Medaille nur einmal."

  STR_MEDAL_TOTAL_MISSION_COUNT: "Militär-Kreuz"
  STR_MEDAL_TOTAL_MISSION_COUNT_DESCRIPTION: "Für einen Soldaten nach der Teilnahme an vielen Missionen."
  STR_MEDAL_TOTAL_MISSION_COUNT_UFOPEDIA: "'Beständigkeit, Ausdauer und Hartnäckigkeit trotz aller Hindernisse, Entmutigungen und Unmöglichkeiten: Es ist dies, was in allem die starke Seele von der schwachen unterscheidet.'{NEWLINE}-- Thomas Carlyle{NEWLINE}{NEWLINE}Diese Auszeichnung wird Soldaten verliehen, die an zahlreichen Missionen teilgenommen haben. Ihre Zuverlässigkeit und Hartnäckigkeit machen sie zu geschätzten Veteranen der Streitkräfte.{NEWLINE}{NEWLINE}Die Medaille wird bei 4, 8, 12, 16, 20, 25, 30, 35, 40 und 50 Missionen verliehen."

  STR_MEDAL_TOTAL_MISSION_REGION_COUNT: "Kampagnenband"
  STR_MEDAL_TOTAL_MISSION_REGION_COUNT_DESCRIPTION: "Für einen Soldaten, der erfolgreich viele Regionen verteidigte."
  STR_MEDAL_TOTAL_MISSION_REGION_COUNT_UFOPEDIA: "'Wir müssen all unseren Truppen danken, und vor allem denen, für die wir nie genug Dankbarkeit ausdrücken können... da sie ihr Leben gaben, damit wir alle frei sein können.'{NEWLINE}-- Virgil Goode{NEWLINE}{NEWLINE}Die Länder einer bestimmten Region erkennen die Fertigkeiten und Tapferkeit an, mit denen dieser Soldat ihre Leben und ihr Eigentum im Krieg gegen die Außerirdische geschützt hat.{NEWLINE}{NEWLINE}Diese Medaille wird für 10, 20 und 30 Missionen in einer bestimmten Region verliehen."

  STR_MEDAL_TOTAL_MONTH_SERVICE: "Überlebensmedaille"
  STR_MEDAL_TOTAL_MONTH_SERVICE_DESCRIPTION: "Für einen Soldaten, der viele Monate gedient hat."
  STR_MEDAL_TOTAL_MONTH_SERVICE_UFOPEDIA: "Diese Auszeichnung wird Soldaten verliehen, die der XCOM über längere Zeit treu gedient haben. Wir würdigen die enormen Opfer dieser tapferen Truppen während ihres Dienstes. Diese Medaille ehrt Soldaten, die Freunde kommen und gehen sehen und sich im Kampf gegen den Feind bewährt haben. Ihre Zuverlässigkeit und Ausdauer machen sie zu erfahrenen Veteranen.{NEWLINE}{NEWLINE}Die Auszeichnung wird für jeweils drei Monate Dienst verliehen."

  STR_MEDAL_TOTAL_NIGHT_MISSIONS: "Nachtjäger"
  STR_MEDAL_TOTAL_NIGHT_MISSIONS_DESCRIPTION: "Für einen Soldaten, der an mehreren Nachtmissionen teilnahm."
  STR_MEDAL_TOTAL_NIGHT_MISSIONS_UFOPEDIA: "'Aus der Nacht, die mich umhüllt,{NEWLINE} so schwarz wie die Grube von Pol zu Pol,{NEWLINE} danke ich welchen Göttern auch immer,{NEWLINE} für meine unbezwingbare Seele.'{NEWLINE}-- Invictus – William Ernest Henley{NEWLINE}{NEWLINE}Nachtoperationen gegen einen Feind, der fast doppelt so weit sehen kann wie deine Soldaten, sind extrem herausfordernd.{NEWLINE}{NEWLINE}Diese Medaille wird an Soldaten verliehen, die an Nachtmissionen teilnehmen. Für jeweils drei Nachtmissionen wird eine Stufe der Auszeichnung vergeben."

  STR_MEDAL_TRAP: "Pirscher-Kreuz"
  STR_MEDAL_TRAP_DESCRIPTION: "Für einen Soldaten, der Guerilla-Taktiken nutzte"
  STR_MEDAL_TRAP_UFOPEDIA: "' Hallo? Jemand zu Hause?{NEWLINE}Hallo, Mr. Gopher!{NEWLINE}Ich bin's, Mr. Eichhörnchen.{NEWLINE}Nur ein harmloses Eichhörnchen.{NEWLINE}Kein Plastiksprengstoff oder so.{NEWLINE}Nichts, worum man sich Sorgen machen müsste.{NEWLINE}    - CaddyShack. '{NEWLINE}{NEWLINE}Diese Medaille wird für Meisterschaft im Einsatz von Sprengfallen und Minen verliehen. Es gibt 4 Stufen der Auszeichnung für 1,3,5 und 8 Tötungen mit Annäherungsgranaten."

  STR_MEDAL_VALIANT_CRUX: "Ritterlichkeits-Crux"
  STR_MEDAL_VALIANT_CRUX_DESCRIPTION: "Für einen Soldaten, der alle Zivilisten während einer Terrormission beschützt hat."
  STR_MEDAL_VALIANT_CRUX_UFOPEDIA: "'Der wahre Soldat kämpft, weil er liebt, was er in seinem Rücken hat und nicht, weil er hasst, was vor ihm steht.'{NEWLINE}    --G. K. CHESTERTON {NEWLINE}{NEWLINE}Wenn Terror losbricht, ist es nur eine winzige Schar, die so überwältigend zurückschlagen kann, dass alle unschuldigen Zivilisten von der unmenschlichen Bedrohung verschont bleiben.{NEWLINE}{NEWLINE}Alle Soldaten erhalten diese Auszeichnung für die Teilnahme an einer Terror Mission bei der alle Zivilisten gerettet wurden. Diese Auszeichnung hat 4 Stufen."

  STR_MEDAL_WEAPON_PROFICIENCY: "Waffenkönnen-Medaille"
  STR_MEDAL_WEAPON_PROFICIENCY_DESCRIPTION: "Für einen Soldaten der sich an {0}.auszeichnete."
  STR_MEDAL_WEAPON_PROFICIENCY_UFOPEDIA: "'Alles, was wert ist, beschossen zu werten, ist wert, zweimal beschossen zu werden. Munition ist billig. Leben ist teuer.'{NEWLINE}   -- US Ranger Rules for Gunfighting{NEWLINE}{NEWLINE}Diese Medaille ehrt außerordentliche Fertigkeiten mit einer bestimmten Waffe. Dieser Soldat ist ein echter Experte in seinem Feld und ein Meister seines Faches.{NEWLINE}{NEWLINE}Diese Medaille wird für 10. 20. und 30 Abschüsse mit einer bestimmten Waffe verliehen."

  STR_MEDAL_WOUNDED: "Verwundetenabzeichen"
  STR_MEDAL_WOUNDED_DESCRIPTION: "Für einen Soldaten, der auf dem Schlachtfeld verwundet wurde"
  STR_MEDAL_WOUNDED_UFOPEDIA: "Verletzungen, die man auf dem Schlachtfeld erhält, sind spürbare Beweise der Bereitschaft des XCOM-Soldaten sich in die Schusslinie zu begeben. Dieses Opfer wird in dieser Version der klassischen Auszeichnung für verwundete Soldaten geehrt. {NEWLINE} {NEWLINE} Diese Medaille wird Soldaten verliehen, die auf dem Schlachtfeld verletzt wurden. Einmalige Auszeichnung."
#END COMMENDATIONS

