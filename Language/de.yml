  MUTON_ELITE_GUARD_ARMOR0_UFOPEDIA: "Dies stellt die grundlegenden Panzerungswerte dieser Spezies dar. Höherrangige Exemplare können verbesserte Werte besitzen, behalten jedoch die gleichen grundlegenden Resistenzen. Ranghöhere Einheiten dieser Spezies erhalten folgende Panzerungssteigerung:{NEWLINE}Frontpanzerung: +10 Seitenpanzerung: +10 Rückenpanzerung: +10 Unterpanzerung: +10"
  STR_MUTON_ELITE_GUARD: "Mutonen Elite Wächter"
  STR_MUTON_ELITE_GUARD_SOLDIER: "Mutonen Elite Wächter-Soldat"
  STR_MUTON_ELITE_GUARD_ENGINEER: "Mutonen Elite Wächter-Ingenieur"
  STR_MUTON_ELITE_GUARD_NAVIGATOR: "Mutonen Elite Wächter-Navigator"
  STR_MUTON_ELITE_GUARD_LEADER: "Mutonen Elite Wächter-Anführer"
  STR_MUTON_ELITE_GUARD_UFOPEDIA: "Die Elite der Elite – die stärksten, zähesten und klügsten Krieger der Mutonen erhalten offenbar eine besondere Stellung in der Starspawn-Hierarchie. Sie besitzen eine erhebliche Resistenz gegen psionische Einflüsse, und es ist noch unklar, wie ihre ätherischen Meister sie unter Kontrolle halten. Wir vermuten eine Art Loyalitätsindoktrination oder eine Droge."
  STR_MUTON_ELITE_GUARD_CORPSE: "Toter Mutonen Elite Wächter"
  STR_MUTON_ELITE_GUARD_AUTOPSY: "Mutonen Elite Guard-Autopsie"
  STR_MUTON_ELITE_GUARD_AUTOPSY_UFOPEDIA: "Dieser Körper zeigt zahlreiche Kampfnarben sowie zusätzliche kybernetische Implantate. Außerdem fanden wir Spuren einer unbekannten Droge im Blut, die offenbar totale Gehorsamkeit erzeugt. Fällt der Spiegel dieser Substanz unter einen bestimmten Wert, beginnen lebenswichtige Körperfunktionen auszufallen. Die äußere Haut ist eher ein Kampfanzug als echte Haut und extrem widerstandsfähig gegen Laser-, Plasma- und Sprengschaden."

