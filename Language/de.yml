  STR_HOVERDRONE_FLARE_WEAPON: "Schweb.-Drohne Elektro-Leuchtfackelwerfer"
  STR_HOVERDRONE_FLARE_WEAPON_UFOPEDIA: "Fortschritte in unserer technologischen Entwicklung haben zu einer Erhöhung von Magazin- und Einsatzreichweite geführt, sodass mehr Elektro-Leuchtfackeln über größere Distanz eingesetzt werden können. Die Munitionsauffüllung erfolgt nach Rückkehr von einer Mission in der Basis. Durch einen Sondervertrag mit unserem Lieferanten ist ausreichend Munition vorhanden. Die Schweb.-Drohne/Scout kann unseren Soldaten nun noch besser helfen, in der Dunkelheit zu sehen."

  STR_HOVERDRONE_SMOKE_WEAPON: "Schweb.-Drohne Rauchwerfer"
  STR_HOVERDRONE_SMOKE_WEAPON_UFOPEDIA: "Weitere Fortschritte in unseren technischen Fähigkeiten haben auch die Reichweite und Kapazität der Rauchgranaten erhöht, was eine effektive Möglichkeit bietet, sich vor dem Sichtfeld des Feindes zu verbergen. Die Munitionsauffüllung erfolgt nach Rückkehr von einer Mission in der Basis. Durch einen Sondervertrag mit unserem Lieferanten ist ausreichend Munition vorhanden. Rauch kann sowohl von Vorteil als auch von Nachteil sein. Schweb.-Drohnen im Rauch können feindliche Granaten anziehen."

