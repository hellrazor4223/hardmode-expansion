  STR_DRONE_FLARE_WEAPON_UFOPEDIA: "Dieser kleine Aufsatz für unsere Drohne/Späher ermöglicht es, die Nacht mit Elektro-Leuchtfackeln zu erhellen. Die Munition wird nach Rückkehr von einer Mission auf der Basis aufgefüllt. Wir haben einen Sondervertrag mit unserem Lieferanten, daher ist ausreichend Munition verfügbar. Die Drohne/Späher kann unseren Soldaten nun helfen, im Dunkeln zu sehen."

