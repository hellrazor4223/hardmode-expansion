  STR_TERROR_MISSION_INDUSTRIAL: "TERRORMISSION INDUSTRIEGEBIET"
  STR_TERROR_MISSION_INDUSTRIAL_BRIEFING: "Außerirdische haben einen Angriff auf ein Industriegebiet gestartet. Die Produktionsanlagen und die Zivilbevölkerung sind in Gefahr. Ihr Trupp muss alle Außerirdischen ausschalten und unschuldige Zivilisten vor diesem außerirdischen Überfall schützen. Um die Mission abzubrechen, bringen Sie X-Com-Einsatzkräfte zum Transportfahrzeug und klicken Sie auf das Symbol 'Mission abbrechen'."

  STR_TERROR_MISSION_PORT: "TERRORMISSION HAFEN"
  STR_TERROR_MISSION_PORT_BRIEFING: "Außerirdische haben einen Angriff auf eine Küstenanlage gestartet. Der Hafen und die Zivilbevölkerung sind in Gefahr. Ihr Trupp muss alle Außerirdischen ausschalten und unschuldige Zivilisten vor diesem außerirdischen Überfall schützen. Um die Mission abzubrechen, bringen Sie X-Com-Einsatzkräfte zum Transportfahrzeug und klicken Sie auf das Symbol 'Mission abbrechen'."

  STR_TERROR_MISSION_DOCKED_SHIP: "TERRORMISSION HAFENSCHIFF"

  STR_TERROR_MISSION_TROPICAL: "TERRORMISSION TROPISCH"

  STR_TERROR_MISSION_ISLAND: "TERRORMISSION INSEL"
  STR_TERROR_MISSION_ISLAND_BRIEFING: "Außerirdische haben einen Angriff auf Inselanlagen gestartet. Die Insel und ihre Zivilbevölkerung sind in Gefahr. Ihr Trupp muss alle Außerirdischen ausschalten und unschuldige Zivilisten vor diesem außerirdischen Überfall schützen. Um die Mission abzubrechen, bringen Sie X-Com-Einsatzkräfte zum Transportfahrzeug und klicken Sie auf das Symbol 'Mission abbrechen'."

  STR_TERROR_MISSION_MILITARY_BASE: "TERRORMISSION MILITÄRBASIS"
  STR_TERROR_MISSION_MILITARY_BASE_ALERT: "ALIENS GREIFEN{NEWLINE} MILITÄRBASIS AN, IN"
  STR_TERROR_MISSION_MILITARY_BASE_BRIEFING: "Außerirdische haben einen Angriff auf eine Militärbasis gestartet. Die Militärbasis und ihr Personal sind in Gefahr. Ihr Trupp muss alle Außerirdischen ausschalten, die bereits kämpfenden Streitkräfte unterstützen und unschuldige Zivilisten vor diesem außerirdischen Überfall schützen. Um die Mission abzubrechen, bringen Sie X-Com-Einsatzkräfte zum Transportfahrzeug und klicken Sie auf das Symbol 'Mission abbrechen'."

  STR_TERROR_MISSION_SHIP: "TERRORMISSION SCHIFF"
  STR_TERROR_MISSION_SHIP_ALERT: "ALIENS GREIFEN{NEWLINE} ZIVILES SCHIFF AUF DEM MEER AN"
  STR_TERROR_MISSION_SHIP_BRIEFING: "Ein ziviles Schiff wurde von Außerirdischen gekapert und steuert mit voller Fahrt auf ein dicht besiedeltes Gebiet zu. Die Navigationssysteme auf der Brücke müssen zerstört werden, um das Schiff außer Gefecht zu setzen und eine mögliche Katastrophe zu verhindern. Um die Mission abzubrechen, bringen Sie X-Com-Einsatzkräfte zum Transportfahrzeug oder zum Evakuierungsbereich und klicken Sie auf das Symbol 'Mission abbrechen'."
  STR_TERROR_MISSION_SHIP_DISABLED: "SCHIFF MANÖVRIERUNFÄHIG"
  STR_TERROR_MISSION_SHIP_OPERATIONAL: "SCHIFF NOCH FUNKTIONSFÄHIG"
  STR_TERROR_MISSION_SHIP_NAVIGATION_DESTROYED: "NAVIGATIONSSYSTEM ZERSTÖRT"

  STR_TERROR_MISSION_POLAR: "TERRORMISSION POLAR"
  STR_TERROR_MISSION_POLAR_BRIEFING: "Außerirdische haben einen Angriff auf eine antarktische Forschungsstation gestartet. Die Forschungsstation und ihr Personal sind in Gefahr. Ihr Trupp muss alle Außerirdischen ausschalten und unschuldige Zivilisten vor diesem außerirdischen Überfall schützen. Um die Mission abzubrechen, bringen Sie X-Com-Einsatzkräfte zum Transportfahrzeug und klicken Sie auf das Symbol 'Mission abbrechen'."
#END MISSION STRINGS & ALERTS

