  STR_MUTON_ELITE_ENGINEER: "Mutonen Elite-Ingenieur"
  STR_MUTON_ELITE_NAVIGATOR: "Mutonen Elite-Navigator"
  STR_MUTON_ELITE_LEADER: "Mutonen Elite-Anführer"
  STR_MUTON_ELITE_UFOPEDIA: "Physisch identisch mit Mutonen, haben Mutonen Elite schwere kybernetische und genetische Modifikationen durchlaufen. Sie gehören zu den fittesten, intelligentesten und gefährlichsten Gegnern, denen wir bisher begegnet sind. Ihre ursprüngliche Stammesnatur scheint in diesen Eliten weiterzuleben, da sie offenbar einen langen Auswahlprozess durchlaufen und nur die Besten zu ihnen gehören."
  STR_MUTON_ELITE_CORPSE: "Toter Mutonen Elite"
  STR_MUTON_ELITE_AUTOPSY: "Mutonen Elite-Autopsie"
  STR_MUTON_ELITE_AUTOPSY_UFOPEDIA: "Dieses Exemplar ist identisch mit normalen Mutonen, weist jedoch deutliche Veränderungen auf. Besonders die Panzerung wurde erheblich verbessert, außerdem wurden zusätzliche Implantate zur Zielverfolgung und Überlebensfähigkeit festgestellt."

