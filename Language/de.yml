  STR_GAZER_COMMANDER: "Starrer-Kommandant"
  STR_GAZER_UFOPEDIA: "Starrer wirken wie stehende Schildkröten und sind ebenso robust, wie sie aussehen. Ihre schwere Panzerung bietet außergewöhnlichen Schutz gegen alle Arten von Angriffen, insbesondere panzerbrechende Munition und Plasmawaffen."
  STR_GAZER_CORPSE: "Toter Starrer"
  STR_GAZER_AUTOPSY: "Starrer-Autopsie"
  STR_GAZER_AUTOPSY_UFOPEDIA: "Das einzelne große Auge ist das markanteste anatomische Merkmal dieser Kreatur; sie besitzt krustentierartige Züge, ist jedoch deutlich weiter entwickelt. Die sehr dicke Panzerung wird nicht nur getragen, sondern ist mit dem Körper durch kybernetische Implantate verbunden und dient als äußere Schale."

