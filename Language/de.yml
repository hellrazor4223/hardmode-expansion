  STR_SECTOID_ELITE_COMMANDER: "Sektoid Elite-Kommandant"
  STR_SECTOID_ELITE_UFOPEDIA: "Im Grunde ein Sektoid, teilt diese Spezies viele Gemeinsamkeiten mit ihnen, besitzt jedoch deutlich stärkere psionische Fähigkeiten. Sie sind außerdem etwas größer, mit kleineren, kompakteren Köpfen. Erstaunlicherweise sind ihre Vitalwerte deutlich höher als bei normalen Sektoiden. Auf der Erde tragen sie offenbar einen Art Umweltschutzanzug, der gleichzeitig als persönliche Panzerung dient."
  STR_SECTOID_ELITE_CORPSE: "Toter Sektoid Elite"
  STR_SECTOID_ELITE_AUTOPSY: "Sektoid Elite-Autopsie"
  STR_SECTOID_ELITE_AUTOPSY_UFOPEDIA: "Diese Spezies ist tatsächlich ein Sektoid, jedoch unterscheidet sich ihre DNA in einigen kleinen, aber entscheidenden Punkten, was die leicht andere Physiologie, die erhöhte Vitalität und die stärkeren psionischen Kräfte erklärt."

  MUTON_ELITE_ARMOR0: "Kampfanalyse: Mutonen Elite"
