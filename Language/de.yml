#BEGIN BRIEFINGS
  STR_INITIAL_BRIEFING: "Anfangseinweisung"
  STR_INITIAL_BRIEFING_UFOPEDIA: "Es ist 1999 und Unidentifizierte Flugobjekte (UFOs) durchstreifen mit beunruhigender Regelmäßigkeit den Nachthimmel.{NEWLINE}Berichte über gewaltsame Entführungen und entsetzliche Experimente an Menschen erfüllen Millionen mit Schrecken, als belegbare Fälle von Entführungen durch UFOs in dünner besiedelten Gebieten unseres Globus zum Alltag werden.{NEWLINE}Die Massenhysterie offenbart nur die Ohnmacht der Erde angeischts einer weit überlegenen Technologie. Die Regierungen antworten mit militärischer Mobilmachung, und es werden Nachrichtensperren in den meisten betroffenen Ländern verhängt. Wissenschaftler versuchen, die Außerirdischen zu kontaktieren, ohne nennenswerte Antwort."

  STR_KIRYU_KAI: "Die Kiryu-Kai"
  STR_KIRYU_KAI_UFOPEDIA: "Viele Länder beginnen einen direkten Militärschlag gegen die Invasoren zu planen und versuchen zunächst, allein gegen die Außerirdischen vorzugehen. Im August 1998 etabliert Japan eine Außerirdischenabwehrkampftruppe - die Kiryu-Kai. Mit japanischen Kampfflugzeugen ausgestattet, machte die Kiryu-Kai sicherlich einen mächtigen Eindruck. Nach 5 Monaten kostspieliger Operationen allerdings hatten sie noch kein einziges UFO abgefangen.{NEWLINE}Die Lehre war eindeutig - dies war ein weltweites Problem, mit dem einzelne Länder nicht umgehen konnten."

  STR_EXTRATERRESTRIAL_COMBAT_UNIT: "X-Com"
  STR_EXTRATERRESTRIAL_COMBAT_UNIT_UFOPEDIA: "Am 11. Dezember 1998 trafen sich Vertreter der weltgrößten Wirtschaftsmächte heimlich in Genf. Nach langen Debatten wurde entschieden, eine geheime unabhängige Institution zu gründen, um die außerirdische Bedrohung zu bekämpfen, untersuchen und zu besiegen. Diese Organisation sollte mit den besten Piloten, Soldaten, Wissenschaftlern und Technikern besetzt werden, um als eine multi-nationale Streitmacht zusammenzuarbeiten.{NEWLINE}Der Name dieser Organisation war die Extraterrestrische Kampf-Einheit oder kurz: X-Com"

  STR_SOLDIER_ARMOR_REPAIR: "Soldatenrüstungs-Reparatur"
  STR_SOLDIER_ARMOR_REPAIR_UFOPEDIA: "Da unser Budget knapp bemessen ist, ist es unabdinglich, alle Rüstungen für unsere Soldaten perfekt instandzuhalten. Anweisungen sind ergangen, wie Rüstungen reparieren zu sind, insofern die Leichen der armen Gefallenen geborgen wurden."

  STR_TANK_REPAIR: "SWP-Reparatur"
  STR_TANK_REPAIR_UFOPEDIA: "Nach anfänglicher Diskussion zwischen unseren Wissenschaftlern und unserem leitenden Ingenieur haben wir beschlossen, Verfahren einzuführen, um beschädigte SWPs zu reparieren, sofern ihre Überreste vollständig nach einer erfolgreichen Bodenmission geborgen wurden. Die Reparaturkosten der Einheiten betragen etwa 50 % der ursprünglichen Produktionskosten."

  STR_EXPLOSIVE_AMMO: "Explosivmunition"
  STR_EXPLOSIVE_AMMO_UFOPEDIA: "Unsere fortschrittlichen Infanteriewaffen, die Schweren Kanonen und die Automatikkanone, können nun auch explosive Geschosse abfeuern, die Hochexplosivschaden verursachen. Wir haben unseren Hauptwaffenhersteller mit den Plänen und Bauplänen für diese Munitionsart versorgt."

  STR_ALLOY_AMMO: "Ausseridischen-Legierungensmunition"
  STR_ALLOY_AMMO_UFOPEDIA: "Mit dem Wissen über die Verarbeitung der extrem starken, aber leichten Ausseridischen-Legierungen können wir nun Munition herstellen, die höheren Mündungsgeschwindigkeiten standhält, ohne zu zerfallen. Die Geschosse werden in Hülsen aus Ausseridischen-Legierungen gefertigt, die leichter und zugleich stabiler sind als zuvor möglich."

  STR_EHE_AMMO: "Verbesserte Explosivmunition"
  STR_EHE_AMMO_UFOPEDIA: "Die Kombination aus Ausseridischen-Legierungen für Hülsen und dem neu entdeckten Element Elerium-115 ermöglicht tödlichere Flächenschaden-Explosivgeschosse für unsere konventionellen Waffen, die Schweren Kanonen und Automatikkanonen. Vorsicht ist geboten bei der Verwendung dieser Munition auf engem Raum; das Tragen von Rüstung wird dringend empfohlen."

  STR_LASER_WEAPONS: "Laserwaffen"
  STR_LASER_WEAPONS_UFOPEDIA: "Laser sind seit Jahrzehnten bekannt. Die Entdeckung der Ausseridischen-Legierungen und die Informationen über Optik, die auf der Außerirdischendatenträger gefunden wurden, ermöglichen es der Menschheit nun erstmals, praktische Laserwaffen zu entwickeln. Sie sind in den meisten Aspekten konventionellen kinetischen Waffen überlegen und werden unseren Truppen im Kampf gegen die Außerirdischen helfen."

  STR_ALLOY_AIRFRAME: "Flugzeugrumpf aus Außerirdischenlegierung"
  STR_ALLOY_AIRFRAME_UFOPEDIA: "Mit unserem nun grundlegenden Verständnis darüber, wie die neu entdeckten Ausseridischen-Legierungen geformt werden können, sind wir möglicherweise in der Lage, verbesserte Flugzeugrümpe für unsere Flugzeuge herzustellen. Die Verbesserung unserer Truppentransporter sollte Priorität haben. Nach ersten Tests mit den verbesserten Flugzeugrümpfen kann die Entwicklung eines Abfangjägers aus Außerirdischenlegierung beginnen."

  STR_SUPPORT_DRONES: "Unterstützungsdrohnen"
  STR_SUPPORT_DRONES_UFOPEDIA: "Im Vergleich zu unseren ersten Entwürfen automatisierter Schwerwaffenplattformen (SWP) verfolgen diese kleinen Roboter ein anderes Ziel auf dem Schlachtfeld: Aufklärung und indirekte Truppenunterstützung. Sie verfügen über ein schlankes Design und eine umfassende Panzerung für ihre Größe. Informationsgewinnung auf dem Schlachtfeld wird die Kampffähigkeit unserer Truppen erheblich steigern und unsere Verluste verringern. Unsere Ingenieure vermuten, dass wir diese Drohnen sogar mit Scannern, medizinischer Ausrüstung und Elektroschockgeräten ausrüsten können."

  STR_ALLOY_DRONE_ARMOR: "Drohnenpanzerung aus Außerirdischenlegierung"
  STR_ALLOY_DRONE_ARMOR_UFOPEDIA: "Unsere Ingenieure haben endlich einen Weg gefunden, unsere Arbeitsverfahren mit Außerirdische-Legierungen so weit zu verbessern, dass wir unsere Drohnen mit einer Legierungsrüstung ausstatten können. Dies wird ihre Panzerung, Geschwindigkeit und Haltbarkeit auf dem Schlachtfeld erheblich erhöhen. Außerdem konnten wir die Intensität und Kapazität der Zusatzausrüstung steigern. Drohnen-Scanner, Drohnen-Medikits und Drohnen-Taser benötigen nun weniger Zeit zur Bedienung im Feld und verfügen über mehr Ladungen. Wir hoffen, dass diese Entwicklung unsere hohen Verlustzahlen weiter senken wird."

  STR_HOVERDRONE_ARMOR: "Schwebedrohnenpanzerung"
  STR_HOVERDRONE_ARMOR_UFOPEDIA: "Kung-Fu, die Kunst, Perfektion in einer Sache zu erreichen, hat uns hierher geführt. Die Verfeinerung unserer Konstruktionstechniken sowie detailliertes Wissen über den Bau und das Design von Fahrzeugen und Schwerwaffenplattformen auf Basis außerirdischer Konstruktionstechniken waren notwendig, um unseren Unterstützungsdrohnen eine neue Fähigkeit zu verleihen: 3D-Beweglichkeit. Als Bonus besitzt die Panzerung nahezu das gleiche Schutzniveau wie die unserer schwebenden SWPs. Rauchgranaten können zudem aus der Luft in einer bestimmten Reichweite eingesetzt werden."

  STR_ALLOY_TANK_ARMOR: "SWP-Panzerung aus Außerirdische-Legierungen"
  STR_ALLOY_TANK_ARMOR_UFOPEDIA: "Der große Erfolg bei der Verbesserung unserer Luftabwehr- und Transportfähigkeiten durch Außerirdische-Legierungen brachte einem unserer Ingenieurteams neue Ideen, wie dieses Wissen auf unsere Schwerwaffenplattformen angewendet werden kann. Nach ersten Untersuchungen konnten wir Panzerung und Geschwindigkeit der SWPs durch Außerirdischenlegierungen verbessern. Als Nebeneffekt konnten unsere Zielsysteme verbessert werden, was zu höherer Treffsicherheit und besseren Reaktionen der Schwerwaffenplattformen führt."

  STR_HOVERTANK: "Schwebende Schwerwaffenplattformen (SSWP)"
  STR_HOVERTANK_UFOPEDIA: "Nachdem wir nun erfolgreich das Kerndesign der Außerirdischenschiffe reproduziert haben, begann unser Forschungs- und Ingenieurteam mit der Anpassung dieser neuen Technologien an unsere Schwerwaffenplattformen. Das Ergebnis erlaubt uns nun den Bau fliegender SWPs, was ihnen höhere Mobilität sowie verbesserte Aufklärungs- und Zielerfassungsfähigkeiten verleiht."

  STR_WALKERTANK: "Laufende Schwerwaffenplattformen (LSWP)"
 STR_WALKERTANK_UFOPEDIA: "Die unglaublichste These darüber, wie die Außerirdischen diese gigantischen laufenden Todesmaschinen kontrollieren, wurde nun bestätigt: Eine psionische Verbindung wird zwischen biologischen Außerirdischeneinheiten und diesen Maschinen der Zerstörung über ein kleines Einsatzgebiet hinweg aufgebaut – innerhalb und um UFOs, Außerirdischenbasen oder während einer laufenden Mission. Wir verstehen nun genug, um zu versuchen, diese Fähigkeit zu entfernen, indem wir eine neu gestartete und auf dem Schlachtfeld deaktivierte Einheit hacken. Dadurch können wir die Kontrolle übernehmen und sie gegen ihre früheren Meister einsetzen! Für einen Hack benötigen wir einen lebenden Sektopoden oder einen lebenden Gepanzerten Sektopoden sowie Kenntnisse über seine Hauptbewaffnung."
#END BRIEFINGS

#BEGIN NEWS
  STR_NEWS_1: "Weltweite Nachrichtenaktualisierung"
  STR_NEWS_1_UFOPEDIA: "* Drei bestätigte Tote in einem kleinen afrikanischen Dorf nach einem Treffer eines „Energiewaffen“-Angriffs auf ein Haus.{NEWLINE}* Alarmierende Anzahl mysteriöser Verschwinden in Kapstadt versetzt die Einwohner in Unruhe.{NEWLINE}* Ein junger Mann in Deutschland, Berlin, berichtet von Kontakt mit überlegenen außerirdischen Wesen, die ihm sagten, er solle sich auf große kommende Ereignisse vorbereiten – die große „Säuberung“.{NEWLINE}* Mediennetzwerke weltweit bemühen sich, begehrtes Bildmaterial von lebenden Außerirdischen zu beschaffen.{NEWLINE}* Menschenmengen versammeln sich nahe Tijuana, um ungewöhnliche Lichter zu beobachten, die unkontrolliert über der Stadt fliegen.{NEWLINE}* Selbsternannte Entführte behaupten, von pinken, schwebenden humanoiden Kreaturen mit Umhängen gefangen genommen worden zu sein."

  STR_NEWS_2: "Weltweite Nachrichtenaktualisierung"
  STR_NEWS_2_UFOPEDIA: "* Lokale Medien empört über zunehmende Zensur staatlicher Aktivitäten in Russland.{NEWLINE}* Rivalisierende politische und ideologische Gruppen geben sich gegenseitig die Schuld für die Feindseligkeit der Außerirdischen.{NEWLINE}* Nicht mehr allein – Dokumentation behauptet „exklusive“ Informationen über die Absichten der Außerirdischen gegenüber der Erde.{NEWLINE}* Die Royal Astronomical Society erklärt, dass jüngste Sichtungen ungewöhnlicher Lichter auf einen großen Sonnenflare zurückzuführen seien.{NEWLINE}* Russische Popsängerin bietet an, sich von Außerirdischen „entführen zu lassen“… keine Reaktion der angeblichen Invasoren.{NEWLINE}* Einwohner Dublins berichten von großen, zweibeinigen Raubtieren, die Vieh angreifen."

  STR_NEWS_3: "Weltweite Nachrichtenaktualisierung"
  STR_NEWS_3_UFOPEDIA: "* Aktivisten in einigen Ländern vermuten staatliche Vertuschung beim plötzlichen Auftauchen aggressiver Außerirdischer; Gerüchte über frühere Kontakte verbreiten sich.{NEWLINE}* New York – Börsen steigen weiter, Gold-, Silber- und Platinpreise steigen heute um 12 %. Bankaktien fallen.{NEWLINE}* Polizei in Bangalore nimmt Mann fest, der Tickets für die Besichtigung eines angeblich gezähmten „Außerirdischen“ verkauft.{NEWLINE}* Eine kleine, aber lautstarke Minderheit warnt weiterhin die europäische Bevölkerung vor Außerirdische-Aktivitäten; Umfragen zeigen geringe Besorgnis in der Bevölkerung.{NEWLINE}* Gerüchte über Außerirdische-Aktivität nahe New York City stoßen in der Öffentlichkeit auf Skepsis.{NEWLINE}* Ranger im Yellowstone-Nationalpark berichten von kleinen grauen Humanoiden, die junge Frauen entführen."

  STR_NEWS_4: "Weltweite Nachrichtenaktualisierung"
  STR_NEWS_4_UFOPEDIA: "* Chinesische Beamte unter Verdacht, fortschrittliche Waffen an unbekannte Käufer verkauft zu haben; Hauptermittler Xzung Tzu stirbt nach dem zweiten Tag der Ermittlungen.{NEWLINE}* Zeugenaussagen über seltsame Lichter über dem Schwarzwald gelten laut deutschen Behörden als „unzuverlässig“.{NEWLINE}* Boulevardzeitungen melden Rekordverkäufe, da Außerirdische-Sichtungen im Vereinigten Königreich das Interesse an Außerirdische-Mythen steigern.{NEWLINE}* Unabhängige Forscher behaupten, ungewöhnliche Signale abgefangen zu haben, die auf erdgebundene Radararrays gerichtet sind.{NEWLINE}* Zahlreiche Augenzeugenberichte über eine gescheiterte Militäroperation in Brasilien mit schweren Verlusten.{NEWLINE}* Überlebende eines Außerirdischenangriffs berichten von kleinen fliegenden Untertassen, die grüne Feuerbälle auf alles in der Umgebung abfeuern."

  STR_NEWS_5: "Weltweite Nachrichtenaktualisierung"
  STR_NEWS_5_UFOPEDIA: "* Regierung von Nigeria zerschlägt angeblich Schmuggeloperation mit gefälschten Außerirdischenkörperteilen, steigende Skepsis in der Bevölkerung.{NEWLINE}* Berichte über ein unbekanntes Objekt, das nach einer langen Luftschlacht mit unbekannten Fluggeräten abgeschossen wurde.{NEWLINE}* Lokale Geschäfte in Peking beginnen mit dem Verkauf von UFO-Merchandise nach jüngsten Sichtungen.{NEWLINE}* Wissenschaftler in Russland tot aufgefunden; Behörden bestreiten Zusammenhang mit möglicher Laserwaffenforschung.{NEWLINE}* Nachrichtenhubschrauber stürzt außerhalb von Boston ab – Augenzeugen berichten von „Außerirdischen“-Waffenfeuer.{NEWLINE}* Chinesische Militärpatrouille wird von schlangenartigen Kreaturen angegriffen und verliert 50 % ihrer Stärke, bevor sie diese zurückschlägt; PLA verweigert Stellungnahme."

  STR_NEWS_6: "Weltweite Nachrichtenaktualisierung"
  STR_NEWS_6_UFOPEDIA: "* Strandbesucher in Rio de Janeiro berichten von ungewöhnlichen Lichtern am Horizont – Polizei macht übermäßigen Alkoholkonsum verantwortlich.{NEWLINE}* Demonstranten einer der größten Kundgebungen in Washington D.C. fordern friedliche Verhandlungen mit unseren „Sternbrüdern“; Behörden bestreiten die Existenz von Außerirdischen.{NEWLINE}* Sichtungen eines fortschrittlichen Militärluftschiffs nahe eines „abgestürzten UFOs“ in ländlichem Indien führen zu Diskussionen über staatliche Reaktionen.{NEWLINE}* UFO-Skeptiker werden nun mit der Realität außerirdischer Präsenz konfrontiert.{NEWLINE}* Wissenschaftler diskutieren, ob Regierungen weltweit diplomatische Kontakte mit Außerirdischen verschwiegen haben.{NEWLINE}* Bürger Roms werden nach einem brutalen Außerirdischenangriff zur Evakuierung gezwungen. Überlebende berichten von großen, aggressiven krabbenartigen Kreaturen, die Opfer offenbar mit Eiern infizieren."

  STR_NEWS_7: "Weltweite Nachrichtenaktualisierung"
  STR_NEWS_7_UFOPEDIA: "* Einwohner berichten von ungewöhnlich geformten Fluggeräten über dem zentralen Platz von Lyon.{NEWLINE}* Ausschreitungen in Frankreich überfordern die lokalen Behörden.{NEWLINE}* Zeuge berichtet von unbekannten militärischen Einheiten, die einen feindlichen Außerirdischen lebend gefangen haben – Verdacht auf Regierungsbeteiligung.{NEWLINE}* Waffenhersteller erwarten Rekordgewinne durch steigende Verkäufe infolge der Außerirdischenangriffe.{NEWLINE}* Einwohner in England akzeptieren Polizeiberichte nicht, die keine Beweise für Außerirdischenaktivität in CCTV-Aufnahmen sehen.{NEWLINE}* Farmer in South Dakota berichten, sie hätten die Leiche eines tödlich verletzten grünen Humanoiden gefunden. Behörden bestreiten Beteiligung und werfen den Bauern Drogenkonsum vor."

  STR_NEWS_8: "Weltweite Nachrichtenaktualisierung"
  STR_NEWS_8_UFOPEDIA: "* Fotograf behauptet Beweise für Treffen südafrikanischer Beamter mit Außerirdischen zu besitzen.{NEWLINE}* Bank-Run in Spanien durch Angriffe auf das zentrale Bankensystem ausgelöst.{NEWLINE}* Goldpreis erreicht Allzeithoch.{NEWLINE}* Einige indische Dorfbewohner glauben nun, die Außerirdischen seien als Warnung vor aktuellen Regierungspolitiken zur Erde geschickt worden.{NEWLINE}* Unbekannte militärische Einheiten bekämpfen offenbar feindliche Außerirdischen an der Absturzstelle eines UFOs in Sibirien.{NEWLINE}* Polizei im US-Bundesstaat Colorado erhält zahlreiche panische Meldungen von Zivilisten, die „schwebende Nieren“ bei binärer Spaltung gesehen haben sollen."

  STR_NEWS_9: "Weltweite Nachrichtenaktualisierung"
  STR_NEWS_9_UFOPEDIA: "* Forscher berichten von keinem klaren Zusammenhang zwischen weltweit gemeldeten Sichtungen „ungewöhnlicher Lichter“.{NEWLINE}* Fluglotsen am internationalen Flughafen Narita melden widersprüchliche Berichte über unbekannte Flugobjekte auf Bodenradar.{NEWLINE}* Ausschreitungen und religiöse Massenhysterie folgen den Invasoren.{NEWLINE}* Verteidigungsbehörden weltweit holen Pläne hervor, die sie nie für notwendig hielten.{NEWLINE}* Australisches Parlament beruft Notfallsitzung hinter verschlossenen Türen ein; Außerirdischenangriffe vermutlich zentrales Thema.{NEWLINE}* Spanische Feuerwehrleute sind von unerklärlichen Bränden im Waldgebiet verwirrt; einige berichten von seltsamen violetten Steinen, die sich bewegen und Material verschlingen."

  STR_NEWS_10: "Weltweite Nachrichtenaktualisierung"
  STR_NEWS_10_UFOPEDIA: "* Mysteriöse Objekte, die auf die Erde fallen, konnten bislang nicht identifiziert werden.{NEWLINE}* Experten diskutieren, da erste Hinweise auf außerirdischen Ursprung der Objekte hindeuten.{NEWLINE}* Außerirdischen werden zum neuen Trend in japanischen Medien, da Sichtungen im ganzen Land exponentiell steigen.{NEWLINE}* Seltsame Objekte treffen mehrere Großstädte, während Regierungen nach der Ursache suchen.{NEWLINE}* Kontroverse in Mumbai nach Berichten über eine Kollision eines Regierungsbeamten mit „Außerirdischeninvasoren“.{NEWLINE}* Blaues, scheibenförmiges Fluggerät greift tagsüber ein russisches Militärdepot an, absorbiert massives Feuer und wird schließlich von einer MiG-Patrouille ausgeschaltet."

  STR_NEWS_11: "Weltweite Nachrichtenaktualisierung"
  STR_NEWS_11_UFOPEDIA: "* Schlagzeilen konzentrieren sich auf weltweite Berichte über Außerirdischenangriffe auf Städte rund um den Globus.{NEWLINE}* Ungewöhnliches Fluggerät nahe Kairo gefilmt; Experten rätseln über Herkunft.{NEWLINE}* Politische Opposition in den USA beschuldigt Regierungsmehrheit, Ressourcen für Außerirdischenangriffe bereitzustellen.{NEWLINE}* Außerirdischensichtungen erschüttern die Weltbevölkerung.{NEWLINE}* Drastischer Anstieg gemeldeter UFO-Sichtungen verwirrt Experten.{NEWLINE}* Die indigene Bevölkerung Argentiniens zittert vor riesigen insektoiden Kreaturen, die den Himmel patrouillieren und grüne Vernichtungsstrahlen abfeuern."

  STR_NEWS_12: "Weltweite Nachrichtenaktualisierung"
  STR_NEWS_12_UFOPEDIA: "* Skeptiker hinterfragen weiterhin das Verschwinden von Außerirdischenkörpern nach angeblichen militärischen Gefechten.{NEWLINE}* Infrastrukturkrise – Städte konkurrieren um begrenzte Ressourcen, wodurch Reparaturen an Straßen und Verkehrsnetzen verzögert werden.{NEWLINE}* Streitkräfte in Argentinien behaupten, einen Außerirdischen bei einem Entführungsversuch getötet zu haben; Bürger werden aufgefordert, Ausgangssperren zu beachten.{NEWLINE}* Die Brutalität der Außerirdischenangriffe auf Zivilisten schockiert die Welt.{NEWLINE}* Unterentwickelte Länder bitten die UNO um Unterstützung gegen die Außerirdischenbedrohung.{NEWLINE}* Überlebende berichten von robotischen Kreaturen in Krabbenform, die mit Klingen Menschen angreifen."

  STR_NEWS_13: "Weltweite Nachrichtenaktualisierung"
  STR_NEWS_13_UFOPEDIA: "* Städte weltweit kämpfen mit Opfern und Schäden durch anhaltende Außerirdischenangriffe.{NEWLINE}* Berichte über eine abtrünnige militärische Organisation unbekannter Herkunft, die Außerirdischen weltweit angreift, halten an.{NEWLINE}* Geleakte Beweise deuten auf Notfallpläne mehrerer kanadischer Provinzregierungen hin.{NEWLINE}* Vorsitzender der Afrikanischen Union fordert Sondersitzung wegen öffentlicher Empörung über Außerirdischenangriffe.{NEWLINE}* Feindliche Außerirdischen terrorisieren die Weltbevölkerung, während Regierungen verzweifelt reagieren.{NEWLINE}* Russische Militärbasis in Sibirien wird von unbekannten zweibeinigen Robotern mit Lichtwaffen angegriffen."

  STR_NEWS_14: "Weltweite Nachrichtenaktualisierung"
  STR_NEWS_14_UFOPEDIA: "* UN-Sicherheitsratstreffen in Bern gestört, nachdem ein indischer Delegierter und seine Eskorte im Sitzungssaal auf russische Vertreter feuern; Hinweise auf mögliche Gehirnwäsche.{NEWLINE}* Berichte über getötete Außerirdischen in Ägypten geben wenig Hoffnung auf ein baldiges Ende der Invasion.{NEWLINE}* Außerirdischenangriffe eskalieren weltweit weiter und lassen die Menschheit über die Zukunft rätseln.{NEWLINE}* Geheime Razzia in einem mysteriösen Komplex, der mit der Außerirdischeninvasion in Verbindung stehen soll.{NEWLINE}* Einige glauben nun, die Eroberung der Erde stehe unmittelbar bevor und fordern friedliche Akzeptanz.{NEWLINE}* Deutscher Militärstützpunkt durch unbekannte Kräfte zerstört; Überlebende berichten von gepanzerten, waffentragenden „Schildkrötenmenschen“."

  STR_NEWS_15: "Weltweite Nachrichtenaktualisierung"
  STR_NEWS_15_UFOPEDIA: "* UN-Sitzung in New York gestört, als Demonstranten das Gebäude stürmen und Maßnahmen gegen die Außerirdischeninvasoren fordern.{NEWLINE}* Aborigines in Australien beginnen eine neue religiöse Bewegung und beten zu den neu entdeckten Außerirdischengöttern.{NEWLINE}* Wichtige Schifffahrtsrouten nahe dem Horn von Afrika gestört nach dem mysteriösen Verschwinden von drei Containerschiffen auf dem Weg nach Europa; Überlebende berichten von Lichtstrahlen.{NEWLINE}* NASA meldet, dass mehrere zivile Wettersatelliten abgeschossen oder zerstört wurden.{NEWLINE}* Vorwürfe, internationale Führungspersönlichkeiten hätten mit Außerirdischen kollaboriert.{NEWLINE}* Mönche in einem tibetischen Kloster berichten von einer schwebenden Lichtscheibe, die sie in den Bergen angriff; mehrere wurden getötet. Der Dalai Lama ordnet zwei Wochen Trauer an."

  STR_NEWS_16: "Weltweite Nachrichtenaktualisierung"
  STR_NEWS_16_UFOPEDIA: "* Luftschutzsirenen ertönen in ganz Frankreich, während die Regierung vor nicht notwendigen Reisen warnt, da der Außerirdischenkrieg weiter eskaliert.{NEWLINE}* Kaum Fortschritte bei der Eindämmung der Außerirdischenangriffe trotz militärischer Einsätze.{NEWLINE}* Todeszahlen weltweit unbekannt; Experten schätzen „tausende“ Opfer.{NEWLINE}* Aufstieg von Antiaußerirdischenmilizen weltweit lässt Regierungen um Stabilität fürchten.{NEWLINE}* Weltführer geben keine gemeinsame Erklärung ab, während die Feindseligkeiten in vielen Regionen zum offenen Krieg eskalieren.{NEWLINE}* Australischer Nachrichtensprecher beginnt live im Fernsehen zu „Sternbrut“-Brüdern zu beten; gesamte Crew schließt sich an und wird später psychiatrisch untersucht. Augenzeugen berichten von fliehenden grauen Humanoiden."

  STR_NEWS_17: "Weltweite Nachrichtenaktualisierung"
  STR_NEWS_17_UFOPEDIA: "* Einige Einwohner australischer Großstädte fliehen in abgelegene Regionen, um weiteren Außerirdischenangriffen zu entgehen.{NEWLINE}* Nationalgarde nimmt Positionen rund um US-Regierungsgebäude ein, während der „Außerirdischenkrieg“ eskaliert.{NEWLINE}* Gewalt in Berlin wegen Streit über die wahre Motivation der Außerirdischenangriffe.{NEWLINE}* Religiöse Führer in Russland diskutieren die Auswirkungen der Außerirdischenankunft auf ihre Lehre, während die Bevölkerung zunehmend skeptisch wird.{NEWLINE}* Nigerianische Regierung meldet Verluste bei dem Versuch, einen Außerirdischenangriff nahe der Hauptstadt abzuwehren.{NEWLINE}* Militärbasis in Südamerika erleidet schwere Material- und Personalverluste nach Angriff riesiger humanoider Kreaturen, die Panzer zerstören können."

  STR_NEWS_18: "Weltweite Nachrichtenaktualisierung"
  STR_NEWS_18_UFOPEDIA: "* Staatssprecher in China bestreitet Außerirdischenangriffe trotz überwältigender Beweise für Infiltrationen in mehreren Städten.{NEWLINE}* Eskalation der Außerirdischenaktivität weltweit lässt viele über die Motive der unprovozierten Angriffe rätseln.{NEWLINE}* Städte weltweit kämpfen weiterhin mit Schäden durch anhaltende Außerirdischenangriffe.{NEWLINE}* Angehörige Entführter suchen Antworten bei Regierungen.{NEWLINE}* Der russische Präsident versichert harte Gegenmaßnahmen gegen jede Außerirdischenaggression; Umfragen zeigen geringe Zuversicht.{NEWLINE}* Militärübung nahe Warschau wird zur Katastrophe; Milliardenwerte an Ausrüstung werden von blauen Robotern unbekannter Herkunft zerstört."

  STR_NEWS_19: "Weltweite Nachrichtenaktualisierung"
  STR_NEWS_19_UFOPEDIA: "* Vorwürfe nehmen zu, während offizielle Stellungnahmen der mexikanischen Regierung zunehmend widersprüchlich werden.{NEWLINE}* Stromausfälle in ganz Japan nach schweren Infrastrukturangriffen.{NEWLINE}* Flüchtlingsströme in weniger betroffene Regionen, während der Konflikt zum Krieg eskaliert.{NEWLINE}* Augenzeugen berichten von Soldaten mit „übernatürlichen“ Fähigkeiten im Kampf gegen Außerirdischen.{NEWLINE}* Radiosendungen in China werden durch Botschaften gestört, die „Außerirdischenkooperation“ als besten Weg für die Menschheit propagieren.{NEWLINE}* Kontakt zur Antarktisstation McMurdo seit 72 Stunden unterbrochen; überlebende Wissenschaftler sind verstört und beten zu „Sternbrut“. Psychiatrische Betreuung läuft."

  STR_NEWS_20: "Weltweite Nachrichtenaktualisierung"
  STR_NEWS_20_UFOPEDIA: "* Angst breitet sich aus, viele Brasilianer wenden sich der Religion zu.{NEWLINE}* Gesundheitszentrum meldet drastischen Anstieg von Suiziden aufgrund der Außerirdischenangriffe.{NEWLINE}* Finanzmärkte weltweit in Chaos nach Angriffen auf Infrastruktur.{NEWLINE}* Kanada bereitet sich auf Eskalation der Außerirdischenkrise vor.{NEWLINE}* Panik in Italien nach Angriffen unbekannter Truppen durch Außerirdischen nahe dicht besiedelter Gebiete.{NEWLINE}* TV- und Streaming-Netzwerke weltweit werden gestört; eine Nachricht erscheint: „Wir sind die Sternbrut…“"

  STR_NEWS_21: "Weltweite Nachrichtenaktualisierung"
  STR_NEWS_21_UFOPEDIA: "* Abbruch diplomatischer Beziehungen mit Spanien weckt Verdacht auf Außerirdischeninfiltrationen in Regierungen.{NEWLINE}* Fischerdorf in Neufundland unter Quarantäne gestellt.{NEWLINE}* Sorge in der Bevölkerung wächst durch massive Infrastrukturstörungen.{NEWLINE}* Massive UFO-Sichtungen über Südamerika führen zu Massenpanik; Brasilien verhängt Kriegsrecht.{NEWLINE}* Mexikanische Bauern finden zerstückelte Menschenreste; Bevölkerung in Panik.{NEWLINE}* Chile – letzter Überlebender eines indigenen Stammes berichtet von dämonischen Kreaturen, die Menschen in Untote verwandeln."

  STR_NEWS_22: "Weltweite Nachrichtenaktualisierung"
  STR_NEWS_22_UFOPEDIA: "* Chinesischer Premierminister Hauptverdächtiger in Korruptionsskandal um Vertuschung geheimer Operationen.{NEWLINE}* London: Goldmarkt zeigt massive Fehlbuchungen; Goldpreis steigt innerhalb von Stunden um 300 %.{NEWLINE}* Indien: Bauern entdecken aggressive Pflanzen unbekannter Herkunft; Wissenschaft vermutet Außerirdischenursprung.{NEWLINE}* NASA- und ESA-Marsmission erreicht erfolgreich Marsorbit; technische Probleme bei Oberflächenanalyse.{NEWLINE}* Riesige rote Kreaturen sollen ein Bahndepot nahe Amsterdam zerstört haben; Überlebende berichten von Kontrollverlust der Wesen."
#END NEWS

#BEGIN FACILITIES
  STR_GENERAL_STORES_UFOPEDIA: "Alle Ausrüstung, Waffensysteme, Munition, geborgene Materialien und Schwerwaffenplattformen werden im Lager gelagert, einschließlich der Ausrüstung, die Flugzeugen in den Hangars zugewiesen ist.{NEWLINE}{NEWLINE}Bietet:{NEWLINE} * LAGERKAPAZITÄT: 50"
  STR_HANGAR_UFOPEDIA: "Jeder Hangar kann ein Fluggerät aufnehmen. Es gibt Einrichtungen für Wartung, Betankung und Reparatur von X-Com-Flugzeugen. Jedem auf einer Basis stationierten Fluggerät muss ein freier Hangar zugewiesen werden, der nicht von anderen Fluggeräten genutzt werden kann, selbst wenn das zugewiesene Fluggerät auf einer Mission ist.{NEWLINE}{NEWLINE}Bietet:{NEWLINE} * HANGARKAPAZITÄT: 1{NEWLINE} * LAGERKAPAZITÄT: 10"
  STR_ALIEN_CONTAINMENT_UFOPEDIA: "Lebende Außerirdischen benötigen vermutlich eine spezielle Umgebung, um ihre Lebenserhaltungssysteme aufrechtzuerhalten. Die Einrichtung zur Verwahrung kann bis zu 10 außerirdische Lebensformen in isolierten Einheiten halten. Für den Bau dieser Einrichtung werden Außerirdische Materialien benötigt.{NEWLINE}{NEWLINE}Benötigte außerirdische Baumaterialien:{NEWLINE} * ALIEN-LEGIERUNGEN: 30{NEWLINE} * ALIENNAHRUNG: 10{NEWLINE} * MENTALPROBE: 1"
  STR_PLASMA_DEFENSES_UFOPEDIA: "Plasma-Strahlverteidigungen bieten einen starken und effizienten Schutz gegen das Eindringen feindlicher Fluggeräte. Für den Bau dieser Einrichtung werden Außerirdische Materialien benötigt.{NEWLINE}{NEWLINE}Benötigte außerirdische Baumaterialien:{NEWLINE} * ALIEN-LEGIERUNGEN: 40{NEWLINE} * ELERIUM-115: 20{NEWLINE} * UFO-ENERGIEQUELLE: 1"
  STR_FUSION_BALL_DEFENSES_UFOPEDIA: "Fusionsraketen bieten die effektivste Verteidigung gegen Außerirdischenangriffe. Diese Raketen erzeugen eine Antimaterie-Implosion, die alles in einem bestimmten Radius zerstört. Für den Bau dieser Einrichtung werden Außerirdische Materialien benötigt.{NEWLINE}{NEWLINE}Benötigte außerirdische Baumaterialien:{NEWLINE} * ALIEN-LEGIERUNGEN: 60{NEWLINE} * ELERIUM-115: 30{NEWLINE} * UFO-ENERGIEQUELLE: 1"
  STR_GRAV_SHIELD_UFOPEDIA: "Der Gravitationsschild stößt Außerirdische Fluggeräte ab, die versuchen, in der Nähe der Basis zu landen, lange genug, damit alle Verteidigungssysteme erneut feuern können. In der Praxis verdoppelt dies die Effektivität aller Verteidigungssysteme Ihrer Basis. Für den Bau dieser Einrichtung werden Außerirdische Materialien benötigt.{NEWLINE}{NEWLINE}Benötigte außerirdische Baumaterialien:{NEWLINE} * ALIEN-LEGIERUNGEN: 100{NEWLINE} * ELERIUM-115: 50{NEWLINE} * UFO-ENERGIEQUELLE: 4"
  STR_MIND_SHIELD_UFOPEDIA: "Da Außerirdische Fluggeräte Gehirnwellen zur Erkennung menschlicher Präsenz nutzen, besteht die effektivste Gegenmaßnahme darin, die Gehirnwellen der Basis abzuschirmen. Diese Einrichtung reduziert die Wahrscheinlichkeit einer Entdeckung durch Außerirdische Fluggeräte drastisch. Für den Bau dieser Einrichtung werden Außerirdische Materialien benötigt.{NEWLINE}{NEWLINE}Benötigte außerirdische Baumaterialien:{NEWLINE} * ALIEN-LEGIERUNGEN: 100{NEWLINE} * ELERIUM-115: 50{NEWLINE} * UFO-ENERGIEQUELLE: 4"
  STR_PSIONIC_LABORATORY_UFOPEDIA: "Das Psioniklabor kann das psionische Potenzial aller Soldaten auf der Basis bewerten und ihnen die notwendige Ausbildung geben, um ihre psionischen Fähigkeiten zu nutzen. Jedes Labor kann bis zu zehn Soldaten trainieren. Das Training wird am Ende jedes Monats zugewiesen. Psionische Fähigkeiten können in Verbindung mit einem Psi-Verstärker für psionische Angriffe im Kampf eingesetzt werden. Für den Bau dieser Einrichtung werden Außerirdische Materialien benötigt.{NEWLINE}{NEWLINE}Benötigte außerirdische Baumaterialien:{NEWLINE} * ALIEN-LEGIERUNGEN: 100{NEWLINE} * MENTALPROBE: 2{NEWLINE} * UFO-NAVIGATION: 2"
  STR_HYPER_WAVE_DECODER_UFOPEDIA: "Außerirdische Kommunikation basiert auf einer supradimensionalen Welle, die sich nahezu augenblicklich ausbreitet. Die Dekodereinrichtung fängt UFO-Übertragungen ab und entschlüsselt die Informationen. Dadurch werden Typ des UFOs, die Außerirdischenrasse und die Art der Aktivität sichtbar. Für den Bau dieser Einrichtung werden Außerirdische Materialien benötigt.{NEWLINE}{NEWLINE}Benötigte außerirdische Baumaterialien:{NEWLINE} * ALIEN-LEGIERUNGEN: 60{NEWLINE} * ELERIUM-115: 30{NEWLINE} * UFO-NAVIGATION: 4"
#END FACILITIES

