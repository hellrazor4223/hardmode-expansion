  STR_WASPITE_COMMANDER: "Waspite-Kommandant"
  STR_WASPITE_UFOPEDIA: "Waspite sind Elite-Terroragenten und Kampfeinheiten. Sie sind sehr aggressiv, genetisch konstruiert und kybernetisch verbessert, was sie zu furchterregenden Gegnern macht. Ihre allgemeine Zerbrechlichkeit deutet jedoch eher auf eine Artillerierolle als auf Infanterie hin. Die Spiralvorrichtung, die ihren ursprünglichen Körper ersetzt, erzeugt ein Anti-Schwerkraft-Feld und ermöglicht ihnen das Schweben."
  STR_WASPITE_CORPSE: "Toter Waspite"
  STR_WASPITE_AUTOPSY: "Waspite-Autopsie"
  STR_WASPITE_AUTOPSY_UFOPEDIA: "Die Anatomie dieser Kreatur grenzt an Wahnsinn. Der Körper besteht aus einem spiralförmigen Lebenserhaltungssystem, kombiniert mit einer symbiotischen, bioengineerten Pflanze. Daran angeheftet sind ein Paar mechanische Arme und der insektenartige Kopf der Kreatur, vermutlich der einzige erhaltene Teil der ursprünglichen Spezies. Der Pflanzenteil des Körpers ist besonders feuerempfindlich."

