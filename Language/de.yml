  STR_UPGRADE_HOVERTANK_LASER_TO_LAUNCHER: "Schweb.-Panzer/Laser -> Schweb.-Werfer"

  STR_HWP_EBOMB_LAUNCHER: "Elerium-Bombenwerfer"
  STR_HWP_EBOMB: "SWP Elerium-Bombe"
  STR_HOVERTANK_EBOMB: "Schweb.-Panzer/Elerium-Bombe"
  HOVERTANK_EBOMB_ARMOR: "Kampf-Analyse: Schweb.-Panzer/Elerium-Bombe"
  STR_HOVERTANK_EBOMB_CORPSE: "Beschädigter Schweb.-Panzer/Elerium-Bombe"
  STR_HOVERTANK_EBOMB_REPAIR: "Reparatur Schweb.-Panzer/Elerium-Bombe"
  STR_HOVERTANK_EBOMB_UFOPEDIA: "Dieser Panzertyp kombiniert UFO-Technologie mit kleinen Werferwaffen. Die Fähigkeit, Elerium-Bomben aus der Luft abzufeuern, ist verheerend gegen die meisten Gegner. Seine Hauptaufgabe ähnelt unseren Ketten-Raketenpanzern, jedoch mit erhöhter Munitionskapazität."
  STR_UPGRADE_HOVERTANK_EBOMB_TO_PLASMA: "Schweb.-Panzer/Elerium-Bombe -> Schweb.-Plasma"
  STR_UPGRADE_HOVERTANK_EBOMB_TO_LAUNCHER: "Schweb.-Panzer/Elerium-Bombe -> Schweb.-Werfer"

  STR_HOVERTANK_PLASMA: "Schweb.-Panzer/Plasma"
  HOVERTANK_PLASMA_ARMOR: "Kampf-Analyse: Schweb.-Panzer/Plasma"
  STR_HOVERTANK_PLASMA_CORPSE: "Beschädigter Schweb.-Panzer/Plasma"
  STR_HOVERTANK_PLASMA_REPAIR: "Reparatur Schweb.-Panzer/Plasma"
  STR_HOVERTANK_PLASMA_UFOPEDIA: "Außerirdischen Technologie hat dem HWP neues Leben eingehaucht. Die zusätzliche Manövrierfähigkeit des Luftverkehrs und die Feuerkraft von Plasmablasern sind eine tödliche Kombination. Dieser Panzer kann anhaltendes Automatikfeuer auf mittlere Distanz abgeben und Ziele auch knapp außerhalb der Sichtlinie präzise treffen."
  STR_UPGRADE_HOVERTANK_PLASMA_TO_LAUNCHER: "Schweb.-Panzer/Plasma -> Schweb.-Werfer"

  HOVERTANK_LAUNCHER_ARMOR: "Kampf-Analyse: Schweb.-Panzer/Werfer"
  STR_HOVERTANK_LAUNCHER_CORPSE: "Beschädigter Schweb.-Panzer/Werfer"
  STR_HOVERTANK_LAUNCHER_REPAIR: "Reparatur Schweb.-Panzer/Werfer"
  STR_UPGRADE_HOVERTANK_LAUNCHER_TO_PLASMA: "Schweb.-Panzer/Werfer -> Schweb.-Plasma"

  STR_WALKERTANK_SMOKE_WEAPON: "Lauf-Panzer Rauchwerfer"
  STR_WALKERTANK_SMOKE_WEAPON_UFOPEDIA: "Die Anbringung unseres bereits fortschrittlichen Rauchwerfers an erbeuteter gegnerischer Technologie zeigte große Vorteile. Wir konnten die Munitionskapazität nahezu verdoppeln. Die Munitionsauffüllung erfolgt in der Basis nach Rückkehr von einer Mission. Wir haben einen Sondervertrag mit unserem Lieferanten, daher ist reichlich Munition verfügbar. Rauch kann sowohl zu eurem Vorteil als auch Nachteil eingesetzt werden. Lauf-Panzer können zwischen sich selbst, Verbündeten und feindlichen Einheiten eine dichte Rauchwand erzeugen. Beachtet, dass Lauf-Panzer im Rauch auch Ziel von Blasterbomben oder Granaten werden können."

  STR_WALKERTANK_LASER: "Lauf-Panzer/Laser"
  WALKERTANK_LASER_ARMOR: "Kampf-Analyse: Lauf-Panzer/Laser"
  STR_WALKERTANK_LASER_CORPSE: "Beschädigter Lauf-Panzer/Laser"
  STR_WALKERTANK_LASER_REPAIR: "Reparatur Lauf-Panzer/Laser"
  STR_WALKERTANK_LASER_UFOPEDIA: "Die Zerstörung der psionischen Verbindung zwischen einem Sectopod und seinen geistgesteuerten Meistern erlaubt es uns, das System zu übernehmen. Leider wurden einige Systeme beim Hacken beschädigt und mussten entfernt werden, was die Verarbeitungsgeschwindigkeit senkt, aber die Anfälligkeit gegenüber Laserwaffen reduziert. Für diesen Hack wird ein unbeschädigter Sectopod benötigt."
  STR_UPGRADE_WALKERTANK_LASER_TO_PLASMA: "Lauf-Panzer/Laser -> Lauf-Panzer Plasma"

  STR_WALKERTANK_PLASMA: "Lauf-Panzer/Plasma"
  WALKERTANK_PLASMA_ARMOR: "Kampf-Analyse: Lauf-Panzer/Plasma"
  STR_WALKERTANK_PLASMA_CORPSE: "Beschädigter Lauf-Panzer/Plasma"
  STR_WALKERTANK_PLASMA_REPAIR: "Reparatur Lauf-Panzer/Plasma"
  STR_WALKERTANK_PLASMA_UFOPEDIA: "Nach der Trennung der psionischen Verbindung, sodass diese Einheit nicht mehr von Etherealen kontrolliert werden kann, ist es uns gelungen, das System zu übernehmen. Leider wurden einige Systeme beim Hacken beschädigt, was die Verarbeitungsgeschwindigkeit verringert. Für diesen Hack wird ein unbeschädigter gepanzerter Sectopod benötigt."
#END TANKS

#BEGIN ARMORS
  STR_JUMPSUIT_UFOPEDIA: "Der Standard X-Com Overall bietet nur elementaren Schutz. Dafür erlaubt der Anzug uneingeschränkte Mobilität. Jeder X-Com Agent wird mit dem Standardanzug ausgestattet, sofern der Agent nicht mit einer anderen Rüstung ausgestattet wird."

  STR_ARMORED_VEST: "Ballistische Weste"
  STR_ARMORED_VEST_UC: "BALLISTISCHE WESTE"
  STR_ARMORED_VEST_CORPSE: "Beschädigte Ballistische Weste"
  STR_ARMORED_VEST_REPAIR: "Reparatur Ballistische Weste"
  STR_ARMORED_VEST_UFOPEDIA: "Keramische ballistische Weste, bietet Schutz gegen Projektile und Explosionen."
  STR_UPGRADE_ARMORED_VEST_TO_ALLOY_VEST: "Ballistische Weste -> Legierungsweste"

  STR_ALLOY_VEST: "Legierungsweste"
  STR_ALLOY_VEST_UC: "LEGIERUNGSWESTE"
  STR_ALLOY_VEST_CORPSE: "Beschädigte Legierungsweste"
  STR_ALLOY_VEST_REPAIR: "Reparatur Legierungsweste"
  STR_ALLOY_VEST_UFOPEDIA: "Diese ballistische Weste ist mit außerirdischen Legierungen verstärkt und bietet deutlich erhöhte Haltbarkeit sowie etwas Schutz gegen Plasmawaffen."
  STR_UPGRADE_ALLOY_VEST_TO_PERSONAL_ARMOR: "Legierungsweste -> Persönliche Rüstung"

  STR_PERSONAL_ARMOR: "Persönliche Rüstung"
  STR_PERSONAL_ARMOR_UC: "PERSÖNLICHE RÜSTUNG"
  STR_PERSONAL_ARMOR_CORPSE: "Beschädigte Persönliche Rüstung"
  STR_PERSONAL_ARMOR_REPAIR: "Reparatur Persönliche Rüstung"
  STR_PERSONAL_ARMOR_UFOPEDIA: "Unter Verwendung der neu entdeckten außerirdischen Legierungen gibt diese völlig neue Rüstung unseren Männern eine echte Überlebenschance gegen die außerirdische Bedrohung. Wir konnten ihr eine gute Resistenz gegen außerirdische Plasmatechnologie verleihen, aber nur Praxistests werden ihren wahren Wert zeigen."
  STR_UPGRADE_PERSONAL_ARMOR_TO_POWER_SUIT: "Persönliche Rüstung -> Energieanzug"
  STR_UPGRADE_PERSONAL_ARMOR_TO_FLYING_SUIT: "Persönliche Rüstung -> Fluganzug"

  STR_POWER_SUIT_CORPSE: "Beschädigter Energieanzug"
  STR_POWER_SUIT_REPAIR: "Reparatur Energieanzug"
  STR_POWER_SUIT_UFOPEDIA: "Ein leistungsstarker neuer Schutz für Soldaten. Diese Rüstung wird von einer Elerium-115-Energiequelle angetrieben und erzeugt ein leichtes Antigravitationsfeld. Sie steigert zudem die Ausdauer des Trägers erheblich und bietet erhöhte Resistenz gegen Plasmawaffen. Sie bietet den bislang besten Schutz für Kampfeinheiten."
  STR_UPGRADE_POWER_SUIT_TO_FLYING_SUIT: "Energieanzug -> Fluganzug"
  STR_UPGRADE_POWER_SUIT_TO_REINFORCED_POWER_SUIT: "Energieanzug -> Verst. Energieanzug"
  STR_UPGRADE_POWER_SUIT_TO_REINFORCED_FLYING_SUIT: "Energieanzug -> Verst. Fluganzug"

  STR_FLYING_SUIT_CORPSE: "Beschädigter Fluganzug"
  STR_FLYING_SUIT_REPAIR: "Reparatur Fluganzug"
  STR_UPGRADE_FLYING_SUIT_TO_REINFORCED_POWER_SUIT: "Fluganzug -> Verst. Energieanzug"
  STR_UPGRADE_FLYING_SUIT_TO_REINFORCED_FLYING_SUIT: "Fluganzug -> Verst. Fluganzug"

  STR_REINFORCED_POWER_SUIT: "Verstärkter Energieanzug"
  STR_REINFORCED_POWER_SUIT_UC: "VERSTÄRKTER ENERGIEANZUG"
  STR_REINFORCED_POWER_SUIT_CORPSE: "Beschädigter Verstärkter Energieanzug"
  STR_REINFORCED_POWER_SUIT_REPAIR: "Reparatur Verstärkter Energieanzug"
  STR_REINFORCED_POWER_SUIT_UFOPEDIA: "Eine verbesserte Version unseres ursprünglichen Energieanzugs. Sie verfügt über deutlich höheren Schutz, noch bessere Resistenz gegen Plasmawaffen, neue verstärkte Servomotoren zur Erhöhung der Bewegungsgeschwindigkeit des Trägers sowie ein Zielunterstützungssystem zur Verbesserung der Reaktionsschüsse."
  STR_UPGRADE_REINFORCED_POWER_SUIT_TO_REINFORCED_FLYING_SUIT: "Verst. Energieanzug -> Verst. Fluganzug"

  STR_REINFORCED_FLYING_SUIT: "Verstärkter Fluganzug"
  STR_REINFORCED_FLYING_SUIT_UC: "VERSTÄRKTER FLUGANZUG"
  STR_REINFORCED_FLYING_SUIT_CORPSE: "Beschädigter Verstärkter Fluganzug"
  STR_REINFORCED_FLYING_SUIT_REPAIR: "Reparatur Verstärkter Fluganzug"
  STR_REINFORCED_FLYING_SUIT_UFOPEDIA: "Dies ist eine verbesserte Version unseres früheren Fluganzugs. Seine Schutzfähigkeiten wurden deutlich erhöht. Die verstärkten Servomotoren aus dem verbesserten Energieanzugs-Design ermöglichen ebenfalls eine höhere Bewegungsgeschwindigkeit des Trägers. Das verbesserte Zielsystem für Reaktionsschüsse wurde ebenfalls integriert und die Resistenz gegen Plasmawaffen weiter erhöht. Die beste Rüstung, die unsere Truppen erwerben können."
#END ARMORS

#BEGIN WEAPONS
  STR_COMBAT_KNIFE: "Kampfmesser"
  STR_COMBAT_KNIFE_UFOPEDIA: "Mit seiner gehärteten Klinge und Spitze kann ein ausgebildeter Einsatzagent einen leicht gepanzerten Gegner lautlos mit einem einzigen Hieb oder Stoß töten.{NEWLINE}Geeignet für jede Art von Nahkampf.{NEWLINE}Der Stärke-Wert des Trägers erhöht den verursachten Schaden um seinen Wert."

  STR_ALLOY_KNIFE: "Legierungsmesser"
  STR_ALLOY_KNIFE_UFOPEDIA: "Dieses Kampfmesser wurde aus Außerirdischenlegierungen gefertigt, die eine schärfere Klinge ermöglichen als jedes andere uns zur Verfügung stehende Material.{NEWLINE}Der Stärke-Wert des Trägers erhöht den verursachten Schaden um seinen Wert."

  STR_ALLOY_SWORD: "Legierungsschwert"
  STR_ALLOY_SWORD_UFOPEDIA: "Dieses speziell gefertigte Schwert ist eine äußerst effektive Nahkampfwaffe, die die Stärke und das Können eines Soldaten nutzt, um selbst schwer gepanzerte Gegner auszuschalten.{NEWLINE}Der Stärke-Wert des Trägers erhöht den verursachten Schaden um seinen Wert."

  STR_PISTOL_AA_CLIP: "Pistolen-Legierungs-Magazin"
  STR_PISTOL_AA_CLIP_X3: "Pistolen-Legierungs-Magazin [x3]"
  STR_RIFLE_AA_CLIP: "Gewehr-Legierungs-Magazin"
  STR_RIFLE_AA_CLIP_X2: "Gewehr-Legierungs-Magazin [x2]"

  STR_TASER_PISTOL: "Taser-Pistole"
  STR_TASER_PISTOL_CLIP: "Taser-Pistolen-Magazin"
  STR_TASER_PISTOL_UFOPEDIA: "Eine nicht-tödliche Waffe, abgeleitet von einem sehr modernen Polizeidesign, die Ziele auf bis zu 15 Metern kampfunfähig machen kann. Obwohl sie eine schwächere Ladung als Schlagwaffen zur Betäubung liefert, sorgt der Pistolen-Griff für einfache Handhabung und die Reichweite macht sie zu einer wertvollen Ergänzung."
  STR_TASER_PISTOL_ELERIUM_CLIP: "Taser-Pistolen-Elerium-Magazin"
  STR_TASER_PISTOL_ELERIUM_CLIP_X2: "Taser-Pistolen-Elerium-Magazin [x2]"
  STR_TASER_PISTOL_ELERIUM_CLIP_UFOPEDIA: "Diese nicht-tödlichen Energiezellen, abgeleitet von einem modernen Polizeidesign, können Ziele auf bis zu 15 Metern kampfunfähig machen. Durch den Einsatz von Elerium-115 zur Energieversorgung verfügen diese Zellen über eine deutlich höhere Betäubungswirkung als frühere rein menschliche Konstruktionen."

  STR_SHOTGUN: "Schrotflinte"
  STR_SHOTGUN_CLIP: "Schrotpatronen"
  STR_SHOTGUN_AA_CLIP: "Legierungs-Schrotpatronen"
  STR_SHOTGUN_UFOPEDIA: "Die Standard-Schrotflinte von X-Com verschießt 12-Gauge-Schrotmunition und verursacht hohen Schaden bei ungeschützten Zielen auf kurze Distanz. Die geringe Durchschlagskraft und Streuung begrenzen jedoch ihre Effektivität gegen stärkere Gegner oder auf größere Entfernungen."

  STR_SNIPER_RIFLE: "Scharfschützengewehr"
  STR_SNIPER_RIFLE_CLIP: "Scharfschützengewehr-Magazin"
  STR_SNIPER_RIFLE_AA_CLIP: "Legierungs-Scharfschützengewehr-Magazin"
  STR_SNIPER_RIFLE_UFOPEDIA: "Dieses 12,7-mm-Scharfschützengewehr ist stärker als ein Standardgewehr und besitzt eine ausgezeichnete Präzision. Allerdings ist es schwieriger zu handhaben und hat eine geringe Feuerrate."

  STR_HC_AA_AMMO: "HC-AP Legierungsmunition"
  STR_HC_AA_AMMO_UFOPEDIA: "Dieses Magazin für die Schwerkanone besteht aus Außerirdischenlegierungen und bietet erhöhte Durchschlagskraft gegen gepanzerte Ziele."
  STR_HC_EHE_AMMO: "HC-EHE Hochleistungs-Sprengmunition"
  STR_HC_EHE_AMMO_UFOPEDIA: "Dieses Magazin für die Schwerkanone kombiniert Außerirdischenlegierungen und Elerium-115 zu einer tödlichen Sprengladung mit Flächenschaden. Vorsicht im Nahkampf wegen des Explosionsradius – extrem effektiv gegen die meisten Gegner."

  STR_AC_AA_AMMO: "AC-AP Legierungsmunition"
  STR_AC_AA_AMMO_UFOPEDIA: "Dieses Magazin für die Autokanone besteht aus Außerirdischenlegierungen und bietet erhöhte Durchschlagskraft gegen gepanzerte Ziele."
  STR_AC_EHE_AMMO: "AC-EHE Hochleistungs-Sprengmunition"
  STR_AC_EHE_AMMO_UFOPEDIA: "Dieses Magazin für die Autokanone kombiniert Außerirdischenlegierungen und Elerium-115 zu einer tödlichen Explosivladung mit Flächenschaden. Optimal gegen leicht gepanzerte Ziele, jedoch im Nahkampf gefährlich."

  STR_GRENADE_LAUNCHER: "Granatwerfer"
  STR_GRENADE_LAUNCHER_HE_AMMO: "40mm-Granate (HE)"
  STR_GRENADE_LAUNCHER_IC_AMMO: "40mm-Granate (Brand)"
  STR_GRENADE_LAUNCHER_SMOKE_AMMO: "40mm-Granate (Rauch)"
  STR_GRENADE_LAUNCHER_UFOPEDIA: "Der M-79-Granatwerfer verfügt über verschiedene Munitionsarten, die ihn in vielen Kampfsituationen äußerst flexibel machen."

  STR_ELERIUM_ROCKET: "Elerium-Rakete"
  STR_ELERIUM_ROCKET_UFOPEDIA: "Wir haben einen Elerium-115-Gefechtskopf mit einem modifizierten Raketenrahmen kombiniert, sodass er mit unseren Standard-Raketenwerfern kompatibel ist. Die erhöhte Sprengkraft dieser Waffe ist verheerend."

  STR_SCATTER_LASER: "Streulaser"
  STR_SCATTER_LASER_UFOPEDIA: "Durch die Eigenschaften der Außerirdischenlegierungen erzeugt dieser Streulaser eine ähnliche Streuung wie eine Schrotflinte. Dadurch eignet er sich für den Nahkampf und bietet hohe Durchschlagskraft. Zusätzlich verfügt er über einen Doppel-Schuss-Modus im Nahbereich – nur wenige Gegner überleben dies."

  STR_HEAVY_LASER: "Schwerer Laser/Scharfschütze"
  STR_HEAVY_LASER_UFOPEDIA: "Der schwere Laser/Scharfschütze ist unhandlich, aber extrem effektiv. Er wurde mit einem Zielfernrohr ausgestattet und eignet sich hervorragend für Angriffe auf große Distanz. Die erhöhte Feuerkraft geht jedoch zulasten des Feuerstoßmodus."
  STR_HEAVY_LASER_AUTO: "Schwerer Laser/Auto"
  STR_HEAVY_LASER_AUTO_UFOPEDIA: "Der schwere Laser/Auto ist extrem effektiv im mittleren Kampfbereich, wenn hohe Durchschlagskraft gefragt ist. Das fehlende präzise Zielen wird durch einen automatischen Burst ausgeglichen, der vier Hochleistungslaserstrahlen abfeuert."

  STR_FIELD_MEDI_PACK: "Feldsanitätspack"
  STR_FIELD_MEDI_PACK_UFOPEDIA: "Das Feldsanitätspack kombiniert Heilmittel mit Schmerzmitteln und Stimulanzien. Zur Anwendung muss der Soldat dem Ziel zugewandt sein. Bei bewusstlosen Soldaten muss direkt über dem Körper gestanden werden.{NEWLINE}HEILUNG> Rote Körperteile zeigen tödliche Wunden. Wähle ein verletztes Körperteil und klicke auf 'Heilen'. Eine tödliche Wunde wird geheilt und 1 Lebenspunkt wiederhergestellt.{NEWLINE}STIMULANS> Stellt 5 Energie wieder her oder belebt bewusstlose Soldaten.{NEWLINE}SCHMERZMITTEL> Stellt die Moral verletzter Soldaten wieder her.{NEWLINE}MAX. VERWENDUNGEN> HEILUNG: 3 | STIMULANS: 3 | SCHMERZMITTEL: 3"

  STR_MEDI_KIT_UFOPEDIA: "Das Medikit kombiniert Heilmittel mit Schmerzmitteln und Stimulanzien. Zur Anwendung muss der Soldat dem Ziel zugewandt sein. Bei bewusstlosen Soldaten muss direkt über dem Körper gestanden werden.{NEWLINE}HEILUNG> Rote Körperteile zeigen tödliche Wunden. 3 Lebenspunkte werden pro Anwendung wiederhergestellt.{NEWLINE}STIMULANS> Stellt 10 Energie wieder her oder belebt bewusstlose Soldaten.{NEWLINE}SCHMERZMITTEL> Stellt die Moral verletzter Soldaten wieder her.{NEWLINE}MAX. VERWENDUNGEN> HEILUNG: 6 | STIMULANS: 6 | SCHMERZMITTEL: 6"
  STR_UPGRADE_MEDI_KIT_TO_ADVANCED_MEDI_KIT: "Medikit -> Fortschrittliches Medikit"

  STR_ADVANCED_MEDI_KIT: "Fortschrittliches Medikit"
  STR_ADVANCED_MEDI_KIT_UFOPEDIA: "Das fortschrittliche Medikit kombiniert Heilmittel mit Schmerzmitteln und Stimulanzien. Zur Anwendung muss der Soldat dem Ziel zugewandt sein. Bei bewusstlosen Soldaten muss direkt über dem Körper gestanden werden.{NEWLINE}HEILUNG> 6 Lebenspunkte pro Anwendung.{NEWLINE}STIMULANS> Stellt 15 Energie wieder her oder belebt bewusstlose Soldaten.{NEWLINE}SCHMERZMITTEL> Stellt die Moral verletzter Soldaten wieder her.{NEWLINE}MAX. VERWENDUNGEN> HEILUNG: 9 | STIMULANS: 9 | SCHMERZMITTEL: 9"

  STR_ELERIUM_STUN_ROD: "Elerium-betriebener Betäubungsstab"
  STR_ELERIUM_STUN_ROD_UFOPEDIA: "Durch Elerium-115-Energiezellen als Stromquelle konnte die elektrische Schockladung deutlich erhöht werden. Dieses Gerät funktioniert nur im Nahkampf und betäubt lebende Organismen, ohne sie zu töten."

  STR_FLASHBANG_GRENADE: "Blendgranate"
  STR_FLASHBANG_GRENADE_UFOPEDIA: "Eine einfache Blendgranate, die Licht, Lärm und Schockeffekte nutzt, um Ziele kampfunfähig zu machen. Geeignet, um Zivilisten zu sichern oder Gegner lebend gefangen zu nehmen."

  STR_INC_GRENADE: "Brandgranate"
  STR_INC_GRENADE_UFOPEDIA: "Brandgranaten sind nützlich zur Beleuchtung und zum Freiräumen von Vegetation. Feuer kann sich ausbreiten und ist besonders effektiv gegen große Ziele."

  STR_ALIEN_PROXY_GRENADE: "Außerirdische Näherungsgranate"
  STR_ALIEN_PROXY_GRENADE_UFOPEDIA: "Durch Analyse des Zündmechanismus von Außerirdischengranaten konnten wir ihn durch unsere Standard-Näherungszünder ersetzen. Dies ermöglicht effektivere Hinterhalte gegen außerirdische Gegner."

  STR_STUN_GRENADE: "Betäubungsgranate"
  STR_STUN_GRENADE_UFOPEDIA: "Eine umgebaute Betäubungsbombe, die nun wie eine Granate geworfen werden kann und denselben Effekt besitzt."

  STR_FIRE_GRENADE: "Feuergranate"
  STR_FIRE_GRENADE_UFOPEDIA: "Eine umgebaute Feuerbombe, die nun wie eine Granate geworfen werden kann."

  STR_FIRE_EXTINGUISHER: "Feuerlöscher"
  STR_FIRE_EXTINGUISHER_UFOPEDIA: "Ein Feuerlöscher dient zur Bekämpfung kleiner Brände und ist nicht für großflächige oder gefährliche Brandlagen geeignet."

  STR_PLASMA_BLADE: "Plasmaklinge"
  STR_PLASMA_BLADE_UFOPEDIA: "Dieses Gerät ist im Wesentlichen ein Außerirdischenkampfmesser mit monomolekular geschärfter Klinge. Eine magnetische Hülle umgibt die Klinge mit einem Plasmafeld, das selbst hitzebeständige Panzerung durchdringen kann.{NEWLINE}Der Stärke-Wert des Trägers erhöht den verursachten Schaden um seinen Wert."
  STR_PLASMA_SWORD: "Plasmaschwert"
  STR_PLASMA_SWORD_UFOPEDIA: "Diese tödliche Schwertwaffe kombiniert eine breite Klinge mit mikrometerdünner Schneide, einen Plasmaemitter und einen Elektromagneten. Beim Aktivieren strömt heißes Plasma in das elektromagnetische Feld um die Klinge und überhitzt sie so stark, dass ihre Berührung Titan wie Wasser fließen lassen würde.{NEWLINE}Der Stärke-Wert des Trägers erhöht den verursachten Schaden um seinen Wert."

  STR_PLASMA_PISTOL_ELERIUM_CLIP: "Plasmapistolen-Eleriummagazin"
  STR_PLASMA_PISTOL_ELERIUM_CLIP_UFOPEDIA: "Eine verbesserte Energiequelle für die kleine außerirdische Plasma-Pistole. Sie enthält eine unbekannte und nicht reproduzierbare spezielle räumliche Konfiguration von Elerium-115, der Quelle aller außerirdischen Energie."
  STR_PLASMA_PISTOL_MANU_UNLOCK: "Jedes Plasmapistolen-Magazin"

  STR_PLASMA_RIFLE_ELERIUM_CLIP: "Plasmagewehr-Eleriummagazin"
  STR_PLASMA_RIFLE_ELERIUM_CLIP_UFOPEDIA: "Dies ist eine von zwei Munitionsarten, die das Plasma-Gewehr verwenden kann. Es ermöglicht einen verheerenden Energiestoß aus Antimaterie, der alles zerstört, was er trifft. Enthält eine große Menge Elerium-115."
  STR_PLASMA_RIFLE_MANU_UNLOCK: "Jedes Plasmagewehr-Magazin"

  STR_HEAVY_PLASMA_ELERIUM_CLIP: "Schweres Plasmagewehr-Eleriummagazin"
  STR_HEAVY_PLASMA_ELERIUM_CLIP_UFOPEDIA: "Diese verbesserte Munition für das schwere Plasma basiert direkt auf Elerium-115 in einer speziellen räumlichen Konfiguration. Sie besitzt enorme Zerstörungskraft und enthält eine sehr große Menge Elerium-115."
  STR_HEAVY_PLASMA_MANU_UNLOCK: "Jedes Schweres Plasmagewehr-Magazin"

  STR_PLASMA_SHOTGUN: "Plasmaschrotflinte"
  STR_PLASMA_SHOTGUN_CLIP: "Plasmaschrotflinte-Magazin"
  STR_PLASMA_SHOTGUN_ELERIUM_CLIP: "Plasmaschrotflinte-Eleriummagazin"
  STR_PLASMA_SHOTGUN_UFOPEDIA: "Diese Waffe war zunächst rätselhaft, doch Tests im Labor zeigten, dass der relativ diffuse Strahl auf kurze Distanz extrem verheerend ist, auf lange Distanz jedoch deutlich an Effektivität verliert."
  STR_PLASMA_SHOTGUN_CLIP_UFOPEDIA: "Dies ist eine von zwei Munitionsarten für die Plasmaschrotflinte. Sie erzeugt beim Einsatz einen starken Plasma-Energieschub. Enthält eine kleine Menge Elerium-115."
  STR_PLASMA_SHOTGUN_ELERIUM_CLIP_UFOPEDIA: "Dies ist eine von zwei Munitionsarten für die Plasmaschrotflinte. Sie erzeugt einen verheerenden Antimaterie-Ausstoß, der alles zerstört, was er trifft. Enthält eine große Menge Elerium-115 in spezieller räumlicher Konfiguration."
  STR_PLASMA_SHOTGUN_MANU_UNLOCK: "Jedes Plasmaschrotflinte-Magazin"

  STR_PLASMA_SNIPER_RIFLE: "Plasmascharfschützengewehr"
  STR_PLASMA_SNIPER_RIFLE_CLIP: "Plasmascharfschützengewehr-Magazin"
  STR_PLASMA_SNIPER_RIFLE_ELERIUM_CLIP: "Plasmascharfschützengewehr-Eleriummagazin"
  STR_PLASMA_SNIPER_RIFLE_UFOPEDIA: "Dies ist eine extrem präzise und gleichzeitig sehr starke Waffe, die auf der Beschleunigung von Teilchen innerhalb eines winzigen Antigravitationsfeldes basiert."
  STR_PLASMA_SNIPER_RIFLE_CLIP_UFOPEDIA: "Dieses kleine Objekt dient als Energiequelle für das Plasmascharfschützengewehr – eine präzise außerirdische Waffe. Enthält eine kleine Menge Elerium-115."
  STR_PLASMA_SNIPER_RIFLE_ELERIUM_CLIP_UFOPEDIA: "Diese Munition für das Plasmascharfschützengewehr basiert direkt auf Elerium-115 in einer speziellen räumlichen Konfiguration. Sie besitzt enorme Zerstörungskraft und enthält eine große Menge Elerium-115."
  STR_PLASMA_SNIPER_RIFLE_MANU_UNLOCK: "Jedes Plasmascharfschützengewehr-Magazin"

  STR_SMALL_LAUNCHER_UFOPEDIA: "Kompakter, aber leistungsstarker außerirdischer Werfer, der in vielen Kampfszenarien nützlich ist. Eine vielseitige und tödliche Waffe – tragbare Artillerie außerirdischer Herkunft."
  STR_ELERIUM_BOMB: "Elerium-Bombe"
  STR_ELERIUM_BOMB_UFOPEDIA: "Die Elerium-Bombe ist eine mächtige und tödliche Munition für die Kleine Abschussrampe mit starkem Flächenschaden."
  STR_FIRE_BOMB: "Feuerbombe"
  STR_FIRE_BOMB_UFOPEDIA: "Die Feuerbombe ist eine von Außerirdischen modifizierte Elerium-Bombe, die starke Hitze in einem bestimmten Radius erzeugt und alles Lebende verbrennt. Dadurch wird die Kleine Abschussrampe zu einer Waffe für Pyromanen."
  STR_SMOKE_BOMB: "Rauchbombe"
  STR_SMOKE_BOMB_UFOPEDIA: "Die Rauchbombe erzeugt Deckungsrauch für unsere Truppen auf dem Schlachtfeld. Vorsicht: Rauch kann sowohl Vorteil als auch Nachteil sein!"
#END WEAPONS

#BEGIN STORY ITEMS
  STR_ALIEN_DATA_SLATE: "Außerirdische Datentafel"
  STR_ALIEN_DATA_SLATE_UFOPEDIA: "Die Untersuchung dieser Datentafel und die Übersetzung der enthaltenen Daten führten zu einem besseren Verständnis der außerirdischen Technologie. Im Bereich der Optik sind bahnbrechende Ergebnisse zu erwarten. Außerdem fanden wir Hinweise auf eine noch größere Quelle außerirdischen Wissens – ein Objekt, dessen Name sich grob als Außerirdischer Datenkern übersetzen lässt. Dieser Datenkern könnte detaillierte Informationen über die außerirdischen Waffen liefern; wir müssen dieses Objekt um jeden Preis beschaffen. Es wird derzeit vermutet, dass es sich auf den gefährlichsten UFOs befindet, denen wir begegnen."

  STR_ALIEN_DATA_CORE: "Außerirdischer Datenkern"
  STR_ALIEN_DATA_CORE_UFOPEDIA: "Dieses Objekt enthält eine Fülle an Informationen, insbesondere Spezifikationen der außerirdischen Plasmawaffen sowie deren Energieerzeugung und -speicherung. Damit können wir die Funktionsweise dieser Waffen endlich vollständig verstehen. Die Gleichungen für die Plasmafelder sind sehr komplex und offenbar für jede Waffe einzigartig. Um sie zu lösen, benötigen wir mehr Wissen über spezifische technische Aspekte dieser Waffen. Außerirdische mit technischem Verständnis könnten hier entscheidende Durchbrüche ermöglichen."
#END STORY ITEMS

