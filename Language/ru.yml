  STR_HC_AA_AMMO: "Бронебойные боеприпасы (СП) для тяжёлой пушки"
  STR_HC_AA_AMMO_UFOPEDIA: "Эта обойма для тяжёлой пушки изготовлена из сплавов пришельцев, что повышает мощность и пробивную способность против бронированных целей."
  STR_HC_EHE_AMMO: "Улучшенные осколочно-фугасные боеприпасы (СП) для тяжёлой пушки"
  STR_HC_EHE_AMMO_UFOPEDIA: "Эта обойма для тяжёлой пушки сочетает сплавы пришельцев и Элерий-115, создавая крайне смертоносный взрывной снаряд. Осторожно — большой радиус поражения. В ближнем бою крайне опасна."
  STR_AC_AA_AMMO: "Бронебойные боеприпасы (СП) для автопушки"
  STR_AC_AA_AMMO_UFOPEDIA: "Этот магазин для автопушки изготовлен из сплавов пришельцев для повышения мощности и пробивной способности."
  STR_AC_EHE_AMMO: "Улучшенные осколочно-фугасные боеприпасы (СП) для автопушки"
  STR_AC_EHE_AMMO_UFOPEDIA: "Этот магазин для автопушки сочетает сплавы пришельцев и Элерий-115, создавая мощный взрывной снаряд. Идеально подходит для поражения слабо бронированных целей."

  STR_GRENADE_LAUNCHER: "Гранатомёт"
