#BEGIN STORY ITEMS
  STR_ALIEN_DATA_SLATE: "Носитель данных пришельцев"
  STR_ALIEN_DATA_SLATE_UFOPEDIA: "Изучение этого носителя и перевод содержащихся на нём данных привели нас к лучшему пониманию технологии чужих. Можно ожидать прорывных результатов на поприще оптики. Мы также нашли упоминания о том, что существует еще более крупный источник знаний чужих, предмет, чье название можно грубо перевести как \"Ядро данных инопланетян\". Это ядро данных может предоставить нам подробную информацию об арсенале чужих и нам нужно любой ценой заполучить этот предмет. На данный момент мы предполагаем, что найти его можно на самых опасных НЛО, какие нам только встретятся."

  STR_ALIEN_DATA_CORE: "Ядро данных пришельцев"
  STR_ALIEN_DATA_CORE_UFOPEDIA: "В этом предмете информация содержится в изобилии, особенно касательно плазменного вооружения чужих, производства и хранения энергии. С этими сведениями мы наконец-то сможет полностью понять принцип работы этого оружия. Уравнения для плазменных полей довольно сложны и, похоже, уникальны для каждого вида вооружения. Для решения этих уравнений понадобится больше знаний по определенным техническим аспектам этих видов оружия. Технически подкованные пришельцы могут помочь совершить большой прорыв в этой области. "
#END STORY ITEMS

