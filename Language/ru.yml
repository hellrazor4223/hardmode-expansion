  STR_WALKERTANK_PLASMA_CORPSE: "Повреждённый Шагающий танк/Плазма"
  STR_WALKERTANK_PLASMA_REPAIR: "Ремонт Шагающего танка/Плазмы"
  STR_WALKERTANK_PLASMA_UFOPEDIA: "После отключения псионической связи это юнит больше не контролируется эфириалами. Мы смогли взломать его операционную систему. К сожалению, часть систем была повреждена в процессе, что привело к снижению скорости обработки. Для взлома нам нужен неповреждённый Бронированный Сектопод."
