  STR_TERROR_MISSION_INDUSTRIAL: "ТЕРРОР В ПРОМЗОНЕ"
  STR_TERROR_MISSION_INDUSTRIAL_BRIEFING: "Пришельцы атаковали промышленный район. Производственные объекты и гражданское население находятся под угрозой. Ваш отряд должен уничтожить всех пришельцев и защитить мирных жителей. Для завершения миссии погрузите всех оперативников в транспорт и нажмите «Покинуть миссию»."

  STR_TERROR_MISSION_PORT: "ТЕРРОР В ПОРТУ"
  STR_TERROR_MISSION_PORT_BRIEFING: "Пришельцы атаковали прибрежный порт. Порт и гражданское население находятся под угрозой. Ваш отряд должен уничтожить всех пришельцев и защитить мирных жителей. Для завершения миссии погрузите всех оперативников в транспорт и нажмите «Покинуть миссию»."

