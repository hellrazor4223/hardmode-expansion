  STR_GAZER_UFOPEDIA: "Обсерваторы выглядят как прямоходящие черепахи и действительно столь же крепки, как и кажутся. Их массивная тяжёлая броня обеспечивает formidable защиту от любых повреждений, особенно от бронебойных снарядов и плазменного оружия."
