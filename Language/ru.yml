  STR_GRENADE_LAUNCHER_IC_AMMO: "40-мм граната (Зажигательная)"
  STR_GRENADE_LAUNCHER_SMOKE_AMMO: "40-мм граната (Дымовая)"
  STR_GRENADE_LAUNCHER_UFOPEDIA: "Гранатомёт M-79 имеет широкий ассортимент боеприпасов, что делает его эффективным в самых разных ситуациях."

  STR_ELERIUM_ROCKET: "Элериевая ракета"
  STR_ELERIUM_ROCKET_UFOPEDIA: "Нам удалось создать боеголовку на основе Элерия-115 и установить её в модифицированный корпус большой ракеты, совместимый с нашей стандартной ракетной установкой. Повышенная взрывная мощь этого оружия должна быть опустошительной."

  STR_SCATTER_LASER: "Рассеивающий лазер"
  STR_SCATTER_LASER_UFOPEDIA: "Используя свойства сплавов пришельцев, этот лазер создаёт рассеянный луч, похожий на выстрел дробовика. Эффективен в ближнем бою и обладает высокой останавливающей силой. Также имеет режим двойного выстрела в упор."

  STR_HEAVY_LASER: "Тяжёлый лазер/Снайпер"
  STR_HEAVY_LASER_UFOPEDIA: "Тяжёлый лазер/Снайпер громоздкий, но чрезвычайно эффективный. Оснащён снайперским прицелом и отлично подходит для уничтожения пришельцев на большой дистанции. Повышенная мощность достигнута за счёт отсутствия режима автоматического огня."
  STR_HEAVY_LASER_AUTO: "Тяжёлый лазер/Авто"
  STR_HEAVY_LASER_AUTO_UFOPEDIA: "Тяжёлый лазер/Авто крайне эффективен в средних дистанциях, когда требуется высокая останавливающая сила. Отсутствие прицельного выстрела компенсируется очередями из четырёх мощных лазерных импульсов."

  STR_FIELD_MEDI_PACK: "Полевой медкомплект"
  STR_FIELD_MEDI_PACK_UFOPEDIA: "Полевой медкомплект сочетает лечебные средства, обезболивающие и стимуляторы. Для использования повернитесь лицом к раненому солдату. Если солдат без сознания — встаньте над ним.{NEWLINE}МАКС. ИСПОЛЬЗОВАНИЙ: ЛЕЧЕНИЕ: 3 | СТИМУЛЯТОР: 3 | ОБЕЗБОЛИВАЮЩЕЕ: 3"

  STR_MEDI_KIT_UFOPEDIA: "Медкомплект сочетает лечебные средства, обезболивающие и стимуляторы. Для использования повернитесь лицом к раненому солдату. Если солдат без сознания — встаньте над ним.{NEWLINE}МАКС. ИСПОЛЬЗОВАНИЙ: ЛЕЧЕНИЕ: 6 | СТИМУЛЯТОР: 6 | ОБЕЗБОЛИВАЮЩЕЕ: 6"
  STR_UPGRADE_MEDI_KIT_TO_ADVANCED_MEDI_KIT: "Медкомплект → Продвинутый медкомплект"

  STR_ADVANCED_MEDI_KIT: "Продвинутый медкомплект"
  STR_ADVANCED_MEDI_KIT_UFOPEDIA: "Продвинутый медкомплект сочетает лечебные средства, обезболивающие и стимуляторы.{NEWLINE}МАКС. ИСПОЛЬЗОВАНИЙ: ЛЕЧЕНИЕ: 9 | СТИМУЛЯТОР: 9 | ОБЕЗБОЛИВАЮЩЕЕ: 9"

  STR_ELERIUM_STUN_ROD: "Элериевый шоковый жезл"
  STR_ELERIUM_STUN_ROD_UFOPEDIA: "Использование энергоблоков на основе Элерия-115 позволило значительно увеличить силу электрического разряда. Это оружие можно использовать только в ближнем бою, но оно оглушает живые организмы, не убивая их."

  STR_FLASHBANG_GRENADE: "Светошумовая граната"
  STR_FLASHBANG_GRENADE_UFOPEDIA: "Базовая светошумовая граната, использующая вспышку, звук и шум для временного вывода цели из строя. Хороша для нейтрализации гражданских или захвата врага живьём."

  STR_INC_GRENADE: "Зажигательная граната"
  STR_INC_GRENADE_UFOPEDIA: "Зажигательные гранаты бесценны для освещения ночи и уничтожения растительности. Будьте осторожны — огонь может распространяться и очень эффективен против крупных целей."

  STR_ALIEN_PROXY_GRENADE: "Проксимити-граната пришельцев"
  STR_ALIEN_PROXY_GRENADE_UFOPEDIA: "Изучив механизм взрывателя гранат пришельцев, мы смогли заменить его на наш стандартный датчик приближения. Это позволит устраивать более смертоносные засады."

  STR_STUN_GRENADE: "Оглушающая граната"
  STR_STUN_GRENADE_UFOPEDIA: "Переделанная оглушающая бомба, которую теперь можно бросать как обычную гранату. Имеет тот же эффект. Для производства требуются оглушающие бомбы."

  STR_FIRE_GRENADE: "Огненная граната"
  STR_FIRE_GRENADE_UFOPEDIA: "Переделанная огненная бомба, которую теперь можно бросать как гранату. Зажигательное оружие инопланетного типа. Для производства требуются огненные бомбы."

  STR_FIRE_EXTINGUISHER: "Огнетушитель"
  STR_FIRE_EXTINGUISHER_UFOPEDIA: "Огнетушитель — устройство активной противопожарной защиты для тушения небольших очагов возгорания. Не предназначен для тушения крупных пожаров."

  STR_PLASMA_BLADE: "Плазменный клинок"
  STR_PLASMA_BLADE_UFOPEDIA: "Это устройство, по сути являющееся боевым ножом пришельцев, имеет лезвие с мономолекулярной заточкой. Магнитная оболочка окружает лезвие плазменным полем, позволяя легко пробивать современную броню.{NEWLINE}Сила пользователя увеличивает наносимый урон."
  STR_PLASMA_SWORD: "Плазменный меч"
  STR_PLASMA_SWORD_UFOPEDIA: "Это смертоносное оружие сочетает большое лезвие с микронной заточкой, плазменный излучатель и электромагнит. При активации горячая плазма заполняет электромагнитное поле вокруг клинка, нагревая его до температуры, при которой титан течёт как вода.{NEWLINE}Сила пользователя увеличивает наносимый урон."

  STR_PLASMA_PISTOL_ELERIUM_CLIP: "Элериевая обойма для плазменного пистолета"
  STR_PLASMA_PISTOL_ELERIUM_CLIP_UFOPEDIA: "Улучшенная версия источника питания для малого плазменного пистолета пришельцев. Содержит особую пространственную конфигурацию Элерия-115."
