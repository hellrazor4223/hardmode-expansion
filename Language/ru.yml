  STR_MEDAL_ALIENS_KILLED_UFOPEDIA: "Мы можем показать врагу неприемлемую цену его сопротивления:{NEWLINE}  вторгаясь на его территорию;{NEWLINE}  проводя операции, увеличивающие его страдания;{NEWLINE}  или изматывая противника.{NEWLINE}     -- Клаузевиц{NEWLINE}{NEWLINE}Эта награда вручается солдату, доказавшему свою смертоносность и уничтожившему множество пришельцев.{NEWLINE}{NEWLINE}Награда выдаётся начиная с 10 убийств. Дополнительные награды — за каждые следующие 10 убийств."

  STR_MEDAL_ALIENS_KILLED_BY_INCENDIARY: "Звезда «Адское Пламя»"
  STR_MEDAL_ALIENS_KILLED_BY_INCENDIARY_DESCRIPTION: "Вручается солдату, уничтожившему пришельцев с помощью зажигательного оружия."
  STR_MEDAL_ALIENS_KILLED_BY_INCENDIARY_UFOPEDIA: "Из четырёх классических элементов огонь — самый первобытный, самый опасный, самый преобразующий и самый весёлый.{NEWLINE}     -- The Rant{NEWLINE}{NEWLINE}Эта награда вручается тем, кто овладел искусством уничтожения врага огнём. Выдаётся за каждые пять сожжённых пришельцев, до четырёх раз."

  STR_MEDAL_ALIENS_KILLED_BY_RACE: "Медаль «Ксеноцид»"
  STR_MEDAL_ALIENS_KILLED_BY_RACE_DESCRIPTION: "Вручается солдату, успешно сражавшемуся с угрозой расы {0}."
  STR_MEDAL_ALIENS_KILLED_BY_RACE_UFOPEDIA: "Если вы ведёте честный бой — значит, вы плохо спланировали операцию.{NEWLINE}     -- Дэвид Хэкворт{NEWLINE}{NEWLINE}Вручается солдату, ставшему настоящей машиной смерти для конкретной расы пришельцев. Эта раса настолько пострадала от рук этого героя X-COM, что прозвала его Ксеноцидом.{NEWLINE}{NEWLINE}Награда выдаётся за 10, 20 и 30 убийств представителей одной расы."

  STR_MEDAL_ALIENS_KNOCKED_OUT: "Орден Сдержанности"
  STR_MEDAL_ALIENS_KNOCKED_OUT_DESCRIPTION: "Вручается солдату, использовавшему нелетальную силу для захвата большого количества пришельцев."
  STR_MEDAL_ALIENS_KNOCKED_OUT_UFOPEDIA: "Тот, кто найдёт «Тысячелетний сокол», получит щедрую награду. Вы можете использовать любые методы, но они нужны мне живыми. Без disintegrations.{NEWLINE}     -- Дарт Вейдер{NEWLINE}{NEWLINE}Вручается в признание мастерства захвата инопланетян живьём. Живые экземпляры крайне важны для понимания угрозы.{NEWLINE}{NEWLINE}Награда выдаётся за 4, 8, 12 и 16 захваченных."

  STR_MEDAL_ALIEN_BASE_ASSAULT: "Крест Землянина"
  STR_MEDAL_ALIEN_BASE_ASSAULT_DESCRIPTION: "Вручается солдату, участвовавшему в успешном штурме базы пришельцев."
  STR_MEDAL_ALIEN_BASE_ASSAULT_UFOPEDIA: "Поставь свою армию в смертельную опасность — и она выживет; брось её в гибельный поток — и она выйдет целой.{NEWLINE}     -- Сунь Цзы{NEWLINE}{NEWLINE}Каждая атака на базу врага — шаг к победе. Уничтожение противника в его опорных пунктах приближает окончательную победу.{NEWLINE}{NEWLINE}Эта награда вручается участникам штурма базы пришельцев. Может быть выдана до трёх раз."

  STR_MEDAL_ALIEN_SOLDIERS_KILLED_ALL_RACES: "Орден Молота"
  STR_MEDAL_ALIEN_SOLDIERS_KILLED_ALL_RACES_DESCRIPTION: "Вручается солдату, уничтожившему пришельцев всех видов."
  STR_MEDAL_ALIEN_SOLDIERS_KILLED_ALL_RACES_UFOPEDIA: "Не бойся их, дитя моё. Мы убьём их всех.{NEWLINE}     -- «Королевство»{NEWLINE}{NEWLINE}Эта медаль признаёт мастерство солдата в уничтожении пришельцев всех форм. Ни одна раса не избежит его ярости.{NEWLINE}{NEWLINE}Выдаётся за убийство солдат всех основных рас. Дальнейшие награды — за 5, 10 и 15 дополнительных представителей каждой расы."

  STR_MEDAL_ALLBATTLETYPES: "Медаль Armis Potens"
  STR_MEDAL_ALLBATTLETYPES_DESCRIPTION: "Вручается солдату, продемонстрировавшему мастерство владения всеми типами оружия."
  STR_MEDAL_ALLBATTLETYPES_UFOPEDIA: "«Могущественный в оружии» — вот что означает Armis Potens. Пехотинец обучен сражаться разными видами оружия.{NEWLINE}{NEWLINE}Награда признаёт ту же гибкость и смертоносность, которую демонстрируют эти универсальные воины.{NEWLINE}{NEWLINE}Выдаётся за уничтожение противника каждым типом оружия: огнестрельным, холодным, гранатами и проксимити-гранатами. Четыре уровня — за 3, 6, 9 и 12 убийств."

  STR_MEDAL_ALLMISSIONS: "Медаль «В ад и обратно»"
  STR_MEDAL_ALLMISSIONS_DESCRIPTION: "Вручается солдату, участвовавшему во всех типах миссий."
  STR_MEDAL_ALLMISSIONS_UFOPEDIA: "Этот солдат видел всё: крушения НЛО, приземления НЛО, террористические миссии, защиту базы и даже штурм вражеской базы.{NEWLINE}{NEWLINE}Награда вручается солдатам, участвовавшим во всех типах операций."

  STR_MEDAL_ALLRANKS: "Берущий имена"
  STR_MEDAL_ALLRANKS_DESCRIPTION: "Вручается солдату, уничтожившему пришельцев всех рангов."
  STR_MEDAL_ALLRANKS_UFOPEDIA: "Они начали задавать жару и брать имена.{NEWLINE}     -- Ральф Кристофер{NEWLINE}{NEWLINE}Награда вручается солдату, убившему хотя бы одного пришельца каждого ранга — от Солдата до Командира."

  STR_MEDAL_ALLUFOS: "Значок TECHINT"
  STR_MEDAL_ALLUFOS_DESCRIPTION: "Вручается солдату, участвовавшему в миссиях со всеми типами НЛО."
  STR_MEDAL_ALLUFOS_UFOPEDIA: "TECHINT (техническая разведка) — получение знаний о возможностях врага через изучение захваченного оборудования.{NEWLINE}{NEWLINE}X-COM получает знания и материалы с каждого захваченного НЛО.{NEWLINE}{NEWLINE}Солдаты, участвовавшие в миссиях со всеми типами НЛО, получают эту награду. Выдаётся один раз."

  STR_MEDAL_ANTITERROR: "Медаль Геркулеса"
  STR_MEDAL_ANTITERROR_DESCRIPTION: "Вручается солдату, уничтожившему все виды террористических угроз."
  STR_MEDAL_ANTITERROR_UFOPEDIA: "Настоящий герой измеряется не силой мышц, а силой сердца.{NEWLINE}     -- Зевс (Геркулес){NEWLINE}{NEWLINE}Как и Геракл, этот солдат уничтожил множество кошмарных чудовищ. Награда вручается за уничтожение хотя бы одного террориста каждого типа. Имеет четыре уровня."

  STR_MEDAL_BASE_DEFENDER: "Медаль Защитника"
  STR_MEDAL_BASE_DEFENDER_DESCRIPTION: "Вручается солдату, участвовавшему в успешной обороне базы."
  STR_MEDAL_BASE_DEFENDER_UFOPEDIA: "Вы не выбираете поле боя — его выбирает за вас Бог. Но вы можете водрузить знамя там, где его никогда не было.{NEWLINE}     -- Наталия Крейн{NEWLINE}{NEWLINE}Эта медаль вручается воину, участвовавшему в успешной обороне базы X-COM. Несмотря на натиск орд пришельцев, он удержал линию.{NEWLINE}{NEWLINE}Выдаётся до трёх раз."

  STR_MEDAL_BESTOFRANK: "Павшая звезда"
  STR_MEDAL_BESTOFRANK_DESCRIPTION: "Вручается посмертно солдату, который был восходящей звездой своего звания."
  STR_MEDAL_BESTOFRANK_UFOPEDIA: "Когда он умрёт, возьми его и разрежь на маленькие звёзды...{NEWLINE}     -- Шекспир, «Ромео и Джульетта»{NEWLINE}{NEWLINE}Герои X-COM заслуживают признания даже после смерти. Эта награда вручается лучшему солдату своего звания на момент гибели."

  STR_MEDAL_BESTSOLDIER: "Героический орден"
  STR_MEDAL_BESTSOLDIER_DESCRIPTION: "Вручается посмертно солдату, который был примером для всех."
  STR_MEDAL_BESTSOLDIER_UFOPEDIA: "Умереть — это ничто. Ужасно — не жить.{NEWLINE}     -- Виктор Гюго{NEWLINE}{NEWLINE}Подвиги героев X-COM живут даже после их смерти. Эта награда вручается лучшему среди павших солдат."

  STR_MEDAL_BRAVERYGAIN: "Легион Отваги"
  STR_MEDAL_BRAVERYGAIN_DESCRIPTION: "Вручается солдату, являющемуся примером храбрости."
  STR_MEDAL_BRAVERYGAIN_UFOPEDIA: "Мужество — это не отсутствие страха, а победа над ним.{NEWLINE}     -- Нельсон Мандела{NEWLINE}{NEWLINE}Этот солдат неоднократно смотрел страху в лицо.{NEWLINE}{NEWLINE}Награда вручается за каждые +10 очков храбрости. Имеет три уровня."

  STR_MEDAL_DAYS_WOUNDED: "Багровое Сердце"
  STR_MEDAL_DAYS_WOUNDED_DESCRIPTION: "Вручается солдату, долгое время находившемуся на лечении после ранений."
  STR_MEDAL_DAYS_WOUNDED_UFOPEDIA: "Эта награда чтит жертву тяжелораненого воина. Вручается за каждые 30 дней лечения (до 300 дней)."

  STR_MEDAL_DOUBLEKILL: "Знак результативности"
  STR_MEDAL_DOUBLEKILL_DESCRIPTION: "Вручается солдату, уничтожившему нескольких противников за короткое время."
  STR_MEDAL_DOUBLEKILL_UFOPEDIA: "Одного противника всегда слишком мало, двух — слишком много.{NEWLINE}     -- Законы Мерфи{NEWLINE}{NEWLINE}Эта награда вручается за быстрое уничтожение двух и более целей. Имеет четыре уровня."

  STR_MEDAL_FALLEN: "Орден Павших"
  STR_MEDAL_FALLEN_DESCRIPTION: "Вручается посмертно в честь жертвы солдата во имя защиты Земли."
  STR_MEDAL_FALLEN_UFOPEDIA: "Герой — это человек, отдавший свою жизнь за нечто большее, чем он сам.{NEWLINE}     -- Джозеф Кэмпбелл{NEWLINE}{NEWLINE}Эта награда посмертно вручается всем солдатам X-COM, погибшим в бою."

  STR_MEDAL_FLANKSHOT: "Знак «Анфиладный огонь»"
  STR_MEDAL_FLANKSHOT_DESCRIPTION: "Вручается солдату, успешно атаковавшему противника с фланга."
  STR_MEDAL_FLANKSHOT_UFOPEDIA: "Анфиладный огонь — это стрельба вдоль фронта противника с фланга.{NEWLINE}{NEWLINE}Награда вручается за каждые три убийства с фланга. Имеет четыре уровня."

  STR_MEDAL_GLOBETROTTER: "Путешественник"
  STR_MEDAL_GLOBETROTTER_DESCRIPTION: "Вручается солдату, защищавшему все страны Земли от инопланетной угрозы."
  STR_MEDAL_GLOBETROTTER_UFOPEDIA: "Не следуй по проторенной дороге. Иди туда, где дороги нет, и оставь свой след.{NEWLINE}     -- Ральф Уолдо Эмерсон{NEWLINE}{NEWLINE}Эта награда вручается за участие в миссиях во всех странах мира."

  STR_MEDAL_GRENADIER: "Медаль Гренадёра"
  STR_MEDAL_GRENADIER_DESCRIPTION: "Вручается солдату, уничтожившему минимум трёх пришельцев одной гранатой."
  STR_MEDAL_GRENADIER_UFOPEDIA: "Гранаты с пятисекундным запалом всегда взрываются через три секунды.{NEWLINE}     -- Законы Мерфи{NEWLINE}{NEWLINE}Эта награда вручается за мастерское использование гранат. Имеет четыре уровня — за уничтожение трёх и более противников одной гранатой."

  STR_MEDAL_HEADSHOT: "Орден Давида"
  STR_MEDAL_HEADSHOT_DESCRIPTION: "Вручается солдату, поразившему несколько целей в голову."
  STR_MEDAL_HEADSHOT_UFOPEDIA: "И поразил Давид филистимлянина в лоб, так что камень вонзился ему в лоб.{NEWLINE}     -- 1 Цар. 17:49{NEWLINE}{NEWLINE}Награда вручается за три точных попадания в голову. Имеет четыре уровня."

  STR_MEDAL_HEALER: "Звезда Гиппократа"
  STR_MEDAL_HEALER_DESCRIPTION: "Вручается солдату, оказывавшему медицинскую помощь на поле боя."
  STR_MEDAL_HEALER_UFOPEDIA: "Мы были очень благодарны нашему скромному врачу. Он был и медбратом, и доктором, и госпиталем в одном лице.{NEWLINE}{NEWLINE}Награда вручается за каждые три вылеченных ранения. Имеет четыре уровня."

  STR_MEDAL_IMPORTANT_ALIENS_KNOCKED_OUT: "Крест Грома"
  STR_MEDAL_IMPORTANT_ALIENS_KNOCKED_OUT_DESCRIPTION: "Вручается солдату, захватившему важных целей (лидеров и командиров) живьём."
  STR_MEDAL_IMPORTANT_ALIENS_KNOCKED_OUT_UFOPEDIA: "Они нужны мне живыми.{NEWLINE}     -- Дарт Вейдер{NEWLINE}{NEWLINE}Высокая награда за захват лидера или командира пришельцев. Выдаётся один раз."

  STR_MEDAL_IRON_MAN: "Железный человек"
  STR_MEDAL_IRON_MAN_DESCRIPTION: "Вручается солдату, в одиночку уничтожившему всех врагов в миссии."
  STR_MEDAL_IRON_MAN_UFOPEDIA: "Если вокруг тебя нет ничего, кроме противника — ты на войне.{NEWLINE}     -- Законы Мерфи{NEWLINE}{NEWLINE}Награда за одиночное выполнение миссии. Имеет один уровень."

  STR_MEDAL_LUCKYSHOT: "Знак Удачи"
  STR_MEDAL_LUCKYSHOT_DESCRIPTION: "Вручается за невероятно точные выстрелы с низким шансом попадания."
  STR_MEDAL_LUCKYSHOT_UFOPEDIA: "Самая лучшая удача — это та, которую ты создаёшь сам.{NEWLINE}     -- Дуглас Макартур{NEWLINE}{NEWLINE}Выдаётся за каждые три удачных выстрела. Имеет четыре уровня."

  STR_MEDAL_MAN_OF_STEEL: "Человек из стали"
  STR_MEDAL_MAN_OF_STEEL_DESCRIPTION: "Вручается солдату, пережившему несколько попаданий в одной миссии."
  STR_MEDAL_MAN_OF_STEEL_UFOPEDIA: "Это всего лишь царапина.{NEWLINE}     -- Чёрный рыцарь (Монти Пайтон){NEWLINE}{NEWLINE}Награда за получение пяти и более ранений в одной миссии. Имеет три уровня."

  STR_MEDAL_MARTYR: "Медаль Самопожертвования"
  STR_MEDAL_MARTYR_DESCRIPTION: "Вручается посмертно солдату, забравшему с собой врагов."
  STR_MEDAL_MARTYR_UFOPEDIA: "Нет человека свободнее того, кому нечего терять.{NEWLINE}{NEWLINE}Выдаётся за каждого врага, ушедшего вместе с солдатом (до 10)."

  STR_MEDAL_MEDIKIT: "Полевой хирург"
  STR_MEDAL_MEDIKIT_DESCRIPTION: "Вручается за регулярное использование медкомплекта."
  STR_MEDAL_MEDIKIT_UFOPEDIA: "Полевой хирург умеет использовать все инструменты.{NEWLINE}{NEWLINE}Награда вручается за каждые три использования медкомплекта (лечение, стимулятор, обезболивающее). Имеет четыре уровня."

  STR_MEDAL_MELEE: "Врукопашную"
  STR_MEDAL_MELEE_DESCRIPTION: "Вручается за убийства холодным оружием."
  STR_MEDAL_MELEE_UFOPEDIA: "Текучесть — вот секрет мастерства.{NEWLINE}     -- Брюс Ли{NEWLINE}{NEWLINE}Награда вручается за каждые четыре убийства в рукопашном бою. Имеет четыре уровня."

  STR_MEDAL_MERCY_CROSS: "Крест Милосердия"
  STR_MEDAL_MERCY_CROSS_DESCRIPTION: "Вручается солдату, единолично оглушившему всех пришельцев в миссии."
  STR_MEDAL_MERCY_CROSS_UFOPEDIA: "Лучше захватить армию целиком, чем уничтожить её.{NEWLINE}     -- Сунь Цзы{NEWLINE}{NEWLINE}Награда за одиночный захват всего экипажа. Имеет три уровня."

  STR_MEDAL_MIA: "Орден Забытых"
  STR_MEDAL_MIA_DESCRIPTION: "Вручается в честь солдат, пропавших без вести."
  STR_MEDAL_MIA_UFOPEDIA: "Мы никогда не забудем их жертвы.{NEWLINE}{NEWLINE}Награда вручается солдатам, пропавшим без вести в бою."

  STR_MEDAL_MINDCONTROL: "Imperio"
  STR_MEDAL_MINDCONTROL_DESCRIPTION: "Вручается за успешное пси-контроль над врагами."
  STR_MEDAL_MINDCONTROL_UFOPEDIA: "Разум — это враг для тех, кто им не владеет.{NEWLINE}{NEWLINE}Награда вручается за каждые три успешных пси-контроля. Имеет четыре уровня."

  STR_MEDAL_NIGHT_TERRORMISSION_COUNT: "Лента «Долгая Ночь»"
  STR_MEDAL_NIGHT_TERRORMISSION_COUNT_DESCRIPTION: "Вручается за участие в ночных террористических миссиях."
  STR_MEDAL_NIGHT_TERRORMISSION_COUNT_UFOPEDIA: "Ночь — время, когда приходят кошмары.{NEWLINE}{NEWLINE}Награда вручается за каждые четыре ночные террористические миссии. Имеет четыре уровня."

  STR_MEDAL_NIKE_CROSS: "Крест Ники"
  STR_MEDAL_NIKE_CROSS_DESCRIPTION: "Вручается солдату, единолично уничтожившему всех пришельцев в миссии."
  STR_MEDAL_NIKE_CROSS_UFOPEDIA: "Настоящий солдат сражается не из ненависти к врагу, а из любви к тому, что защищает.{NEWLINE}{NEWLINE}Награда за одиночное уничтожение всех врагов. Имеет три уровня."

  STR_MEDAL_ONE_MONTH_SERVICE: "Медаль за службу в X-COM"
  STR_MEDAL_ONE_MONTH_SERVICE_DESCRIPTION: "Вручается всем солдатам после первого месяца службы."
  STR_MEDAL_ONE_MONTH_SERVICE_UFOPEDIA: "Человек, которому не за что бороться, — жалкое создание.{NEWLINE}{NEWLINE}Награда вручается всем солдатам за первый месяц службы."

  STR_MEDAL_ORIGINAL8_NAME: "Первый в строю"
  STR_MEDAL_ORIGINAL8_DESCRIPTION: "Вручается солдатам первого набора X-COM."
  STR_MEDAL_ORIGINAL8_UFOPEDIA: "Награда для самых первых бойцов проекта X-COM."

  STR_MEDAL_POSTMORTEM_KILL: "Орден Жнеца"
  STR_MEDAL_POSTMORTEM_KILL_DESCRIPTION: "Вручается посмертно за убийства после собственной смерти."
  STR_MEDAL_POSTMORTEM_KILL_UFOPEDIA: "Есть дороги, по которым нельзя идти...{NEWLINE}     -- Сунь Цзы{NEWLINE}{NEWLINE}Выдаётся за каждого врага, ушедшего вместе с солдатом (до 10)."

  STR_MEDAL_PSIPANIC: "Crucio"
  STR_MEDAL_PSIPANIC_DESCRIPTION: "Вручается за приведение врагов в состояние паники пси-способностями."
  STR_MEDAL_PSIPANIC_UFOPEDIA: "Разум — это место, которое само по себе может сделать рай из ада.{NEWLINE}{NEWLINE}Награда вручается за каждые три успешных пси-паники."

  STR_MEDAL_REACTIONFIRE: "Знак Молниеносной Реакции"
  STR_MEDAL_REACTIONFIRE_DESCRIPTION: "Вручается за убийства в режиме реакции."
  STR_MEDAL_REACTIONFIRE_UFOPEDIA: "В бою разум не должен быть замутнён эмоциями.{NEWLINE}{NEWLINE}Награда вручается за каждые два убийства в режиме реакции. Имеет четыре уровня."

  STR_MEDAL_REARSHOT: "Благодарность Париса"
  STR_MEDAL_REARSHOT_DESCRIPTION: "Вручается за убийства сзади."
  STR_MEDAL_REARSHOT_UFOPEDIA: "Парис поразил Ахилла стрелой в пяту.{NEWLINE}{NEWLINE}Награда вручается за каждые три убийства сзади. Имеет четыре уровня."

  STR_MEDAL_REVIVE: "Крест Ангела"
  STR_MEDAL_REVIVE_DESCRIPTION: "Вручается за возвращение товарищей к жизни."
  STR_MEDAL_REVIVE_UFOPEDIA: "Нет, ты не умрёшь на моём дежурстве.{NEWLINE}{NEWLINE}Награда вручается за каждое успешное оживление. Имеет три уровня."

  STR_MEDAL_SAPPER: "Медаль Подрывника"
  STR_MEDAL_SAPPER_DESCRIPTION: "Вручается за уничтожение роботизированных противников взрывчаткой."
  STR_MEDAL_SAPPER_UFOPEDIA: "Есть танк на линии деревьев... Я пойду.{NEWLINE}{NEWLINE}Награда вручается за каждое уничтожение кибердиска или сектопода взрывчаткой. До десяти раз."

  STR_MEDAL_SECTOPOD_KILL: "Знак «Металлическая Угроза»"
  STR_MEDAL_SECTOPOD_KILL_DESCRIPTION: "Вручается за уничтожение Сектопода."
  STR_MEDAL_SECTOPOD_KILL_UFOPEDIA: "Робот не может причинить вред человеку.{NEWLINE}     -- Азимов{NEWLINE}{NEWLINE}Награда за каждого уничтоженного сектопода. Имеет десять уровней."

  STR_MEDAL_SEVEN_IN_ONE: "Орден Славы"
  STR_MEDAL_SEVEN_IN_ONE_DESCRIPTION: "Вручается за уничтожение семи и более пришельцев в одной миссии."
  STR_MEDAL_SEVEN_IN_ONE_UFOPEDIA: "Если ты выполняешь больше, чем тебе поручено — тебе поручат ещё больше.{NEWLINE}{NEWLINE}Награда может быть выдана до трёх раз."

  STR_MEDAL_SLAVEKILLS: "Кукловод"
  STR_MEDAL_SLAVEKILLS_DESCRIPTION: "Вручается за использование пси-контроля для убийства пришельцев руками других пришельцев."
  STR_MEDAL_SLAVEKILLS_UFOPEDIA: "Награда вручается за каждые три таких убийства. Имеет четыре уровня."

  STR_MEDAL_SNIPER: "Знак Снайпера"
  STR_MEDAL_SNIPER_DESCRIPTION: "Вручается за точные дальние выстрелы."
  STR_MEDAL_SNIPER_UFOPEDIA: "Мой прицел твёрд, курок холоден...{NEWLINE}{NEWLINE}Награда вручается за каждые три дальних попадания. Имеет четыре уровня."

  STR_MEDAL_STAR_OF_ASCLEPIUS: "Звезда Асклепия"
  STR_MEDAL_STAR_OF_ASCLEPIUS_DESCRIPTION: "Вручается солдату, выдержавшему интенсивный обстрел."
  STR_MEDAL_STAR_OF_ASCLEPIUS_UFOPEDIA: "Награда вручается за получение десяти попаданий от врага. Имеет три уровня."

  STR_MEDAL_STATGAIN: "Знак Афины"
  STR_MEDAL_STATGAIN_DESCRIPTION: "Вручается за улучшение характеристик."
  STR_MEDAL_STATGAIN_UFOPEDIA: "Награда вручается за каждые +10 очков характеристик. Имеет десять уровней (до +100)."

  STR_MEDAL_TOTAL_FRIENDLY_FIRED: "Чёрный Крест"
  STR_MEDAL_TOTAL_FRIENDLY_FIRED_DESCRIPTION: "Вручается за выживание после дружественного огня."
  STR_MEDAL_TOTAL_FRIENDLY_FIRED_UFOPEDIA: "Дружественный огонь — это не дружеский.{NEWLINE}{NEWLINE}Имеет четыре уровня."

  STR_MEDAL_TOTAL_IMPORTANT_MISSIONS: "Орден Земли"
  STR_MEDAL_TOTAL_IMPORTANT_MISSIONS_DESCRIPTION: "Вручается за участие в важных миссиях."
  STR_MEDAL_TOTAL_IMPORTANT_MISSIONS_UFOPEDIA: "Награда вручается за 3, 5, 10, 15, 20, 25, 30, 35, 40 и 50 важных миссий."

  STR_MEDAL_TOTAL_KNOCKED_OUT: "Медаль Героизма"
  STR_MEDAL_TOTAL_KNOCKED_OUT_DESCRIPTION: "Вручается за неоднократные потери сознания в бою (но выживание)."
  STR_MEDAL_TOTAL_KNOCKED_OUT_UFOPEDIA: "Награда выдаётся за каждые два случая потери сознания. Имеет четыре уровня."

  STR_MEDAL_TOTAL_LONE_SURVIVOR: "Звезда Доблести"
  STR_MEDAL_TOTAL_LONE_SURVIVOR_DESCRIPTION: "Вручается единственному выжившему в миссии."
  STR_MEDAL_TOTAL_LONE_SURVIVOR_UFOPEDIA: "Я никогда не выйду из боя.{NEWLINE}{NEWLINE}Выдаётся один раз."

  STR_MEDAL_TOTAL_MISSION_COUNT: "Военный Крест"
  STR_MEDAL_TOTAL_MISSION_COUNT_DESCRIPTION: "Вручается за большое количество миссий."
  STR_MEDAL_TOTAL_MISSION_COUNT_UFOPEDIA: "Награда вручается за 4, 8, 12, 16, 20, 25, 30, 35, 40 и 50 миссий."

  STR_MEDAL_TOTAL_MISSION_REGION_COUNT: "Лента Кампании"
  STR_MEDAL_TOTAL_MISSION_REGION_COUNT_DESCRIPTION: "Вручается за защиту регионов."
  STR_MEDAL_TOTAL_MISSION_REGION_COUNT_UFOPEDIA: "Награда вручается за 10, 20 и 30 миссий в одном регионе."

  STR_MEDAL_TOTAL_MONTH_SERVICE: "Медаль Долголетия"
  STR_MEDAL_TOTAL_MONTH_SERVICE_DESCRIPTION: "Вручается за долгую службу."
  STR_MEDAL_TOTAL_MONTH_SERVICE_UFOPEDIA: "Награда вручается за каждые три месяца службы."

  STR_MEDAL_TOTAL_NIGHT_MISSIONS: "Ночной Охотник"
  STR_MEDAL_TOTAL_NIGHT_MISSIONS_DESCRIPTION: "Вручается за участие в ночных миссиях."
  STR_MEDAL_TOTAL_NIGHT_MISSIONS_UFOPEDIA: "Награда вручается за каждые три ночные миссии."

  STR_MEDAL_TRAP: "Крест Партизана"
  STR_MEDAL_TRAP_DESCRIPTION: "Вручается за убийства с помощью ловушек."
  STR_MEDAL_TRAP_UFOPEDIA: "Награда вручается за убийства проксимити-гранатами. Имеет четыре уровня (1, 3, 5, 8)."

  STR_MEDAL_VALIANT_CRUX: "Крест Доблести"
  STR_MEDAL_VALIANT_CRUX_DESCRIPTION: "Вручается за спасение всех гражданских в террористической миссии."
  STR_MEDAL_VALIANT_CRUX_UFOPEDIA: "Настоящий солдат сражается не из ненависти к тому, что перед ним, а из любви к тому, что позади.{NEWLINE}{NEWLINE}Имеет четыре уровня."

  STR_MEDAL_WEAPON_PROFICIENCY: "Медаль Мастерства"
  STR_MEDAL_WEAPON_PROFICIENCY_DESCRIPTION: "Вручается за особое мастерство владения оружием {0}."
  STR_MEDAL_WEAPON_PROFICIENCY_UFOPEDIA: "Награда вручается за 10, 20 и 30 убийств из одного вида оружия."

  STR_MEDAL_WOUNDED: "Пурпурное Сердце"
  STR_MEDAL_WOUNDED_DESCRIPTION: "Вручается за ранение в бою."
  STR_MEDAL_WOUNDED_UFOPEDIA: "Награда вручается один раз за получение ранения."
