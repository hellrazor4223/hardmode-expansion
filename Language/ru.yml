  STR_ALIEN_ORIGINS_UFOPEDIA: "Ясно, что на Земле мы ведём заведомо проигрышную битву. Орды пришельцев значительно превосходят нас численностью. Лучшее, что мы можем сделать — замедлить их продвижение. Единственная надежда человечества — нанести удар по источнику. Наши исследования указывают на наличие оперативной базы в пределах Солнечной системы. Пришельцы называют это место центром древней цивилизации, предшествующей человеческой истории. Мы должны найти это место как можно скорее. Однако для получения более детальной информации необходимо захватить и допросить командира пришельцев. Командиры, судя по всему, находятся только на базах пришельцев."

  STR_THE_MARTIAN_SOLUTION_UFOPEDIA: "Наши исследования теперь указывают на Марс как на главную базу операций пришельцев. База хорошо скрыта и содержит все производственные и клонирующие мощности, необходимые для вторжения на Землю. Также там, похоже, находится некий управляющий компьютер, контролирующий всю операцию. Похоже, что ульевое общество пришельцев имеет нечто вроде «матки». Это их фундаментальная слабость — если мы уничтожим «мозг», то погибнет и тело. Мы должны ускорить исследования, пока не стало слишком поздно. Для продвижения нам необходимо захватить самых высокопоставленных пришельцев — Командиров Эфириалов, которые находятся только на базах расы Эфириалов."

