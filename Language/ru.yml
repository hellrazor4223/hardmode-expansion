  STR_REINFORCED_FLYING_SUIT_REPAIR: "Ремонт укреплённого летательного скафандра"
  STR_REINFORCED_FLYING_SUIT_UFOPEDIA: "Это улучшенная версия нашего прежнего летательного скафандра. Его защитные свойства значительно повышены, усиленные сервоприводы из улучшенной силовой брони также позволяют увеличить скорость движения носителя. Улучшенная система наведения для ответного огня и ещё более высокая защита от плазменного оружия. Лучшая броня, которую могут получить наши солдаты."
