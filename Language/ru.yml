  STR_TERROR_MISSION_POLAR: "ТЕРРОР В АНТАРКТИДЕ"
  STR_TERROR_MISSION_POLAR_BRIEFING: "Пришельцы атаковали антарктическую исследовательскую станцию. Станция и её персонал находятся под угрозой. Ваш отряд должен уничтожить всех пришельцев и защитить мирных жителей. Для завершения миссии погрузите всех оперативников в транспорт и нажмите «Покинуть миссию»."
