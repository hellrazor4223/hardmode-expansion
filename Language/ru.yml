  STR_WASPITE_COMMANDER: "Васпит-Командир"
  STR_WASPITE_UFOPEDIA: "Васпиты — элитные террористические агенты и бойцы. Они очень агрессивны, генетически модифицированы и усилены киберимплантами, что делает их грозными противниками. Однако их общая хрупкость указывает на то, что они скорее выполняют роль артиллерийской поддержки, чем обычной пехоты. Спиральное устройство, заменяющее их тело, генерирует антигравитационное поле, позволяющее им парить в воздухе."
  STR_WASPITE_CORPSE: "Труп васпита"
  STR_WASPITE_AUTOPSY: "Вскрытие васпита"
  STR_WASPITE_AUTOPSY_UFOPEDIA: "Анатомия этого существа граничит с безумием. Тело состоит из спиралевидного устройства жизнеобеспечения в симбиозе с генетически модифицированным растением. К телу прикреплены механические руки и насекомоподобная голова — вероятно, единственная часть оригинального вида. Растительная часть тела уязвима к огню."

