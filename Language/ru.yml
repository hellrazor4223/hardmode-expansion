  STR_UPGRADE_REINFORCED_POWER_SUIT_TO_REINFORCED_FLYING_SUIT: "Укреплённая силовая броня → Укреплённый летательный скафандр"

  STR_REINFORCED_FLYING_SUIT: "Укреплённый летательный скафандр"
