  STR_FUSION_BALL_DEFENSES_UFOPEDIA: "Термоядерные ракеты обеспечивают наиболее эффективную защиту от атак пришельцев. Эти ракеты создают антиматериальный имплозивный взрыв, уничтожающий всё в определённом радиусе. Для строительства этого объекта необходимы инопланетные материалы.{NEWLINE}{NEWLINE}Необходимые инопланетные строительные материалы:{NEWLINE} * ИНОПЛАНЕТНЫЕ СПЛАВЫ: 60{NEWLINE} * ЭЛЕРИУМ-115: 30{NEWLINE} * ИСТОЧНИК ПИТАНИЯ НЛО: 1"
  STR_GRAV_SHIELD_UFOPEDIA: "Гравитационный щит отталкивает инопланетные корабли, пытающиеся приземлиться рядом с базой, достаточно долго, чтобы все оборонительные системы смогли открыть огонь повторно. На практике это удваивает эффективность любых оборонительных систем вашей базы. Для строительства этого объекта необходимы инопланетные материалы.{NEWLINE}{NEWLINE}Необходимые инопланетные строительные материалы:{NEWLINE} * ИНОПЛАНЕТНЫЕ СПЛАВЫ: 100{NEWLINE} * ЭЛЕРИУМ-115: 50{NEWLINE} * ИСТОЧНИК ПИТАНИЯ НЛО: 4"
  STR_MIND_SHIELD_UFOPEDIA: "Поскольку инопланетные корабли используют мозговые волны для обнаружения присутствия людей, наиболее эффективной контрмерой является экранирование мозговых волн базы. Этот объект значительно снизит вероятность обнаружения базы пришельцами. Для строительства этого объекта необходимы инопланетные материалы.{NEWLINE}{NEWLINE}Необходимые инопланетные строительные материалы:{NEWLINE} * ИНОПЛАНЕТНЫЕ СПЛАВЫ: 100{NEWLINE} * ЭЛЕРИУМ-115: 50{NEWLINE} * ИСТОЧНИК ПИТАНИЯ НЛО: 4"
  STR_PSIONIC_LABORATORY_UFOPEDIA: "Псионическая лаборатория может оценивать псионический потенциал всех солдат на базе и проводить необходимое обучение для использования их псионических способностей. Каждая лаборатория может обучать до десяти солдат. Обучение распределяется в конце каждого месяца. Псионические способности, используемые совместно с пси-усилителем, могут применяться для псионических атак в бою. Для строительства этого объекта необходимы инопланетные материалы.{NEWLINE}{NEWLINE}Необходимые инопланетные строительные материалы:{NEWLINE} * ИНОПЛАНЕТНЫЕ СПЛАВЫ: 100{NEWLINE} * МЕНТАЛЬНЫЙ ЗОНД: 2{NEWLINE} * НАВИГАЦИЯ НЛО: 2"
  STR_HYPER_WAVE_DECODER_UFOPEDIA: "Связь пришельцев основана на сверхпространственных волнах, распространяющихся практически мгновенно. Декодирующий комплекс перехватывает передачи НЛО и расшифровывает информацию. Это позволит определить тип НЛО, расу пришельцев и вид их деятельности. Для строительства этого объекта необходимы инопланетные материалы.{NEWLINE}{NEWLINE}Необходимые инопланетные строительные материалы:{NEWLINE} * ИНОПЛАНЕТНЫЕ СПЛАВЫ: 60{NEWLINE} * ЭЛЕРИУМ-115: 30{NEWLINE} * НАВИГАЦИЯ НЛО: 4"
