  STR_SECTOID_ELITE_UFOPEDIA: "По сути это сектоид, но данный вид обладает значительно более мощными псионическими способностями. Они также немного выше, с меньшей и более компактной головой. Удивительно, но их жизненные органы намного крепче, чем у обычных сектоидов. Во время операций на Земле они носят нечто вроде защитного костюма, который также выполняет роль личной брони."
