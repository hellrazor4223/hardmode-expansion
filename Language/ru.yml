  STR_TERROR_MISSION_TROPICAL: "ТЕРРОР В ТРОПИКАХ"

  STR_TERROR_MISSION_ISLAND: "ТЕРРОР НА ОСТРОВЕ"
  STR_TERROR_MISSION_ISLAND_BRIEFING: "Пришельцы атаковали объекты на острове. Остров и гражданское население находятся под угрозой. Ваш отряд должен уничтожить всех пришельцев и защитить мирных жителей. Для завершения миссии погрузите всех оперативников в транспорт и нажмите «Покинуть миссию»."

  STR_TERROR_MISSION_MILITARY_BASE: "ТЕРРОР НА ВОЕННОЙ БАЗЕ"
  STR_TERROR_MISSION_MILITARY_BASE_ALERT: "ПРИШЕЛЬЦЫ АТАКУЮТ{NEWLINE}ВОЕННУЮ БАЗУ В"
  STR_TERROR_MISSION_MILITARY_BASE_BRIEFING: "Пришельцы атаковали военную базу. База и её персонал находятся под угрозой. Ваш отряд должен уничтожить всех пришельцев, оказать поддержку местным войскам и защитить мирных жителей. Для завершения миссии погрузите всех оперативников в транспорт и нажмите «Покинуть миссию»."

  STR_TERROR_MISSION_SHIP: "ТЕРРОР НА КОРАБЛЕ"
  STR_TERROR_MISSION_SHIP_ALERT: "ПРИШЕЛЬЦЫ АТАКУЮТ{NEWLINE}ГРАЖДАНСКИЙ КОРАБЛЬ В МОРЕ"
  STR_TERROR_MISSION_SHIP_BRIEFING: "Гражданское судно захвачено пришельцами и на полной скорости направляется к густонаселённому району. Чтобы предотвратить катастрофу, необходимо уничтожить навигационную систему на мостике. Для завершения миссии погрузите оперативников в транспорт или покиньте зону и нажмите «Покинуть миссию»."
  STR_TERROR_MISSION_SHIP_DISABLED: "КОРАБЛЬ ВЫВЕДЕН ИЗ СТРОЯ"
  STR_TERROR_MISSION_SHIP_OPERATIONAL: "КОРАБЛЬ ВСЁ ЕЩЁ НА ХОДУ"
